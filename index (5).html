// ── FORM FODA ─────────────────────────────────────────────────────────────────
function FormFODA({perfil, partidos, onBack}) {
  const [f, setF] = useState('');
  const [o, setO] = useState('');
  const [d, setD] = useState('');
  const [a, setA] = useState('');
  const [pId, setPId] = useState('');
  const [busy, setBusy] = useState(false);
  const [ok, setOk] = useState(false);
  const fmtD = (dt) => dt ? new Date(dt+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) : '';

  const guardar = async () => {
    if (!f && !o && !d && !a) return;
    setBusy(true);
    await sb.from('evaluaciones_foda').insert({jugador_id:perfil.id, partido_id:pId||null, fortalezas:f, oportunidades:o, debilidades:d, amenazas:a});
    await log(perfil.id, 'completo_foda', 'FODA completado');
    setOk(true); setBusy(false);
    setTimeout(onBack, 2000);
  };

  if (ok) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'60vh',gap:16}}>
      <div style={{fontSize:56}}>✅</div>
      <div style={{fontSize:20,fontWeight:700,color:'var(--accent)'}}>FODA guardado</div>
      <div style={{fontSize:13,color:'var(--muted)'}}>Redirigiendo al menú…</div>
    </div>
  );

  return (
    <div className="animate-in">
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:6}}>
        <button className="btn btn-o btn-sm" onClick={onBack}>← Volver</button>
        <div className="page-title">FODA</div>
      </div>
      <div className="page-sub">Análisis personal — Fortalezas, Oportunidades, Debilidades, Amenazas</div>
      <div className="page-divider"/>

      <div className="card" style={{marginBottom:18}}>
        <div className="card-title">Asociar a partido (opcional)</div>
        <select className="fc" style={{maxWidth:420}} value={pId} onChange={e=>setPId(e.target.value)}>
          <option value="">Sin partido — evaluación general</option>
          {partidos.map(p=><option key={p.id} value={p.id}>{p.nombre} — {fmtD(p.fecha)} {p.rival?'vs '+p.rival:''}</option>)}
        </select>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:18}}>
        {[
          ['Fortalezas','#4ade80','¿Qué aspectos psicológicos son tu punto fuerte? Ej: resiliencia, liderazgo…', f, setF],
          ['Oportunidades','#60a5fa','¿Qué factores externos podés aprovechar? Ej: nuevo cuerpo técnico, más entrenamiento…', o, setO],
          ['Debilidades','#f87171','¿Qué aspectos internos necesitás mejorar? Ej: ansiedad ante errores, concentración…', d, setD],
          ['Amenazas','#fb923c','¿Qué factores externos pueden afectarte? Ej: presión del entorno, lesiones del equipo…', a, setA],
        ].map(([label, color, hint, val, setVal])=>(
          <div key={label} style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--brd2)',borderRadius:'var(--r)',padding:20}}>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:2,color,marginBottom:6}}>{label}</div>
            <p style={{fontSize:11,color:'var(--muted)',marginBottom:12,lineHeight:1.5}}>{hint}</p>
            <textarea className="fc" rows={5} value={val} onChange={e=>setVal(e.target.value)} placeholder="Escribí aquí…"/>
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:10}}>
        <button className="btn btn-o" onClick={onBack}>Cancelar</button>
        <button className="btn btn-g" onClick={guardar} disabled={busy||(!f&&!o&&!d&&!a)}>
          {busy?<><div className="spin"/>Guardando…</>:'💾 Guardar FODA'}
        </button>
      </div>
    </div>
  );
}

// ── FORM CPRD ─────────────────────────────────────────────────────────────────
function FormCPRD({perfil, onBack}) {
  const [resps, setResps] = useState({});
  const [busy,  setBusy]  = useState(false);
  const [resultado, setResultado] = useState(null);
  const total = Object.keys(resps).length;
  const completo = total === 25;

  const guardar = async () => {
    if (!completo) return;
    setBusy(true);
    const calc = calcularCPRD(resps);
    await sb.from('evaluaciones_cprd').insert({
      jugador_id: perfil.id,
      respuestas: resps,
      control_estres_pd:     calc.control_estres.pd,
      control_estres_percentil: calc.control_estres.percentil,
      autoconfianza_pd:      calc.autoconfianza.pd,
      autoconfianza_percentil: calc.autoconfianza.percentil,
      cohesion_pd:           calc.cohesion.pd,
      cohesion_percentil:    calc.cohesion.percentil,
      motivacion_pd:         calc.motivacion.pd,
      motivacion_percentil:  calc.motivacion.percentil,
    });
    await log(perfil.id, 'completo_cprd', 'CPRD completado');
    setResultado(calc);
    setBusy(false);
  };

  if (resultado) return <ResultadoCPRD resultado={resultado} onBack={onBack}/>;

  const dimsOrder = ['autoconfianza','motivacion','control_estres','cohesion'];

  return (
    <div className="animate-in">
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:6}}>
        <button className="btn btn-o btn-sm" onClick={onBack}>← Volver</button>
        <div className="page-title">CPRD</div>
      </div>
      <div className="page-sub">Cuestionario de Características Psicológicas relacionadas con el Rendimiento Deportivo</div>
      <div className="page-divider"/>

      <div className="card" style={{marginBottom:18}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:13,color:'var(--muted)'}}>Escala: <span style={{color:'var(--text2)'}}>0 = Totalmente en desacuerdo &nbsp;·&nbsp; 4 = Totalmente de acuerdo</span></div>
          <div style={{fontSize:14,fontWeight:700}}><span style={{color:completo?'#4ade80':'var(--accent)'}}>{total}</span><span style={{color:'var(--muted)'}}>/25</span></div>
        </div>
        <div style={{marginTop:10,background:'rgba(168,85,247,.1)',borderRadius:4,height:5,overflow:'hidden'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,var(--purple),var(--purple3))',width:(total/25*100)+'%',transition:'width .3s ease',borderRadius:4}}/>
        </div>
      </div>

      {dimsOrder.map(dimKey=>{
        const info = DIMS_INFO[dimKey];
        const pregs = CPRD_PREGUNTAS.filter(p=>p.dim===dimKey);
        return (
          <div key={dimKey}>
            <div style={{display:'flex',alignItems:'center',gap:12,margin:'20px 0 10px'}}>
              <div style={{flex:1,height:1,background:`linear-gradient(90deg,${info.color}44,transparent)`}}/>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:info.color,whiteSpace:'nowrap'}}>{info.label}</div>
              <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${info.color}44)`}}/>
            </div>
            {pregs.map(preg=>(
              <div key={preg.id} className="card" style={{marginBottom:8,borderColor:resps[preg.id]!==undefined?'rgba(168,85,247,.3)':'var(--brd2)',padding:'14px 18px'}}>
                <div style={{fontSize:10,color:'var(--muted)',fontFamily:'monospace',marginBottom:4}}>ÍTEM {preg.id}</div>
                <div style={{fontSize:14,color:'var(--text)',marginBottom:12,lineHeight:1.55}}>{preg.texto}</div>
                <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                  {[0,1,2,3,4].map(v=>(
                    <button key={v} onClick={()=>setResps(r=>({...r,[preg.id]:v}))}
                      style={{width:44,height:44,borderRadius:'50%',border:`2px solid ${parseInt(resps[preg.id])===v?info.color:'var(--brd2)'}`,background:parseInt(resps[preg.id])===v?`${info.color}22`:'var(--bg3)',color:parseInt(resps[preg.id])===v?info.color:'var(--muted)',fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans',transition:'all .18s',transform:parseInt(resps[preg.id])===v?'scale(1.18)':'scale(1)'}}>
                      {v}
                    </button>
                  ))}
                </div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--muted)',marginTop:6,paddingInline:4}}>
                  <span>Totalmente en desacuerdo</span><span>Totalmente de acuerdo</span>
                </div>
              </div>
            ))}
          </div>
        );
      })}

      <div style={{display:'flex',gap:10,alignItems:'center',marginTop:24}}>
        <button className="btn btn-o" onClick={onBack}>Cancelar</button>
        <button className="btn btn-g" onClick={guardar} disabled={busy||!completo}>
          {busy?<><div className="spin"/>Calculando…</>:completo?'Ver resultados →':'Respondé todas las preguntas'}
        </button>
        {!completo && <span style={{fontSize:12,color:'var(--muted)'}}>Faltan {25-total}</span>}
      </div>
    </div>
  );
}

// ── RESULTADO CPRD ────────────────────────────────────────────────────────────
function ResultadoCPRD({resultado, onBack}) {
  return (

      <div className="page-sub">Tus puntuaciones y percentiles</div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:16,marginBottom:24}}>
        {Object.entries(DIMS_INFO).map(([dim,info])=>{
          const data = resultado[dim];
          return (
            <div key={dim} style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--brd2)',borderRadius:'var(--r)',padding:22,position:'relative',overflow:'hidden'}}>

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12}}>
                <span style={{fontSize:12,color:'var(--muted)'}}>Percentil</span>
                <span style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:1,color:info.color}}>{data.percentil}</span>
              </div>
              <div style={{marginTop:8,background:'rgba(255,255,255,.05)',borderRadius:4,height:6,overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:4,background:info.color,width:data.percentil+'%',transition:'width .6s ease'}}/>
              </div>
              <div style={{marginTop:12,textAlign:'center'}}>
                <span style={{fontSize:12,fontWeight:700,color:data.interp.color,background:`${data.interp.color}18`,padding:'3px 12px',borderRadius:20,border:`1px solid ${data.interp.color}44`}}>{data.interp.label}</span>
              </div>
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="card-title">📊 Tabla de interpretación</div>
        <table>
          <thead><tr><th>Percentil</th><th>Interpretación</th></tr></thead>
          <tbody>
            {[['0 – 15','Muy Bajo','#f87171'],['16 – 29','Promedio Bajo','#fb923c'],['30 – 70','Promedio','#c084fc'],['71 – 84','Promedio Alto','#4ade80'],['>85','Muy Alto','#60a5fa']].map(([r,l,col])=>(
              <tr key={r}><td style={{fontFamily:'monospace',fontSize:13}}>{r}</td><td><span style={{color:col,fontWeight:700}}>{l}</span></td></tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── EVAL JUGADORES (PSICÓLOGA) ────────────────────────────────────────────────
function EvalJugadoresPsi() {
  const {perfil} = useApp();
  const [jugadores, setJugadores] = useState([]);
  const [selJ,      setSelJ]      = useState(null);
  const [tab,       setTab]       = useState('cprd');
  const [cprdList,  setCprdList]  = useState([]);
  const [fodaList,  setFodaList]  = useState([]);
  const [loading,   setLoading]   = useState(false);
  const [detalle,   setDetalle]   = useState(null);

  useEffect(()=>{
    sb.from('perfiles').select('*').eq('rol','jugador').eq('psicologa_id',perfil.id).order('nombre').then(({data})=>setJugadores(data||[]));
  },[]);

  const selJugador = async (j) => {
    setSelJ(j); setDetalle(null); setLoading(true);
    const [c, f] = await Promise.all([
      sb.from('evaluaciones_cprd').select('*').eq('jugador_id',j.id).order('created_at',{ascending:false}),
      sb.from('evaluaciones_foda').select('*, partidos(nombre,fecha,rival)').eq('jugador_id',j.id).order('created_at',{ascending:false}),
    ]);
    setCprdList(c.data||[]);
    setFodaList(f.data||[]);
    setLoading(false);
  };

  const fmtDT = (d) => d ? new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'}) : '—';
  const fmtD  = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) : '—';

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div>
          <div className="page-title">Evaluaciones FODA / CPRD</div>
          <div className="page-sub">Resultados de tus jugadores</div>
        </div>
      </div>
      <div className="page-divider"/>
      <div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:20,alignItems:'start'}}>
        {/* Lista jugadores */}
        <div>
          {jugadores.length===0 && <div style={{color:'var(--muted)',fontSize:13}}>Sin jugadores asignados.</div>}

            <div key={j.id} className="card" style={{cursor:'pointer',padding:'12px 16px',marginBottom:8,borderColor:selJ?.id===j.id?'var(--purple3)':'var(--brd2)',background:selJ?.id===j.id?'rgba(168,85,247,.08)':'',transition:'all .2s'}} onClick={()=>selJugador(j)}>
              <div style={{fontWeight:600,fontSize:14}}>{j.nombre||j.email}</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{j.posicion||''}{j.equipo?' · '+j.equipo:''}</div>
            </div>
          ))}
        </div>

        {/* Detalle */}
        {!selJ ? (
          <div className="empty"><div className="empty-icon">👈</div><div>Seleccioná un jugador</div></div>
        ) : (
          <div>
            <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
              {['cprd','foda','graficos'].map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={{padding:'8px 20px',borderRadius:8,border:`1px solid ${tab===t?'var(--purple3)':'var(--brd2)'}`,background:tab===t?'rgba(168,85,247,.15)':'transparent',color:tab===t?'var(--accent)':'var(--muted)',cursor:'pointer',fontSize:13,fontFamily:'DM Sans',fontWeight:tab===t?700:400,transition:'all .2s'}}>
                  {t==='graficos'?'📊 Gráficos':t.toUpperCase()}
                </button>
              ))}
            </div>
            {tab==='graficos' && <DashboardCPRD cprdList={[...cprdList].reverse()} titulo={`Evaluaciones de ${selJ?.nombre||selJ?.email||'jugador'}`}/>}
            {loading ? <div style={{color:'var(--muted)'}}>Cargando…</div> : tab==='cprd' ? (
              cprdList.length===0 ? <div className="empty"><div className="empty-icon">🧠</div><div>Sin evaluaciones CPRD.</div></div> :
              cprdList.map(ev=>(
                <div key={ev.id} className="card" style={{cursor:'pointer',borderColor:detalle?.id===ev.id?'var(--purple3)':'var(--brd2)'}} onClick={()=>setDetalle(detalle?.id===ev.id?null:ev)}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <span style={{color:'var(--accent)',fontWeight:700,fontSize:13}}>🧠 CPRD</span>
                    <span style={{fontSize:12,color:'var(--muted)',fontFamily:'monospace'}}>{fmtDT(ev.created_at)}</span>
                  </div>
                  <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
                    {Object.entries(DIMS_INFO).map(([k,info])=>(
                      <div key={k} style={{fontSize:12}}>
                        <span style={{color:'var(--muted)'}}>{info.label}: </span>
                        <span style={{color:info.color,fontWeight:700}}>P{ev[k+'_percentil']}</span>
                        <span style={{color:'var(--muted)',fontSize:11}}> · {getInterp(ev[k+'_percentil']).label}</span>
                      </div>
                    ))}
                  </div>
                  {detalle?.id===ev.id && (
                    <div style={{marginTop:16,paddingTop:16,borderTop:'1px solid var(--brd)'}}>
                      {/* Puntuaciones por dimensión */}
                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>
                        {Object.entries(DIMS_INFO).map(([k,info])=>{
                          const pct=ev[k+'_percentil']; const interp=getInterp(pct);
                          return (
                            <div key={k} style={{background:'var(--bg)',borderRadius:10,padding:14,position:'relative',overflow:'hidden'}}>
                              <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:info.color}}/>
                              <div style={{fontSize:11,color:'var(--muted)',marginBottom:6}}>{info.label}</div>
                              <div style={{fontFamily:"'Bebas Neue'",fontSize:36,color:info.color,lineHeight:1}}>{ev[k+'_pd']}</div>
                              <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>PD · Percentil <strong style={{color:info.color}}>{pct}</strong></div>
                              <div style={{marginTop:6,background:'rgba(255,255,255,.05)',borderRadius:3,height:4,overflow:'hidden'}}>
                                <div style={{height:'100%',borderRadius:3,background:info.color,width:pct+'%',transition:'width .6s ease'}}/>
                              </div>
                              <div style={{marginTop:5,fontSize:11,fontWeight:700,color:interp.color}}>{interp.label}</div>
                            </div>
                          );
                        })}
                      </div>
                      {/* Detalle pregunta por pregunta */}
                      {ev.respuestas && (
                        <div>
                          <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:'var(--muted)',marginBottom:12}}>Respuestas por pregunta</div>
                          {CPRD_PREGUNTAS.map(preg=>{
                            const valRaw = ev.respuestas[preg.id];
                            if(valRaw===undefined||valRaw===null) return null;
                            const val = parseInt(valRaw);
                            const pd  = preg.inv ? (4-val) : val;
                            const info = DIMS_INFO[preg.dim];
                            return (
                              <div key={preg.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--brd)'}}>
                                <div style={{fontSize:10,color:'var(--muted)',fontFamily:'monospace',minWidth:28,flexShrink:0}}>#{preg.id}</div>
                                <div style={{fontSize:12,color:'var(--text2)',flex:1,lineHeight:1.4}}>{preg.texto}</div>
                                <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                                  <span style={{fontSize:11,color:'var(--muted)'}}>Resp: <strong style={{color:'var(--text)'}}>{val}</strong></span>
                                  <span style={{fontSize:11,color:'var(--muted)'}}>PD: <strong style={{color:info.color}}>{pd}</strong></span>
                                  <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,background:`${info.color}18`,color:info.color,fontWeight:600}}>{info.label.split(' ')[0]}</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              ))
            ) : (
              fodaList.length===0 ? <div className="empty"><div className="empty-icon">🔍</div><div>Sin FODA completados.</div></div> :
              fodaList.map(ev=>(
                <div key={ev.id} className="card" style={{cursor:'pointer',borderColor:detalle?.id===ev.id?'var(--purple3)':'var(--brd2)'}} onClick={()=>setDetalle(detalle?.id===ev.id?null:ev)}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <span style={{color:'#fbbf24',fontWeight:700,fontSize:13}}>🔍 FODA</span>
                    <span style={{fontSize:12,color:'var(--muted)',fontFamily:'monospace'}}>{fmtDT(ev.created_at)}</span>
                  </div>
                  {ev.partidos ? <div style={{fontSize:12,color:'var(--muted)'}}>Partido: {ev.partidos.nombre} vs {ev.partidos.rival||'?'} · {fmtD(ev.partidos.fecha)}</div>
                    : <div style={{fontSize:12,color:'var(--muted)'}}>Evaluación general</div>}
                  {detalle?.id===ev.id && (
                    <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--brd)',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                      {[['Fortalezas',ev.fortalezas,'#4ade80'],['Oportunidades',ev.oportunidades,'#60a5fa'],['Debilidades',ev.debilidades,'#f87171'],['Amenazas',ev.amenazas,'#fb923c']].map(([l,v,col])=>(
                        <div key={l} style={{background:'var(--bg)',borderRadius:10,padding:12}}>
                          <div style={{fontFamily:"'Bebas Neue'",fontSize:17,color:col,letterSpacing:1,marginBottom:8}}>{l}</div>
                          <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{v||'Sin completar'}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))
            )}
          </div>
        )}
      </div>
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════════════════
// DASHBOARD CPRD REUTILIZABLE (jugador + psicóloga)
// ══════════════════════════════════════════════════════════════════════════════
function DashboardCPRD({ cprdList, titulo }) {
  const W=560, PL=8, PR=8, PT=24, PB=40;

  // ── mini SVG charts (copias locales para no depender del scope de GraficosJugador) ──
  const MiniLineC = ({datos, color, alto=150}) => {
    if(!datos||datos.length<2) return <div style={{color:'var(--muted)',fontSize:12,padding:16,textAlign:'center'}}>Se necesitan al menos 2 evaluaciones para ver la evolución.</div>;
    const vals=datos.map(d=>d.val), mx=Math.max(...vals,1), mn=Math.min(...vals,0), rng=mx-mn||1;
    const H=alto-PT-PB;
    const xs=datos.map((_,i)=>PL+i*(W-PL-PR)/(datos.length-1));
    const ys=datos.map(d=>PT+H-((d.val-mn)/rng)*H);
    const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(' ');
    const area=`M${xs[0]},${PT+H} ${xs.map((x,i)=>`L${x},${ys[i]}`).join(' ')} L${xs[xs.length-1]},${PT+H} Z`;
    const gid=`lg-c-${color.replace('#','')}`;
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
        <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
        {[0,.25,.5,.75,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
        <path d={area} fill={`url(#${gid})`}/>
        <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {xs.map((x,i)=>(
          <g key={i}>
            <circle cx={x} cy={ys[i]} r="4.5" fill="var(--bg2)" stroke={color} strokeWidth="2"/>
            <text x={x} y={ys[i]-10} textAnchor="middle" style={{fontSize:'11px',fill:color,fontWeight:700,fontFamily:'DM Sans'}}>{datos[i].val}</text>
            <text x={x} y={PT+H+16} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{datos[i].lbl}</text>
          </g>
        ))}
      </svg>
    );
  };

  const BarrasVC = ({datos, color='#a855f7', alto=150, maxV=100}) => {
    if(!datos||datos.length===0) return null;
    const mx=maxV, H=alto-PT-PB, bW=Math.max(14,Math.floor((W-PL-PR)/datos.length)-10);
    const gap=Math.floor((W-PL-PR-bW*datos.length)/Math.max(datos.length-1,1));
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
        {[0,.25,.5,.75,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
        {datos.map((d,i)=>{
          const x=PL+i*(bW+gap), h=Math.max(3,(d.val/mx)*H), y=PT+H-h;
          const isMax=d.val===Math.max(...datos.map(x=>x.val));
          return <g key={i}>
            <rect x={x} y={y} width={bW} height={h} rx="4" fill={isMax?color:`${color}55`}/>
            <text x={x+bW/2} y={y-5} textAnchor="middle" style={{fontSize:'10px',fill:color,fontWeight:700,fontFamily:'DM Sans'}}>{d.val}</text>
            <text x={x+bW/2} y={PT+H+14} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{d.lbl}</text>
          </g>;
        })}
      </svg>
    );
  };

  const RadarC = ({datos, color='#a855f7', size=200}) => {
    if(!datos||datos.length<3) return null;
    const n=datos.length, cx=size/2, cy=size/2, r=size*.36;
    const ang=i=>(Math.PI*2*i/n)-Math.PI/2;
    const pt=(i,rad)=>({x:cx+rad*Math.cos(ang(i)), y:cy+rad*Math.sin(ang(i))});
    const mx=100;
    const poly=datos.map((d,i)=>{const p=pt(i,(d.val/mx)*r);return `${p.x},${p.y}`;}).join(' ');
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {[.25,.5,.75,1].map(f=>{
          const pts=datos.map((_,i)=>{const p=pt(i,r*f);return `${p.x},${p.y}`;}).join(' ');
          return <polygon key={f} points={pts} fill="none" stroke="rgba(168,85,247,.15)" strokeWidth="1"/>;
        })}
        {datos.map((_,i)=>{const p=pt(i,r);return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(168,85,247,.15)" strokeWidth="1"/>;} )}
        <polygon points={poly} fill={color} fillOpacity=".18" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
        {datos.map((d,i)=>{
          const p=pt(i,(d.val/mx)*r), pl=pt(i,r+22);
          return <g key={i}>
            <circle cx={p.x} cy={p.y} r="4" fill={color}/>
            <text x={pl.x} y={pl.y+4} textAnchor="middle" style={{fontSize:'10px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{d.lbl}</text>
            <text x={pl.x} y={pl.y+15} textAnchor="middle" style={{fontSize:'9px',fill:color,fontWeight:700,fontFamily:'DM Sans'}}>{d.val}</text>
          </g>;
        })}
      </svg>
    );
  };

  const LineasMultiC = ({series, alto=180}) => {
    if(!series||series.length===0) return null;
    const allVals=series.flatMap(s=>s.datos.map(d=>d.y));
    const mx=100, mn=0, rng=mx-mn;
    const maxLen=Math.max(...series.map(s=>s.datos.length),2);
    const H=alto-PT-PB;
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
        {[0,.25,.5,.75,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
        {series.map(serie=>{
          const xs=serie.datos.map((_,i)=>PL+i*(W-PL-PR)/(maxLen-1));
          const ys=serie.datos.map(d=>PT+H-((d.y-mn)/rng)*H);
          const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(' ');
          return <g key={serie.lbl}>
            <path d={path} fill="none" stroke={serie.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
            {xs.map((x,i)=>(
              <g key={i}>
                <circle cx={x} cy={ys[i]} r="4" fill="var(--bg2)" stroke={serie.color} strokeWidth="2"/>
                <text x={x} y={ys[i]-9} textAnchor="middle" style={{fontSize:'9px',fill:serie.color,fontWeight:700,fontFamily:'DM Sans'}}>{serie.datos[i].y}</text>
              </g>
            ))}
          </g>;
        })}
        {series[0]?.datos.map((d,i)=>{
          const x=PL+i*(W-PL-PR)/(maxLen-1);
          return <text key={i} x={x} y={PT+H+16} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{d.x}</text>;
        })}
      </svg>
    );
  };

  const DonutC = ({segmentos, size=150}) => {
    if(!segmentos||segmentos.length===0) return null;
    const total=segmentos.reduce((a,s)=>a+s.val,0)||1;
    const cx=size/2, cy=size/2, r=size*.36, ri=size*.22;
    let angle=-Math.PI/2;
    const arcs = segmentos.map(s=>{
      const a=s.val/total*Math.PI*2;
      const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
      angle+=a;
      const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
      const xi1=cx+ri*Math.cos(angle-a), yi1=cy+ri*Math.sin(angle-a);
      const xi2=cx+ri*Math.cos(angle), yi2=cy+ri*Math.sin(angle);
      const lg=a>Math.PI?1:0;
      return {path:`M${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg} 0 ${xi1},${yi1} Z`, color:s.color, lbl:s.lbl, val:s.val, pct:Math.round(s.val/total*100)};
    });
    return (
      <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {arcs.map((a,i)=><path key={i} d={a.path} fill={a.color} opacity=".9"/>)}
          <text x={cx} y={cy-4} textAnchor="middle" style={{fontSize:'10px',fill:'var(--muted)',fontFamily:'DM Sans'}}>Total</text>
          <text x={cx} y={cy+12} textAnchor="middle" style={{fontFamily:"'Bebas Neue'",fontSize:'18px',fill:'var(--text)'}}>{total}</text>
        </svg>
        <div>{arcs.map((a,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:7,marginBottom:6}}>
            <div style={{width:9,height:9,borderRadius:'50%',background:a.color,flexShrink:0}}/>
            <div style={{fontSize:11,color:'var(--text2)',flex:1}}>{a.lbl}</div>
            <div style={{fontWeight:700,fontSize:12,color:a.color}}>{a.pct}%</div>
          </div>
        ))}</div>
      </div>
    );
  };

  if(!cprdList||cprdList.length===0) return (
    <div className="empty"><div className="empty-icon">🧠</div><div>Sin evaluaciones CPRD para graficar.</div></div>
  );

  const ultimaEv  = cprdList[cprdList.length-1];
  const fmtL      = (d) => d ? new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) : '';

  // Datos gráficos
  const labels = cprdList.map((_,i)=>`Ev ${i+1}`);

  // Radar última eval (percentiles)
  const radarDatos = Object.entries(DIMS_INFO).map(([dim,info])=>({
    lbl: info.label.split(' ')[0], val: ultimaEv[dim+'_percentil']||0,
  }));

  // Barras últimas eval por dimensión
  const barrasDims = Object.entries(DIMS_INFO).map(([dim,info])=>({
    lbl: info.label.split(' ')[0], val: ultimaEv[dim+'_percentil']||0,
  }));

  // Líneas evolución percentiles
  const seriesEv = Object.entries(DIMS_INFO).map(([dim,info])=>({
    lbl: info.label, color: info.color,
    datos: cprdList.map((ev,i)=>({x:labels[i], y:ev[dim+'_percentil']||0})),
  }));

  // Línea evolución PD por dimensión
  const seriesPD = Object.entries(DIMS_INFO).map(([dim,info])=>({
    lbl: info.label, color: info.color,
    datos: cprdList.map((ev,i)=>({x:labels[i], y:ev[dim+'_pd']||0})),
  }));

  // Donut interpretaciones última eval
  const interpCounts = {muybajo:0, promediobajo:0, promedio:0, promediohigh:0, muyalto:0};
  Object.keys(DIMS_INFO).forEach(dim=>{
    const pct=ultimaEv[dim+'_percentil']||0;
    if(pct<=15) interpCounts.muybajo++;
    else if(pct<=29) interpCounts.promediobajo++;
    else if(pct<=70) interpCounts.promedio++;
    else if(pct<=84) interpCounts.promediohigh++;
    else interpCounts.muyalto++;
  });
  const donutInterp = [
    {lbl:'Muy Bajo',     val:interpCounts.muybajo,     color:'#f87171'},
    {lbl:'Promedio Bajo',val:interpCounts.promediobajo, color:'#fb923c'},
    {lbl:'Promedio',     val:interpCounts.promedio,     color:'#c084fc'},
    {lbl:'Promedio Alto',val:interpCounts.promediohigh, color:'#4ade80'},
    {lbl:'Muy Alto',     val:interpCounts.muyalto,      color:'#60a5fa'},
  ].filter(s=>s.val>0);

  // Línea control estrés a lo largo del tiempo
  const lineaEstres = cprdList.map((ev,i)=>({lbl:labels[i], val:ev['control_estres_percentil']||0}));
  const lineaAutoconf= cprdList.map((ev,i)=>({lbl:labels[i], val:ev['autoconfianza_percentil']||0}));

  return (
    <div className="animate-in">
      {titulo && <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>📊 {titulo} · {cprdList.length} evaluación{cprdList.length!==1?'es':''}</div>}

      {/* Tarjetas última evaluación */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:20}}>
        {Object.entries(DIMS_INFO).map(([dim,info])=>{
          const pct=ultimaEv[dim+'_percentil'], pd=ultimaEv[dim+'_pd'], interp=getInterp(pct);
          return (
            <div key={dim} style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--brd2)',borderRadius:'var(--r)',padding:16,position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:info.color}}/>
              <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,marginBottom:6}}>{info.label}</div>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:38,color:info.color,lineHeight:1}}>{pd}</div>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>PD · <strong style={{color:info.color}}>P{pct}</strong></div>
              <div style={{marginTop:7,background:'rgba(255,255,255,.05)',borderRadius:3,height:5,overflow:'hidden'}}>
                <div style={{height:'100%',background:info.color,width:pct+'%',borderRadius:3,transition:'width .6s ease'}}/>
              </div>
              <div style={{marginTop:5,fontSize:11,fontWeight:700,color:interp.color}}>{interp.label}</div>
            </div>
          );
        })}
      </div>

      {/* Fila 1: Radar + Barras percentiles */}
      <div className="g2" style={{marginBottom:0}}>
        <div className="card" style={{marginBottom:16,display:'flex',flexDirection:'column',alignItems:'center'}}>
          <div className="card-title" style={{width:'100%'}}>🕸 Radar — última evaluación (percentiles)</div>
          <RadarC datos={radarDatos} color="#a855f7" size={200}/>
        </div>
        <div className="card" style={{marginBottom:16}}>
          <div className="card-title">📊 Percentiles por dimensión — última evaluación</div>
          <BarrasVC datos={barrasDims} color="#a855f7" alto={180} maxV={100}/>
        </div>
      </div>

      {/* Fila 2: Donut interpretaciones + línea Control Estrés */}
      <div className="g2" style={{marginBottom:0}}>
        <div className="card" style={{marginBottom:16}}>
          <div className="card-title">🍩 Distribución de interpretaciones</div>
          <div style={{marginTop:8}}><DonutC segmentos={donutInterp} size={140}/></div>
        </div>
        <div className="card" style={{marginBottom:16}}>
          <div className="card-title">📈 Evolución — Control del Estrés</div>
          <MiniLineC datos={lineaEstres} color="#34d399" alto={160}/>
        </div>
      </div>

      {/* Fila 3: línea Autoconfianza + línea Motivación */}
      <div className="g2" style={{marginBottom:0}}>
        <div className="card" style={{marginBottom:16}}>
          <div className="card-title">📈 Evolución — Autoconfianza</div>
          <MiniLineC datos={lineaAutoconf} color="#c084fc" alto={150}/>
        </div>
        <div className="card" style={{marginBottom:16}}>
          <div className="card-title">📈 Evolución — Cohesión</div>
          <MiniLineC datos={cprdList.map((ev,i)=>({lbl:labels[i],val:ev['cohesion_percentil']||0}))} color="#60a5fa" alto={150}/>
        </div>
      </div>

      {/* Líneas múltiples todas las dimensiones (si hay ≥2 evaluaciones) */}
      {cprdList.length>=2 && (
        <div className="card">
          <div className="card-title">📈 Evolución comparativa de todas las dimensiones (percentiles)</div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Eje Y: percentil 0–100</div>
          <LineasMultiC series={seriesEv} alto={220}/>
          <div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:10}}>
            {Object.entries(DIMS_INFO).map(([dim,info])=>(
              <div key={dim} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}>
                <div style={{width:16,height:3,background:info.color,borderRadius:2}}/>{info.label}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Líneas PD (puntuaciones directas) */}
      {cprdList.length>=2 && (
        <div className="card">
          <div className="card-title">📊 Evolución de Puntuaciones Directas (PD)</div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Los valores brutos antes de convertir a percentil</div>
          <LineasMultiC series={seriesPD} alto={200}/>
          <div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:10}}>
            {Object.entries(DIMS_INFO).map(([dim,info])=>(
              <div key={dim} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}>
                <div style={{width:16,height:3,background:info.color,borderRadius:2}}/>{info.label}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// CHAT DE EMERGENCIA
// ══════════════════════════════════════════════════════════════════════════════

function ChatEmergencia() {
  const {perfil} = useApp();
  const [mensajes, setMensajes] = useState([]);
  const [texto, setTexto]       = useState('');
  const [busy, setBusy]         = useState(false);
  const [loading, setLoading]   = useState(true);
  const bottomRef               = React.useRef(null);
  const inputRef                = React.useRef(null);
  const psicologaId             = perfil.psicologa_id;

  // Clave de canal única para este par jugador-psicóloga
  const canalId = psicologaId
    ? [perfil.id, psicologaId].sort().join('-')
    : null;

  const cargar = async () => {
    if(!psicologaId) { setLoading(false); return; }
    const {data} = await sb.from('chat_emergencia')
      .select('*')
      .or(`and(sender_id.eq.${perfil.id},receiver_id.eq.${psicologaId}),and(sender_id.eq.${psicologaId},receiver_id.eq.${perfil.id})`)
      .order('created_at', {ascending: true});
    setMensajes(data||[]);
    setLoading(false);
  };

  useEffect(()=>{
    if(!canalId) return;
    cargar();
    // Usamos Broadcast: funciona en tiempo real para mensajes de chat sin restricciones de filtro
    const ch = sb.channel('chat-'+canalId)
      .on('broadcast', {event:'nuevo-mensaje'}, (payload)=>{
        const msg = payload.payload;
        // Solo agregar si viene del otro lado (los propios ya se agregaron por optimistic)
        if(msg.sender_id !== perfil.id){
          setMensajes(prev=>{
            // Evitar duplicados
            if(prev.find(m=>m.id===msg.id)) return prev;
            return [...prev, msg];
          });
        }
      })
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[canalId]);

  useEffect(()=>{
    bottomRef.current?.scrollIntoView({behavior:'smooth'});
  },[mensajes]);

  const enviar = async (e) => {
    e?.preventDefault();
    if(!texto.trim()||busy||!psicologaId||!canalId) return;
    const textoEnviar = texto.trim();
    setTexto('');
    const tempId = 'temp-'+Date.now();
    const tempMsg = {
      id: tempId,
      sender_id:   perfil.id,
      receiver_id: psicologaId,
      texto:       textoEnviar,
      urgente:     true,
      created_at:  new Date().toISOString(),
    };
    // Mostrar en pantalla inmediatamente
    setMensajes(prev=>[...prev, tempMsg]);
    setBusy(true);
    // Guardar en BD
    const {data} = await sb.from('chat_emergencia').insert({
      sender_id: perfil.id, receiver_id: psicologaId,
      texto: textoEnviar, urgente: true,
    }).select().single();
    if(data){
      // Reemplazar temp con el real
      setMensajes(prev=>prev.map(m=>m.id===tempId ? data : m));
      // Notificar a la psicóloga por broadcast
      await sb.channel('chat-'+canalId).send({
        type:'broadcast', event:'nuevo-mensaje', payload: data
      });
    }
    setBusy(false);
    inputRef.current?.focus();
  };

  const fmtHora  = d=>d?new Date(d).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'';
  const fmtFecha = d=>d?new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'short'}):'';
  const grupos   = mensajes.reduce((acc,m)=>{const k=fmtFecha(m.created_at);if(!acc[k])acc[k]=[];acc[k].push(m);return acc;},{});

  if(!psicologaId) return (
    <div className="animate-in">
      <div className="ph"><div className="page-title">Canal de Emergencia</div></div>
      <div className="empty"><div className="empty-icon" style={{fontSize:40,marginBottom:12}}>
        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="#a855f7" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div><div>Primero tenés que tener una psicóloga asignada.</div></div>
    </div>
  );

  return (
    <div className="animate-in" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 72px)'}}>
      {/* Header */}
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,#dc2626,#b91c1c)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(220,38,38,.4)',animation:'pulseRing 2s ease-in-out infinite'}}>
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" strokeWidth="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <div>
            <div className="page-title" style={{background:'linear-gradient(90deg,#f87171,#fca5a5)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Canal de Emergencia</div>
            <div className="page-sub" style={{marginBottom:0}}>Chat directo con tu psicóloga · En vivo</div>
          </div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6,background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)',borderRadius:20,padding:'4px 12px'}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:'#4ade80',animation:'pulseRing 1.5s ease-in-out infinite'}}/>
            <span style={{fontSize:11,color:'#4ade80',fontWeight:600}}>En vivo</span>
          </div>
        </div>
        <div style={{height:1,background:'linear-gradient(90deg,rgba(220,38,38,.4),transparent)',marginTop:16}}/>
      </div>

      {/* Mensajes */}
      <div style={{flex:1,overflowY:'auto',paddingRight:4,marginBottom:16}}>
        {loading && <div style={{color:'var(--muted)',textAlign:'center',padding:20}}>Cargando mensajes…</div>}
        {!loading && mensajes.length===0 && (
          <div style={{textAlign:'center',padding:'60px 20px'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:12}}>
              <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#a855f7" strokeWidth="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div style={{fontSize:15,fontWeight:600,color:'var(--text)',marginBottom:6}}>Canal de emergencia listo</div>
            <div style={{fontSize:13,color:'var(--muted)'}}>Escribí tu mensaje y tu psicóloga lo recibirá en tiempo real.</div>
          </div>
        )}
        {Object.entries(grupos).map(([fecha,msgs])=>(
          <div key={fecha}>
            <div style={{textAlign:'center',margin:'16px 0 12px'}}>
              <span style={{fontSize:11,color:'var(--muted)',background:'var(--bg3)',padding:'3px 12px',borderRadius:20,border:'1px solid var(--brd)'}}>{fecha}</span>
            </div>
            {msgs.map((m,i)=>{
              const esMio = m.sender_id === perfil.id;
              const esTemp = String(m.id).startsWith('temp-');
              return (
                <div key={m.id||i} style={{display:'flex',justifyContent:esMio?'flex-end':'flex-start',marginBottom:10}}>
                  <div style={{maxWidth:'72%'}}>
                    {!esMio && <div style={{fontSize:10,color:'var(--muted)',marginBottom:3,paddingLeft:4}}>Psicóloga</div>}
                    <div style={{
                      background: esMio ? 'linear-gradient(135deg,#dc2626,#b91c1c)' : 'linear-gradient(135deg,var(--bg3),var(--bg4))',
                      border: esMio ? 'none' : '1px solid var(--brd2)',
                      borderRadius: esMio ? '18px 18px 4px 18px' : '18px 18px 18px 4px',
                      padding:'10px 14px',
                      opacity: esTemp ? 0.7 : 1,
                      transition: 'opacity .3s',
                      boxShadow: esMio ? '0 4px 14px rgba(220,38,38,.3)' : '0 2px 8px rgba(0,0,0,.3)',
                    }}>
                      <div style={{fontSize:14,color:'#fff',lineHeight:1.5,wordBreak:'break-word'}}>{m.texto}</div>
                      <div style={{fontSize:10,color:esMio?'rgba(255,255,255,.6)':'var(--muted)',marginTop:4,textAlign:'right',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4}}>
                        {fmtHora(m.created_at)}
                        {esMio && !esTemp && <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="rgba(255,255,255,.6)" strokeWidth="2"><polyline points="1,8 5,12 15,4"/></svg>}
                        {esMio && esTemp && <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="rgba(255,255,255,.4)" strokeWidth="2"><circle cx="8" cy="8" r="6"/></svg>}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid rgba(220,38,38,.25)',borderRadius:16,padding:'12px 16px',display:'flex',gap:10,alignItems:'flex-end'}}>
        <textarea
          ref={inputRef}
          className="fc"
          value={texto}
          onChange={e=>setTexto(e.target.value)}
          onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();} }}
          placeholder="Escribí tu mensaje… (Enter para enviar)"
          rows={2}
          style={{flex:1,resize:'none',borderColor:'rgba(220,38,38,.3)',background:'var(--bg)',minHeight:44}}
        />
        <button onClick={enviar} disabled={busy||!texto.trim()}
          style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',color:'#fff',border:'none',borderRadius:12,padding:'0 20px',height:52,cursor:'pointer',display:'flex',alignItems:'center',gap:8,fontSize:14,fontWeight:700,fontFamily:'DM Sans',boxShadow:'0 4px 16px rgba(220,38,38,.35)',flexShrink:0,opacity:busy||!texto.trim()?0.4:1,transition:'all .2s'}}>
          {busy ? <div className="spin"/> : <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>}
          Enviar
        </button>
      </div>
    </div>
  );
}

// ── PSICÓLOGA: ver todos los chats de emergencia ──────────────────────────────
function ChatEmergenciaPsi() {
  const {perfil} = useApp();
  const [jugadores, setJugadores] = useState([]);
  const [selJ, setSelJ]           = useState(null);
  const [mensajes, setMensajes]   = useState([]);
  const [texto, setTexto]         = useState('');
  const [busy, setBusy]           = useState(false);
  const [loading, setLoading]     = useState(false);
  const [noLeidos, setNoLeidos]   = useState({});
  const bottomRef                 = React.useRef(null);
  const inputRef                  = React.useRef(null);
  const selJRef                   = React.useRef(null);

  useEffect(()=>{ selJRef.current = selJ; },[selJ]);

  useEffect(()=>{
    sb.from('perfiles').select('*').eq('rol','jugador').eq('psicologa_id',perfil.id).order('nombre')
      .then(({data})=>setJugadores(data||[]));
  },[]);

  // Suscribir broadcast de todos los jugadores de esta psicóloga
  useEffect(()=>{
    if(jugadores.length===0) return;
    const channels = jugadores.map(j=>{
      const canalId = [perfil.id, j.id].sort().join('-');
      return sb.channel('chat-'+canalId)
        .on('broadcast',{event:'nuevo-mensaje'},(payload)=>{
          const msg = payload.payload;
          const jActual = selJRef.current;
          if(msg.sender_id !== perfil.id){
            if(jActual && msg.sender_id===jActual.id){
              // Mostrar en el chat activo
              setMensajes(prev=>{ if(prev.find(m=>m.id===msg.id)) return prev; return [...prev,msg]; });
              sb.from('chat_emergencia').update({leido:true}).eq('id',msg.id);
            } else {
              // Sumar a no leídos
              setNoLeidos(prev=>({...prev,[msg.sender_id]:(prev[msg.sender_id]||0)+1}));
            }
          }
        })
        .subscribe();
    });
    return ()=>channels.forEach(ch=>sb.removeChannel(ch));
  },[jugadores]);

  const selJugador = async (j) => {
    setSelJ(j); setLoading(true);
    const {data} = await sb.from('chat_emergencia')
      .select('*')
      .or(`and(sender_id.eq.${j.id},receiver_id.eq.${perfil.id}),and(sender_id.eq.${perfil.id},receiver_id.eq.${j.id})`)
      .order('created_at',{ascending:true});
    setMensajes(data||[]);
    setLoading(false);
    sb.from('chat_emergencia').update({leido:true}).eq('receiver_id',perfil.id).eq('sender_id',j.id);
    setNoLeidos(prev=>({...prev,[j.id]:0}));
  };

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[mensajes]);

  const enviar = async (e) => {
    e?.preventDefault();
    if(!texto.trim()||busy||!selJ) return;
    const textoEnviar = texto.trim();
    setTexto('');
    const tempId = 'temp-'+Date.now();
    const tempMsg = { id:tempId, sender_id:perfil.id, receiver_id:selJ.id, texto:textoEnviar, urgente:false, created_at:new Date().toISOString() };
    setMensajes(prev=>[...prev, tempMsg]);
    setBusy(true);
    const canalId = [perfil.id, selJ.id].sort().join('-');
    const {data} = await sb.from('chat_emergencia').insert({
      sender_id:perfil.id, receiver_id:selJ.id, texto:textoEnviar, urgente:false
    }).select().single();
    if(data){
      setMensajes(prev=>prev.map(m=>m.id===tempId?data:m));
      await sb.channel('chat-'+canalId).send({type:'broadcast',event:'nuevo-mensaje',payload:data});
    }
    setBusy(false);
    inputRef.current?.focus();
  };

  const fmtHora  = d=>d?new Date(d).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}):'';
  const fmtFecha = d=>d?new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'short'}):'';
  const grupos   = mensajes.reduce((acc,m)=>{const k=fmtFecha(m.created_at);if(!acc[k])acc[k]=[];acc[k].push(m);return acc;},{});
  const totalNoLeidos = Object.values(noLeidos).reduce((a,b)=>a+b,0);

  return (
    <div className="animate-in" style={{display:'flex',flexDirection:'column',height:'calc(100vh - 72px)'}}>
      <div style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:12}}>
          <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,#dc2626,#b91c1c)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(220,38,38,.4)'}}>
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" strokeWidth="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <div>
            <div className="page-title" style={{background:'linear-gradient(90deg,#f87171,#fca5a5)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Canal de Emergencias</div>
            <div className="page-sub" style={{marginBottom:0}}>Mensajes en tiempo real de tus jugadores</div>
          </div>
          {totalNoLeidos>0 && (
            <div style={{marginLeft:'auto',background:'#dc2626',borderRadius:20,padding:'4px 14px',fontSize:12,fontWeight:700,color:'#fff',boxShadow:'0 4px 12px rgba(220,38,38,.4)'}}>
              {totalNoLeidos} sin leer
            </div>
          )}
        </div>
        <div style={{height:1,background:'linear-gradient(90deg,rgba(220,38,38,.4),transparent)'}}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:16,flex:1,minHeight:0}}>
        {/* Lista jugadores */}
        <div style={{overflowY:'auto'}}>
          {jugadores.length===0 && <div style={{fontSize:13,color:'var(--muted)'}}>Sin jugadores.</div>}
          {jugadores.map(j=>{
            const nl=noLeidos[j.id]||0;
            return (
              <div key={j.id} onClick={()=>selJugador(j)}
                style={{cursor:'pointer',padding:'10px 14px',borderRadius:10,marginBottom:8,background:selJ?.id===j.id?'rgba(220,38,38,.12)':'var(--bg2)',border:`1px solid ${selJ?.id===j.id?'rgba(220,38,38,.4)':'var(--brd)'}`,transition:'all .2s',position:'relative'}}>
                <div style={{fontWeight:600,fontSize:13,color:'var(--text)'}}>{j.nombre||j.email}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{j.posicion||'Jugador'}</div>
                {nl>0 && <div style={{position:'absolute',top:8,right:8,background:'#dc2626',borderRadius:'50%',width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#fff'}}>{nl}</div>}
              </div>
            );
          })}
        </div>

        {/* Chat */}
        {!selJ ? (
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,color:'var(--muted)'}}>
            <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="var(--muted)" strokeWidth="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <div style={{fontSize:13}}>Seleccioná un jugador para ver su chat</div>
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',minHeight:0}}>
            <div style={{padding:'8px 0 12px',borderBottom:'1px solid var(--brd)',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{selJ.nombre||selJ.email}</div>
                <div style={{display:'flex',alignItems:'center',gap:5,marginTop:2}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:'#4ade80',animation:'pulseRing 1.5s ease-in-out infinite'}}/>
                  <span style={{fontSize:11,color:'#4ade80'}}>En vivo</span>
                </div>
              </div>
            </div>

            <div style={{flex:1,overflowY:'auto',paddingRight:4,marginBottom:12}}>
              {loading && <div style={{color:'var(--muted)',textAlign:'center',padding:20}}>Cargando…</div>}
              {!loading && mensajes.length===0 && <div style={{textAlign:'center',padding:'40px 20px',color:'var(--muted)',fontSize:13}}>Sin mensajes todavía.</div>}
              {Object.entries(grupos).map(([fecha,msgs])=>(
                <div key={fecha}>
                  <div style={{textAlign:'center',margin:'12px 0 10px'}}>
                    <span style={{fontSize:11,color:'var(--muted)',background:'var(--bg3)',padding:'3px 10px',borderRadius:20,border:'1px solid var(--brd)'}}>{fecha}</span>
                  </div>
                  {msgs.map((m,i)=>{
                    const esMio=m.sender_id===perfil.id;
                    const esTemp=String(m.id).startsWith('temp-');
                    return (
                      <div key={m.id||i} style={{display:'flex',justifyContent:esMio?'flex-end':'flex-start',marginBottom:8}}>
                        <div style={{maxWidth:'72%'}}>
                          {!esMio && <div style={{fontSize:10,color:'var(--muted)',marginBottom:2,paddingLeft:4}}>{selJ.nombre||selJ.email}</div>}
                          <div style={{
                            background:esMio?'linear-gradient(135deg,var(--purple),var(--purple2))':'linear-gradient(135deg,#991b1b,#7f1d1d)',
                            border:esMio?'none':'1px solid rgba(220,38,38,.3)',
                            borderRadius:esMio?'18px 18px 4px 18px':'18px 18px 18px 4px',
                            padding:'10px 14px',opacity:esTemp?0.7:1,transition:'opacity .3s',
                            boxShadow:esMio?'0 4px 14px rgba(109,40,217,.3)':'0 4px 14px rgba(220,38,38,.2)',
                          }}>
                            {!esMio&&m.urgente&&<div style={{fontSize:10,color:'#fca5a5',fontWeight:700,marginBottom:4,display:'flex',alignItems:'center',gap:4}}><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>URGENTE</div>}
                            <div style={{fontSize:14,color:'#fff',lineHeight:1.5,wordBreak:'break-word'}}>{m.texto}</div>

                            </div>

              <textarea ref={inputRef} className="fc" value={texto} onChange={e=>setTexto(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();} }}
                placeholder="Respondé al jugador… (Enter para enviar)"
                rows={2} style={{flex:1,resize:'none',background:'var(--bg)',minHeight:44}}/>
              <button onClick={enviar} disabled={busy||!texto.trim()}
                style={{background:'linear-gradient(135deg,var(--purple),var(--purple2))',color:'#fff',border:'none',borderRadius:12,padding:'0 18px',height:52,cursor:'pointer',display:'flex',alignItems:'center',gap:8,fontSize:14,fontWeight:700,fontFamily:'DM Sans',boxShadow:'0 4px 14px rgba(109,40,217,.3)',flexShrink:0,opacity:busy||!texto.trim()?0.4:1,transition:'all .2s'}}>
