// ═══════════════════════════════════════════════════════════
function GraficosJugador() {
  const {perfil} = useApp();
  const [stats,setStats]         = useState([]);
  const [diags,setDiags]         = useState([]);
  const [resps,setResps]         = useState([]);
  const [cprdEvals,setCprdEvals] = useState([]);
  const [fodaEvals,setFodaEvals] = useState([]);
  const [loading,setLoading]     = useState(true);
  const [seccion,setSeccion]     = useState('formularios');

  useEffect(()=>{
    const load = async () => {
      const [s,d,r,pregs,cprd,foda] = await Promise.all([
        sb.from('estadisticas_partidos').select('*').eq('jugador_id',perfil.id).order('created_at',{ascending:true}),
        sb.from('diagnosticos').select('*').eq('jugador_id',perfil.id).order('created_at',{ascending:true}),
        sb.from('respuestas').select('*').eq('jugador_id',perfil.id).order('created_at',{ascending:true}),
        sb.from('preguntas_formulario').select('id,texto,tipo'),
        sb.from('evaluaciones_cprd').select('*').eq('jugador_id',perfil.id).order('created_at',{ascending:true}),
        sb.from('evaluaciones_foda').select('*').eq('jugador_id',perfil.id).order('created_at',{ascending:true}),
      ]);
      const pregMap = (pregs.data||[]).reduce((acc,p)=>({...acc,[p.id]:p}),{});
      setStats(s.data||[]);
      setDiags(d.data||[]);
      setResps((r.data||[]).map(x=>({...x,preguntas_formulario:pregMap[x.pregunta_id]||null})));
      setCprdEvals(cprd.data||[]);
      setFodaEvals(foda.data||[]);
      setLoading(false);
    };
    load();
  },[]);

  if(loading) return <div style={{color:'var(--muted)',padding:20}}>Cargando gráficos…</div>;

  // ── helpers ──
  const fmt2 = d => d ? new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) : '';
  const COLS  = ['#a855f7','#34d399','#60a5fa','#fb923c','#f472b6','#facc15'];

  // ── respuestas escala (formularios) ──
  const respEscala = resps.filter(r=>{
    const n = Number(r.respuesta);
    return !isNaN(n) && n>=1 && n<=10;
  });
  const pregUnicas = [...new Map(respEscala.map(r=>[r.pregunta_id, r.preguntas_formulario?.texto||''])).entries()].slice(0,6);
  const respPorPreg = pregUnicas.map(([pid,txt])=>{
    const vals = respEscala.filter(r=>r.pregunta_id===pid);
    const prom = vals.length ? Math.round(vals.reduce((a,r)=>a+Number(r.respuesta),0)/vals.length*10)/10 : 0;
    return { pid, txt: txt.slice(0,32)+(txt.length>32?'…':''), vals, prom };
  });

  // ── KPIs formularios ──
  const promGen   = respEscala.length ? Math.round(respEscala.reduce((a,r)=>a+Number(r.respuesta),0)/respEscala.length*10)/10 : 0;
  const ultimas5  = respEscala.slice(-5);
  const promUlt   = ultimas5.length ? Math.round(ultimas5.reduce((a,r)=>a+Number(r.respuesta),0)/ultimas5.length*10)/10 : 0;
  const trend     = respEscala.length>5 ? +(promUlt-promGen).toFixed(1) : null;

  // ── SVG helpers ──
  const W=560, PL=8, PR=8, PT=24, PB=40;

  // MINI LINE CHART SVG
  const MiniLine = ({datos, color, alto=140}) => {
    if(!datos||datos.length<2) return <div style={{color:'var(--muted)',fontSize:12,padding:20}}>Necesitás al menos 2 registros.</div>;
    const vals = datos.map(d=>d.val);
    const mx=Math.max(...vals,1), mn=Math.min(...vals,0), rng=mx-mn||1;
    const H=alto-PT-PB;
    const xs=datos.map((_,i)=>PL+i*(W-PL-PR)/(datos.length-1));
    const ys=datos.map(d=>PT+H-((d.val-mn)/rng)*H);
    const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(' ');
    const area=`M${xs[0]},${PT+H} ${xs.map((x,i)=>`L${x},${ys[i]}`).join(' ')} L${xs[xs.length-1]},${PT+H} Z`;
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
        <defs><linearGradient id={`lg-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
        {[0,.25,.5,.75,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
        <path d={area} fill={`url(#lg-${color.replace('#','')})`}/>
        <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {xs.map((x,i)=>(
          <g key={i}>
            <circle cx={x} cy={ys[i]} r="4.5" fill="var(--bg2)" stroke={color} strokeWidth="2"/>
            <text x={x} y={ys[i]-10} textAnchor="middle" style={{fontSize:'11px',fill:color,fontWeight:700,fontFamily:'DM Sans'}}>{datos[i].val}</text>
            <text x={x} y={PT+H+16} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{datos[i].lbl}</text>
          </g>
        ))}
      </svg>
    );
  };

  // BARRAS VERTICALES
  const BarrasV = ({datos, color='#a855f7', alto=160, maxV=null}) => {
    if(!datos||datos.length===0) return <div style={{color:'var(--muted)',fontSize:12,padding:20}}>Sin datos.</div>;
    const mx = maxV || Math.max(...datos.map(d=>d.val),1);
    const H=alto-PT-PB, bW=Math.max(14, Math.floor((W-PL-PR)/datos.length)-8);
    const gap=Math.floor((W-PL-PR-bW*datos.length)/Math.max(datos.length-1,1));
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
        {[0,.25,.5,.75,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
        {datos.map((d,i)=>{
          const x=PL+i*(bW+gap), h=Math.max(3,(d.val/mx)*H), y=PT+H-h;
          const isMax=d.val===Math.max(...datos.map(x=>x.val));
          return <g key={i}>
            <rect x={x} y={y} width={bW} height={h} rx="4" fill={isMax?color:`${color}55`} style={{transition:'all .3s'}}/>
            <text x={x+bW/2} y={y-5} textAnchor="middle" style={{fontSize:'10px',fill:color,fontWeight:700,fontFamily:'DM Sans'}}>{d.val}</text>
            <text x={x+bW/2} y={PT+H+14} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{d.lbl}</text>
          </g>;
        })}
      </svg>
    );
  };

  // BARRAS AGRUPADAS
  const BarrasGrupo = ({datos, color1='#a855f7', color2='#34d399', lbl1='A', lbl2='B', alto=160}) => {
    if(!datos||datos.length===0) return <div style={{color:'var(--muted)',fontSize:12,padding:20}}>Sin datos.</div>;
    const mx=Math.max(...datos.map(d=>Math.max(d.v1||0,d.v2||0)),1);
    const H=alto-PT-PB, slot=Math.floor((W-PL-PR)/datos.length), bW=Math.max(8,Math.floor(slot*.35));
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
        {[0,.5,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
        {datos.map((d,i)=>{
          const cx=PL+i*slot+slot/2, h1=Math.max(2,((d.v1||0)/mx)*H), h2=Math.max(2,((d.v2||0)/mx)*H);
          return <g key={i}>
            <rect x={cx-bW-2} y={PT+H-h1} width={bW} height={h1} rx="3" fill={color1}/>
            <rect x={cx+2}    y={PT+H-h2} width={bW} height={h2} rx="3" fill={color2}/>
            <text x={cx} y={PT+H+14} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{d.lbl}</text>
          </g>;
        })}
        <circle cx={W-80} cy={PT+4} r="5" fill={color1}/><text x={W-72} y={PT+8} style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{lbl1}</text>
        <circle cx={W-40} cy={PT+4} r="5" fill={color2}/><text x={W-32} y={PT+8} style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{lbl2}</text>
      </svg>
    );
  };

  // DONUT
  const Donut = ({segmentos, titulo='', size=160}) => {
    if(!segmentos||segmentos.length===0) return null;
    const total=segmentos.reduce((a,s)=>a+s.val,0)||1;
    const cx=size/2, cy=size/2, r=size*.36, ri=size*.22;
    let angle=-Math.PI/2;
    const arcs = segmentos.map(s=>{
      const a=s.val/total*Math.PI*2;
      const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
      angle+=a;
      const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
      const xi1=cx+ri*Math.cos(angle-a), yi1=cy+ri*Math.sin(angle-a);
      const xi2=cx+ri*Math.cos(angle),   yi2=cy+ri*Math.sin(angle);
      const lg=a>Math.PI?1:0;
      return {path:`M${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg} 0 ${xi1},${yi1} Z`, color:s.color, lbl:s.lbl, val:s.val, pct:Math.round(s.val/total*100)};
    });
    return (
      <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {arcs.map((a,i)=><path key={i} d={a.path} fill={a.color} opacity=".9"/>)}
          <text x={cx} y={cy-4} textAnchor="middle" style={{fontSize:'11px',fill:'var(--muted)',fontFamily:'DM Sans'}}>Total</text>
          <text x={cx} y={cy+12} textAnchor="middle" style={{fontFamily:"'Bebas Neue'",fontSize:'20px',fill:'var(--text)'}}>{total}</text>
        </svg>
        <div style={{flex:1}}>
          {arcs.map((a,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:a.color,flexShrink:0}}/>
              <div style={{fontSize:12,color:'var(--text2)',flex:1}}>{a.lbl}</div>
              <div style={{fontWeight:700,fontSize:13,color:a.color}}>{a.pct}%</div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // BARRAS HORIZONTALES
  const BarrasH = ({datos, colorA='#a855f7', colorB='#34d399', maxVal=10}) => {
    if(!datos||datos.length===0) return <div style={{color:'var(--muted)',fontSize:12,padding:12}}>Sin datos.</div>;
    return (
      <div>
        {datos.map((d,i)=>(
          <div key={i} style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:11,color:'var(--muted)'}}>{d.lbl}</span>
              <span style={{fontSize:11,fontWeight:700,color:colorA}}>{d.valA}</span>
            </div>
            <div style={{display:'flex',gap:3,flexDirection:'column'}}>
              <div style={{background:'rgba(255,255,255,.06)',borderRadius:3,height:7,overflow:'hidden'}}>
                <div style={{height:'100%',background:colorA,width:`${(d.valA/maxVal)*100}%`,borderRadius:3,transition:'width .5s ease'}}/>
              </div>
              {d.valB!==undefined && <div style={{background:'rgba(255,255,255,.06)',borderRadius:3,height:7,overflow:'hidden'}}>
                <div style={{height:'100%',background:colorB,width:`${(d.valB/maxVal)*100}%`,borderRadius:3,transition:'width .5s ease'}}/>
              </div>}
            </div>
          </div>
        ))}
        {datos[0]?.valB!==undefined && (
          <div style={{display:'flex',gap:16,marginTop:8}}>
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}><div style={{width:12,height:4,background:colorA,borderRadius:2}}/>{datos[0].lblA||'Mi promedio'}</div>
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}><div style={{width:12,height:4,background:colorB,borderRadius:2}}/>{datos[0].lblB||'Referencia'}</div>
          </div>
        )}
      </div>
    );
  };

  // RADAR
  const Radar = ({datos, color='#a855f7', size=220}) => {
    if(!datos||datos.length<3) return null;
    const n=datos.length, cx=size/2, cy=size/2, r=size*.36;
    const ang=i=>(Math.PI*2*i/n)-Math.PI/2;
    const pt=(i,rad)=>({x:cx+rad*Math.cos(ang(i)), y:cy+rad*Math.sin(ang(i))});
    const mx=Math.max(...datos.map(d=>d.val),1);
    const poly=datos.map((d,i)=>{const p=pt(i,(d.val/mx)*r);return `${p.x},${p.y}`;}).join(' ');
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {[.25,.5,.75,1].map(f=>{
          const pts=datos.map((_,i)=>{const p=pt(i,r*f);return `${p.x},${p.y}`;}).join(' ');
          return <polygon key={f} points={pts} fill="none" stroke="rgba(168,85,247,.15)" strokeWidth="1"/>;
        })}
        {datos.map((_,i)=>{const p=pt(i,r);return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(168,85,247,.15)" strokeWidth="1"/>;} )}
        <polygon points={poly} fill={color} fillOpacity=".18" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
        {datos.map((d,i)=>{
          const p=pt(i,(d.val/mx)*r), pl=pt(i,r+22);
          return <g key={i}>
            <circle cx={p.x} cy={p.y} r="4" fill={color}/>
            <text x={pl.x} y={pl.y+4} textAnchor="middle" style={{fontSize:'10px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{d.lbl}</text>
          </g>;
        })}
      </svg>
    );
  };

  // LÍNEAS MÚLTIPLES
  const LineasMulti = ({series, alto=180, maxVal=null}) => {
    if(!series||series.length===0) return null;
    const allVals=series.flatMap(s=>s.datos.map(d=>d.y));
    const mx=maxVal||Math.max(...allVals,1), mn=Math.min(...allVals,0), rng=mx-mn||1;
    const maxLen=Math.max(...series.map(s=>s.datos.length),2);
    const H=alto-PT-PB;
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
        {[0,.25,.5,.75,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
        {series.map(serie=>{
          const xs=serie.datos.map((_,i)=>PL+i*(W-PL-PR)/(maxLen-1));
          const ys=serie.datos.map(d=>PT+H-((d.y-mn)/rng)*H);
          const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(' ');
          return <g key={serie.lbl}>
            <path d={path} fill="none" stroke={serie.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
            {xs.map((x,i)=><circle key={i} cx={x} cy={ys[i]} r="4" fill="var(--bg2)" stroke={serie.color} strokeWidth="2"/>)}
          </g>;
        })}
        {series[0]?.datos.map((d,i)=>{
          const x=PL+i*(W-PL-PR)/(maxLen-1);
          return <text key={i} x={x} y={PT+H+16} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{d.x}</text>;
        })}
      </svg>
    );
  };

  // ── DATOS PARA GRÁFICOS ──────────────────────────────────────────
  // 1. Evolución promedio de respuestas por fecha
  const respPorFecha = Object.entries(
    respEscala.reduce((acc,r)=>{
      const k=fmt2(r.created_at);
      if(!acc[k]) acc[k]={sum:0,cnt:0};
      acc[k].sum+=Number(r.respuesta); acc[k].cnt++;
      return acc;
    },{})
  ).slice(-8).map(([k,v])=>({lbl:k, val:Math.round(v.sum/v.cnt*10)/10}));

  // 2. Distribución de respuestas (donut)
  const donutDist = [
    {lbl:'Alta (7-10)', val:respEscala.filter(r=>Number(r.respuesta)>=7).length, color:'#34d399'},
    {lbl:'Media (4-6)', val:respEscala.filter(r=>Number(r.respuesta)>=4&&Number(r.respuesta)<7).length, color:'#a855f7'},
    {lbl:'Baja (1-3)',  val:respEscala.filter(r=>Number(r.respuesta)<4&&Number(r.respuesta)>=1).length, color:'#f87171'},
  ].filter(s=>s.val>0);

  // 3. Promedio por pregunta (barras horizontales)
  const barrasProms = respPorPreg.map((p,i)=>({lbl:p.txt, valA:p.prom, valB:6.5, lblA:'Mi prom', lblB:'Ref 6.5'}));

  // 4. Barras verticales — cantidad de respuestas por formulario
  const respPorForm = Object.entries(
    resps.reduce((acc,r)=>{
      const k=r.formulario_id;
      if(!acc[k]) acc[k]=0; acc[k]++; return acc;
    },{})
  ).slice(-8).map(([k,v],i)=>({lbl:`F${i+1}`, val:v}));

  // 5. CPRD: evolución percentiles por dimensión
  const cprdLabels = cprdEvals.map((_,i)=>`Ev ${i+1}`);
  const cprdSeries = Object.entries(DIMS_INFO).map(([dim,info])=>({
    lbl:info.label, color:info.color,
    datos:cprdEvals.map((ev,i)=>({x:cprdLabels[i], y:ev[dim+'_percentil']||0})),
  }));

  // 6. CPRD última: radar
  const ultimaCPRD = cprdEvals.length>0 ? cprdEvals[cprdEvals.length-1] : null;
  const radarCPRD  = ultimaCPRD ? Object.entries(DIMS_INFO).map(([dim,info])=>({lbl:info.label.split(' ')[0], val:ultimaCPRD[dim+'_percentil']||0})) : [];

  // 7. CPRD: barras por dimensión (última eval)
  const barrasCPRD = ultimaCPRD ? Object.entries(DIMS_INFO).map(([dim,info])=>({lbl:info.label.split(' ')[0], val:ultimaCPRD[dim+'_percentil']||0})) : [];

  // 8. Actividad por mes (barras agrupadas: respuestas vs CPRD)
  const meses = [...new Set([
    ...respEscala.map(r=>new Date(r.created_at).toLocaleDateString('es-AR',{month:'short',year:'2-digit'})),
    ...cprdEvals.map(e=>new Date(e.created_at).toLocaleDateString('es-AR',{month:'short',year:'2-digit'})),
  ])].slice(-6);
  const actividadMes = meses.map(m=>({
    lbl:m,
    v1:respEscala.filter(r=>new Date(r.created_at).toLocaleDateString('es-AR',{month:'short',year:'2-digit'})===m).length,
    v2:cprdEvals.filter(e=>new Date(e.created_at).toLocaleDateString('es-AR',{month:'short',year:'2-digit'})===m).length,
  }));

  // 9. Evolución por pregunta individual (líneas múltiples)
  const seriesPregs = respPorPreg.slice(0,4).map((p,i)=>({
    lbl:p.txt, color:COLS[i],
    datos:p.vals.slice(-6).map((r,j)=>({x:`${j+1}`,y:Number(r.respuesta)})),
  }));

  // 10. Donut FODA completados vs no (por partido)
  const fodaConPartido = fodaEvals.filter(e=>e.partido_id).length;
  const fodaSinPartido = fodaEvals.filter(e=>!e.partido_id).length;
  const donutFoda = [
    {lbl:'Con partido', val:fodaConPartido, color:'#60a5fa'},
    {lbl:'General',     val:fodaSinPartido, color:'#a855f7'},
  ].filter(s=>s.val>0);

  const SECCIONES = [
    {id:'formularios', lbl:'📋 Formularios'},
    {id:'cprd',        lbl:'🧠 CPRD'},
    {id:'actividad',   lbl:'📅 Actividad'},
  ];

  const hayDatos = respEscala.length>0 || cprdEvals.length>0;

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div>
          <div className="page-title">Mi Progreso</div>
          <div className="page-sub">Dashboard de evolución psicológica</div>
        </div>
      </div>
      <div className="page-divider"/>

      {!hayDatos ? (
        <div className="empty"><div className="empty-icon">📊</div><div>Completá formularios o evaluaciones CPRD para ver tus gráficos.</div></div>
      ) : <>

        {/* KPIs globales */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12,marginBottom:24}}>
          {[
            {lbl:'Respuestas totales', val:respEscala.length, col:'#a855f7'},
            {lbl:'Promedio general',   val:promGen,          col:'#34d399'},
            {lbl:'Evaluaciones CPRD',  val:cprdEvals.length, col:'#60a5fa'},
            {lbl:'FODA completados',   val:fodaEvals.length, col:'#fb923c'},
            {lbl:'Diagnósticos',       val:diags.length,     col:'#f472b6'},
            {lbl:'Formularios respon.',val:[...new Set(resps.map(r=>r.formulario_id))].length, col:'#facc15'},
          ].map((k,i)=>(
            <div key={i} style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--brd2)',borderRadius:'var(--r)',padding:'16px 18px',position:'relative',overflow:'hidden',animation:`fadeUp .4s ease ${i*.06}s both`}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:k.col}}/>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:36,color:k.col,lineHeight:1}}>{k.val}</div>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:4,textTransform:'uppercase',letterSpacing:.8}}>{k.lbl}</div>
            </div>
          ))}
        </div>

        {/* Tabs secciones */}
        <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
          {SECCIONES.map(s=>(
            <button key={s.id} onClick={()=>setSeccion(s.id)} style={{padding:'8px 18px',borderRadius:8,border:`1px solid ${seccion===s.id?'var(--purple3)':'var(--brd2)'}`,background:seccion===s.id?'rgba(168,85,247,.15)':'transparent',color:seccion===s.id?'var(--accent)':'var(--muted)',cursor:'pointer',fontSize:13,fontFamily:'DM Sans',fontWeight:seccion===s.id?700:400,transition:'all .2s'}}>
              {s.lbl}
            </button>
          ))}
        </div>

        {/* ── SECCIÓN FORMULARIOS ── */}
        {seccion==='formularios' && <>
          {respEscala.length===0 ? (
            <div className="empty"><div className="empty-icon">📋</div><div>Todavía no respondiste formularios con preguntas de escala.</div></div>
          ) : <>
            {/* Fila 1: línea evolución + donut */}
            <div className="g2" style={{marginBottom:0}}>
              <div className="card" style={{marginBottom:16}}>
                <div className="card-title">📈 Evolución del promedio de respuestas</div>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Promedio de todas las preguntas por fecha</div>
                <MiniLine datos={respPorFecha} color="#a855f7" alto={160}/>
              </div>
              <div className="card" style={{marginBottom:16}}>
                <div className="card-title">🍩 Distribución de respuestas</div>
                <div style={{marginTop:8}}><Donut segmentos={donutDist} size={160}/></div>
              </div>
            </div>

            {/* Fila 2: barras verticales actividad + líneas por pregunta */}
            <div className="g2" style={{marginBottom:0}}>
              {respPorForm.length>0 && (
                <div className="card" style={{marginBottom:16}}>
                  <div className="card-title">📊 Respuestas por formulario</div>
                  <BarrasV datos={respPorForm} color="#60a5fa" alto={160}/>
                </div>
              )}
              {seriesPregs.length>0 && (
                <div className="card" style={{marginBottom:16}}>
                  <div className="card-title">📈 Evolución por pregunta</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Últimas 6 respuestas por pregunta</div>
                  <LineasMulti series={seriesPregs} alto={160}/>
                  <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:8}}>
                    {seriesPregs.map((s,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}><div style={{width:14,height:3,background:s.color,borderRadius:2}}/>{s.lbl}</div>)}
                  </div>
                </div>
              )}
            </div>

            {/* Fila 3: promedio por pregunta barras H */}
            {barrasProms.length>0 && (
              <div className="card">
                <div className="card-title">📊 Tu promedio por pregunta vs referencia (6.5)</div>
                <BarrasH datos={barrasProms} colorA="#a855f7" colorB="#34d399" maxVal={10}/>
              </div>
            )}
          </>}
        </>}

        {/* ── SECCIÓN CPRD ── */}
        {seccion==='cprd' && <>
          {cprdEvals.length===0 ? (
            <div className="empty"><div className="empty-icon">🧠</div><div>Todavía no completaste ninguna evaluación CPRD.</div></div>
          ) : <>
            {/* Última evaluación tarjetas */}
            {ultimaCPRD && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:12,marginBottom:16}}>
                {Object.entries(DIMS_INFO).map(([dim,info])=>{
                  const pct=ultimaCPRD[dim+'_percentil'], pd=ultimaCPRD[dim+'_pd'], interp=getInterp(pct);
                  return (
                    <div key={dim} style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--brd2)',borderRadius:'var(--r)',padding:18,position:'relative',overflow:'hidden'}}>
                      <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:info.color}}/>
                      <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>{info.label}</div>
                      <div style={{fontFamily:"'Bebas Neue'",fontSize:40,color:info.color,lineHeight:1}}>{pd}</div>
                      <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>PD · Percentil <strong style={{color:info.color}}>{pct}</strong></div>
                      <div style={{marginTop:8,background:'rgba(255,255,255,.05)',borderRadius:3,height:5,overflow:'hidden'}}>
                        <div style={{height:'100%',background:info.color,width:pct+'%',borderRadius:3}}/>
                      </div>
                      <div style={{marginTop:5,fontSize:11,fontWeight:700,color:interp.color}}>{interp.label}</div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Fila: radar + barras percentiles */}
            <div className="g2" style={{marginBottom:0}}>
              {radarCPRD.length>=3 && (
                <div className="card" style={{marginBottom:16,display:'flex',flexDirection:'column',alignItems:'center'}}>
                  <div className="card-title" style={{width:'100%'}}>🕸 Radar — última evaluación</div>
                  <Radar datos={radarCPRD} color="#a855f7" size={220}/>
                </div>
              )}
              <div className="card" style={{marginBottom:16}}>
                <div className="card-title">📊 Percentiles — última evaluación</div>
                <BarrasV datos={barrasCPRD} color="#a855f7" alto={180} maxV={100}/>
              </div>
            </div>

            {/* Evolución por dimensión (líneas múltiples) */}
            {cprdEvals.length>=2 && (
              <div className="card">
                <div className="card-title">📈 Evolución de percentiles por dimensión</div>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Cada línea es una dimensión del CPRD a través del tiempo</div>
                <LineasMulti series={cprdSeries} alto={220} maxVal={100}/>
                <div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:10}}>
                  {Object.entries(DIMS_INFO).map(([dim,info])=>(
                    <div key={dim} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}>
                      <div style={{width:16,height:3,background:info.color,borderRadius:2}}/>{info.label}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </>}
        </>}

        {/* ── SECCIÓN ACTIVIDAD ── */}
        {seccion==='actividad' && <>
          {/* Barras agrupadas actividad por mes */}
          {actividadMes.length>0 && (
            <div className="card">
              <div className="card-title">📅 Actividad por mes</div>
              <BarrasGrupo datos={actividadMes} color1="#a855f7" color2="#60a5fa" lbl1="Resp. formularios" lbl2="CPRD completados" alto={200}/>
            </div>
          )}

          {/* FODA donut + diagnósticos */}
          <div className="g2" style={{marginBottom:0}}>
            {donutFoda.length>0 && (
              <div className="card" style={{marginBottom:16}}>
                <div className="card-title">🔍 FODA por contexto</div>
                <div style={{marginTop:8}}><Donut segmentos={donutFoda} size={150}/></div>
              </div>
            )}
            {diags.length>0 && (
              <div className="card" style={{marginBottom:16}}>
                <div className="card-title">🧠 Últimos diagnósticos</div>
                {diags.slice(-3).reverse().map((d,i)=>(
                  <div key={d.id} style={{background:'var(--bg3)',borderRadius:8,padding:12,marginBottom:8,border:'1px solid var(--brd)',borderLeft:`3px solid hsl(${270+i*25},70%,60%)`}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span className="badge b-purple" style={{fontSize:10}}>#{diags.length-i}</span>
                      <span style={{fontSize:10,color:'var(--muted)'}}>{fmt2(d.created_at)}</span>
                    </div>
                    <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>{d.texto?.slice(0,160)}{d.texto?.length>160?'…':''}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </>}
      </>}
    </div>
  );
}

// GRÁFICOS PSICÓLOGA
// ═══════════════════════════════════════════════════════════
function GraficosPsicologa() {
  const {perfil} = useApp();
  const [jugadores,setJugadores]   = useState([]);
  const [selJ,setSelJ]             = useState('');
  const [stats,setStats]           = useState([]);
  const [diags,setDiags]           = useState([]);
  const [resps,setResps]           = useState([]);
  const [cprdEvals,setCprdEvals]   = useState([]);
  const [fodaEvals,setFodaEvals]   = useState([]);
  const [loading,setLoading]       = useState(false);
  const [seccion,setSeccion]       = useState('formularios');

  useEffect(()=>{
    sb.from('perfiles').select('*').eq('rol','jugador').eq('psicologa_id',perfil.id).order('nombre')
      .then(({data})=>{ setJugadores(data||[]); if(data?.length) setSelJ(data[0].id); });
  },[]);

  useEffect(()=>{
    if(!selJ) return;
    setLoading(true);
    const load = async () => {
      const [s,d,r,pregs,cprd,foda] = await Promise.all([
        sb.from('estadisticas_partidos').select('*').eq('jugador_id',selJ).order('created_at',{ascending:true}),
        sb.from('diagnosticos').select('*').eq('jugador_id',selJ).order('created_at',{ascending:true}),
        sb.from('respuestas').select('*').eq('jugador_id',selJ).order('created_at',{ascending:true}),
        sb.from('preguntas_formulario').select('id,texto,tipo'),
        sb.from('evaluaciones_cprd').select('*').eq('jugador_id',selJ).order('created_at',{ascending:true}),
        sb.from('evaluaciones_foda').select('*').eq('jugador_id',selJ).order('created_at',{ascending:true}),
      ]);
      const pregMap=(pregs.data||[]).reduce((acc,p)=>({...acc,[p.id]:p}),{});
      setStats(s.data||[]);
      setDiags(d.data||[]);
      setResps((r.data||[]).map(x=>({...x,preguntas_formulario:pregMap[x.pregunta_id]||null})));
      setCprdEvals(cprd.data||[]);
      setFodaEvals(foda.data||[]);
      setLoading(false);
    };
    load();
  },[selJ]);

  const jugActual = jugadores.find(j=>j.id===selJ);
  const fmt2 = d => d ? new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) : '';
  const COLS = ['#a855f7','#34d399','#60a5fa','#fb923c','#f472b6','#facc15'];
  const W=560, PL=8, PR=8, PT=24, PB=40;

  // respuestas escala
  const respEscala = resps.filter(r=>{ const n=Number(r.respuesta); return !isNaN(n)&&n>=1&&n<=10; });
  const pregUnicas = [...new Map(respEscala.map(r=>[r.pregunta_id,r.preguntas_formulario?.texto||''])).entries()].slice(0,6);
  const respPorPreg = pregUnicas.map(([pid,txt])=>{
    const vals=respEscala.filter(r=>r.pregunta_id===pid);
    return {pid,txt:txt.slice(0,32)+(txt.length>32?'…':''),vals,prom:vals.length?Math.round(vals.reduce((a,r)=>a+Number(r.respuesta),0)/vals.length*10)/10:0};
  });
  const promGen = respEscala.length?Math.round(respEscala.reduce((a,r)=>a+Number(r.respuesta),0)/respEscala.length*10)/10:0;
  const ultimas5=respEscala.slice(-5);
  const promUlt=ultimas5.length?Math.round(ultimas5.reduce((a,r)=>a+Number(r.respuesta),0)/ultimas5.length*10)/10:0;
  const trend=respEscala.length>5?+(promUlt-promGen).toFixed(1):null;

  // SVG mini helpers (locales igual que en GraficosJugador)
  const MiniLineP=({datos,color,alto=140})=>{
    if(!datos||datos.length<2) return <div style={{color:'var(--muted)',fontSize:12,padding:16,textAlign:'center'}}>Se necesitan al menos 2 registros.</div>;
    const vals=datos.map(d=>d.val),mx=Math.max(...vals,1),mn=Math.min(...vals,0),rng=mx-mn||1,H=alto-PT-PB;
    const xs=datos.map((_,i)=>PL+i*(W-PL-PR)/(datos.length-1));
    const ys=datos.map(d=>PT+H-((d.val-mn)/rng)*H);
    const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(' ');
    const area=`M${xs[0]},${PT+H} ${xs.map((x,i)=>`L${x},${ys[i]}`).join(' ')} L${xs[xs.length-1]},${PT+H} Z`;
    const gid=`lgp-${color.replace('#','')}`;
    return (<svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".25"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      {[0,.25,.5,.75,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
      <path d={area} fill={`url(#${gid})`}/><path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {xs.map((x,i)=><g key={i}><circle cx={x} cy={ys[i]} r="4.5" fill="var(--bg2)" stroke={color} strokeWidth="2"/><text x={x} y={ys[i]-10} textAnchor="middle" style={{fontSize:'11px',fill:color,fontWeight:700,fontFamily:'DM Sans'}}>{datos[i].val}</text><text x={x} y={PT+H+16} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{datos[i].lbl}</text></g>)}
    </svg>);
  };
  const BarrasVP=({datos,color='#a855f7',alto=160,maxV=null})=>{
    if(!datos||datos.length===0) return null;
    const mx=maxV||Math.max(...datos.map(d=>d.val),1),H=alto-PT-PB,bW=Math.max(14,Math.floor((W-PL-PR)/datos.length)-8);
    const gap=Math.floor((W-PL-PR-bW*datos.length)/Math.max(datos.length-1,1));
    return (<svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
      {[0,.25,.5,.75,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
      {datos.map((d,i)=>{const x=PL+i*(bW+gap),h=Math.max(3,(d.val/mx)*H),y=PT+H-h,isMax=d.val===Math.max(...datos.map(x=>x.val));return <g key={i}><rect x={x} y={y} width={bW} height={h} rx="4" fill={isMax?color:`${color}55`}/><text x={x+bW/2} y={y-5} textAnchor="middle" style={{fontSize:'10px',fill:color,fontWeight:700,fontFamily:'DM Sans'}}>{d.val}</text><text x={x+bW/2} y={PT+H+14} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{d.lbl}</text></g>;})}
    </svg>);
  };
  const DonutP=({segmentos,size=150})=>{
    if(!segmentos||segmentos.length===0) return null;
    const total=segmentos.reduce((a,s)=>a+s.val,0)||1,cx=size/2,cy=size/2,r=size*.36,ri=size*.22;
    let angle=-Math.PI/2;
    const arcs=segmentos.map(s=>{const a=s.val/total*Math.PI*2,x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);angle+=a;const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle),xi1=cx+ri*Math.cos(angle-a),yi1=cy+ri*Math.sin(angle-a),xi2=cx+ri*Math.cos(angle),yi2=cy+ri*Math.sin(angle),lg=a>Math.PI?1:0;return {path:`M${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg} 0 ${xi1},${yi1} Z`,color:s.color,lbl:s.lbl,val:s.val,pct:Math.round(s.val/total*100)};});
    return (<div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}><svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{arcs.map((a,i)=><path key={i} d={a.path} fill={a.color} opacity=".9"/>)}<text x={cx} y={cy-4} textAnchor="middle" style={{fontSize:'10px',fill:'var(--muted)',fontFamily:'DM Sans'}}>Total</text><text x={cx} y={cy+12} textAnchor="middle" style={{fontFamily:"'Bebas Neue'",fontSize:'18px',fill:'var(--text)'}}>{total}</text></svg><div>{arcs.map((a,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:7,marginBottom:6}}><div style={{width:9,height:9,borderRadius:'50%',background:a.color}}/><div style={{fontSize:11,color:'var(--text2)',flex:1}}>{a.lbl}</div><div style={{fontWeight:700,fontSize:12,color:a.color}}>{a.pct}%</div></div>)}</div></div>);
  };
  const BarrasHP=({datos,colorA='#a855f7',colorB='#34d399',maxVal=10})=>{
    if(!datos||datos.length===0) return null;
    return (<div>{datos.map((d,i)=>(<div key={i} style={{marginBottom:12}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:11,color:'var(--muted)'}}>{d.lbl}</span><span style={{fontSize:11,fontWeight:700,color:colorA}}>{d.valA}</span></div><div style={{display:'flex',gap:3,flexDirection:'column'}}><div style={{background:'rgba(255,255,255,.06)',borderRadius:3,height:7,overflow:'hidden'}}><div style={{height:'100%',background:colorA,width:`${(d.valA/maxVal)*100}%`,borderRadius:3,transition:'width .5s ease'}}/></div>{d.valB!==undefined&&<div style={{background:'rgba(255,255,255,.06)',borderRadius:3,height:7,overflow:'hidden'}}><div style={{height:'100%',background:colorB,width:`${(d.valB/maxVal)*100}%`,borderRadius:3,transition:'width .5s ease'}}/></div>}</div></div>))}<div style={{display:'flex',gap:14,marginTop:6}}><div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}><div style={{width:12,height:4,background:colorA,borderRadius:2}}/>Mi prom.</div><div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}><div style={{width:12,height:4,background:colorB,borderRadius:2}}/>Ref 6.5</div></div></div>);
  };
  const LineasMultiP=({series,alto=180})=>{
    if(!series||series.length===0) return null;
    const maxLen=Math.max(...series.map(s=>s.datos.length),2),H=alto-PT-PB;
    const allY=series.flatMap(s=>s.datos.map(d=>d.y)),mx=Math.max(...allY,1),mn=Math.min(...allY,0),rng=mx-mn||1;
    return (<svg width="100%" viewBox={`0 0 ${W} ${alto}`} style={{overflow:'visible'}}>
      {[0,.25,.5,.75,1].map(f=><line key={f} x1={PL} y1={PT+H*(1-f)} x2={W-PR} y2={PT+H*(1-f)} stroke="rgba(168,85,247,.1)" strokeWidth="1"/>)}
      {series.map(s=>{const xs=s.datos.map((_,i)=>PL+i*(W-PL-PR)/(maxLen-1)),ys=s.datos.map(d=>PT+H-((d.y-mn)/rng)*H),path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(' ');return <g key={s.lbl}><path d={path} fill="none" stroke={s.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>{xs.map((x,i)=><circle key={i} cx={x} cy={ys[i]} r="4" fill="var(--bg2)" stroke={s.color} strokeWidth="2"/>)}</g>;})}
      {series[0]?.datos.map((d,i)=>{const x=PL+i*(W-PL-PR)/(maxLen-1);return <text key={i} x={x} y={PT+H+16} textAnchor="middle" style={{fontSize:'9px',fill:'var(--muted)',fontFamily:'DM Sans'}}>{d.x}</text>;})}
    </svg>);
  };

  // datos gráficos formularios
  const respPorFecha=Object.entries(respEscala.reduce((acc,r)=>{const k=fmt2(r.created_at);if(!acc[k])acc[k]={sum:0,cnt:0};acc[k].sum+=Number(r.respuesta);acc[k].cnt++;return acc;},{})).slice(-8).map(([k,v])=>({lbl:k,val:Math.round(v.sum/v.cnt*10)/10}));
  const donutDist=[{lbl:'Alta (7-10)',val:respEscala.filter(r=>Number(r.respuesta)>=7).length,color:'#34d399'},{lbl:'Media (4-6)',val:respEscala.filter(r=>Number(r.respuesta)>=4&&Number(r.respuesta)<7).length,color:'#a855f7'},{lbl:'Baja (1-3)',val:respEscala.filter(r=>Number(r.respuesta)<4&&Number(r.respuesta)>=1).length,color:'#f87171'}].filter(s=>s.val>0);
  const barrasProms=respPorPreg.map(p=>({lbl:p.txt,valA:p.prom,valB:6.5}));
  const respPorForm=Object.entries(resps.reduce((acc,r)=>{if(!acc[r.formulario_id])acc[r.formulario_id]=0;acc[r.formulario_id]++;return acc;},{})).slice(-8).map(([k,v],i)=>({lbl:`F${i+1}`,val:v}));
  const seriesPregs=respPorPreg.slice(0,4).map((p,i)=>({lbl:p.txt,color:COLS[i],datos:p.vals.slice(-6).map((r,j)=>({x:`${j+1}`,y:Number(r.respuesta)}))}));
  // datos gráficos CPRD
  const cprdLabels=cprdEvals.map((_,i)=>`Ev ${i+1}`);
  const ultimaCPRD=cprdEvals.length>0?cprdEvals[cprdEvals.length-1]:null;
  const barrasCPRD=ultimaCPRD?Object.entries(DIMS_INFO).map(([dim,info])=>({lbl:info.label.split(' ')[0],val:ultimaCPRD[dim+'_percentil']||0})):[];
  const cprdSeries=Object.entries(DIMS_INFO).map(([dim,info])=>({lbl:info.label,color:info.color,datos:cprdEvals.map((ev,i)=>({x:cprdLabels[i],y:ev[dim+'_percentil']||0}))}));
  // actividad por mes
  const meses=[...new Set([...respEscala.map(r=>new Date(r.created_at).toLocaleDateString('es-AR',{month:'short',year:'2-digit'})),...cprdEvals.map(e=>new Date(e.created_at).toLocaleDateString('es-AR',{month:'short',year:'2-digit'}))].filter(Boolean))].slice(-6);
  const actividadMes=meses.map(m=>({lbl:m,v1:respEscala.filter(r=>new Date(r.created_at).toLocaleDateString('es-AR',{month:'short',year:'2-digit'})===m).length,v2:cprdEvals.filter(e=>new Date(e.created_at).toLocaleDateString('es-AR',{month:'short',year:'2-digit'})===m).length}));
  const fodaConPartido=fodaEvals.filter(e=>e.partido_id).length,fodaSinPartido=fodaEvals.filter(e=>!e.partido_id).length;
  const donutFoda=[{lbl:'Con partido',val:fodaConPartido,color:'#60a5fa'},{lbl:'General',val:fodaSinPartido,color:'#a855f7'}].filter(s=>s.val>0);
  const hayDatos=respEscala.length>0||cprdEvals.length>0;

  const SECCIONES=[{id:'formularios',lbl:'📋 Formularios'},{id:'cprd',lbl:'🧠 CPRD'},{id:'actividad',lbl:'📅 Actividad'}];

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div><div className="page-title">Progreso Jugadores</div><div className="page-sub">Seguimiento de rendimiento de tus jugadores</div></div>
      </div>
      <div className="page-divider"/>

      {jugadores.length===0
        ? <div className="empty"><div className="empty-icon">👥</div><div>No tenés jugadores asignados aún.</div></div>
        : <>
          {/* Selector jugador */}
          <div className="card" style={{marginBottom:20}}>
            <div className="card-title">Seleccioná un jugador</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {jugadores.map(j=>(
                <button key={j.id} onClick={()=>setSelJ(j.id)}
                  style={{padding:'8px 18px',borderRadius:24,border:`1px solid ${selJ===j.id?'var(--purple3)':'var(--brd2)'}`,background:selJ===j.id?'rgba(168,85,247,.14)':'transparent',color:selJ===j.id?'var(--accent)':'var(--muted)',cursor:'pointer',fontSize:13,fontFamily:'DM Sans',fontWeight:selJ===j.id?600:400,transition:'all .2s'}}>
                  {j.nombre||j.email}
                </button>
              ))}
            </div>
          </div>

          {loading
            ? <div style={{color:'var(--muted)',padding:20}}>Cargando datos de {jugActual?.nombre}…</div>
            : !hayDatos
              ? <div className="empty"><div className="empty-icon">📊</div><div>Este jugador aún no tiene datos.</div></div>
              : <>
                {/* KPIs */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12,marginBottom:24}}>
                  {[
                    {lbl:'Respuestas totales',val:respEscala.length,col:'#a855f7'},
                    {lbl:'Promedio general',  val:promGen,           col:'#34d399'},
                    {lbl:'Evaluaciones CPRD', val:cprdEvals.length,  col:'#60a5fa'},
                    {lbl:'FODA completados',  val:fodaEvals.length,  col:'#fb923c'},
                    {lbl:'Diagnósticos',      val:diags.length,      col:'#f472b6'},
                    {lbl:'Formularios respon.',val:[...new Set(resps.map(r=>r.formulario_id))].length,col:'#facc15'},
                  ].map((k,i)=>(
                    <div key={i} style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--brd2)',borderRadius:'var(--r)',padding:'16px 18px',position:'relative',overflow:'hidden',animation:`fadeUp .4s ease ${i*.06}s both`}}>
                      <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:k.col}}/>
                      <div style={{fontFamily:"'Bebas Neue'",fontSize:36,color:k.col,lineHeight:1}}>{k.val}</div>
                      <div style={{fontSize:10,color:'var(--muted)',marginTop:4,textTransform:'uppercase',letterSpacing:.8}}>{k.lbl}</div>
                    </div>
                  ))}
                </div>

                {/* Tabs */}
                <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
                  {SECCIONES.map(s=>(
                    <button key={s.id} onClick={()=>setSeccion(s.id)} style={{padding:'8px 18px',borderRadius:8,border:`1px solid ${seccion===s.id?'var(--purple3)':'var(--brd2)'}`,background:seccion===s.id?'rgba(168,85,247,.15)':'transparent',color:seccion===s.id?'var(--accent)':'var(--muted)',cursor:'pointer',fontSize:13,fontFamily:'DM Sans',fontWeight:seccion===s.id?700:400,transition:'all .2s'}}>
                      {s.lbl}
                    </button>
                  ))}
                </div>

                {/* ── FORMULARIOS ── */}
                {seccion==='formularios' && <>
                  {respEscala.length===0
                    ? <div className="empty"><div className="empty-icon">📋</div><div>Este jugador no respondió formularios con escala todavía.</div></div>
                    : <>
                      <div className="g2" style={{marginBottom:0}}>
                        <div className="card" style={{marginBottom:16}}>
                          <div className="card-title">📈 Evolución del promedio de respuestas</div>
                          <MiniLineP datos={respPorFecha} color="#a855f7" alto={160}/>
                        </div>
                        <div className="card" style={{marginBottom:16}}>
                          <div className="card-title">🍩 Distribución de respuestas</div>
                          <div style={{marginTop:8}}><DonutP segmentos={donutDist} size={160}/></div>
                        </div>
                      </div>
                      <div className="g2" style={{marginBottom:0}}>
                        {respPorForm.length>0&&<div className="card" style={{marginBottom:16}}><div className="card-title">📊 Respuestas por formulario</div><BarrasVP datos={respPorForm} color="#60a5fa" alto={160}/></div>}
                        {seriesPregs.length>0&&<div className="card" style={{marginBottom:16}}><div className="card-title">📈 Evolución por pregunta</div><LineasMultiP series={seriesPregs} alto={160}/><div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:8}}>{seriesPregs.map((s,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}><div style={{width:14,height:3,background:s.color,borderRadius:2}}/>{s.lbl}</div>)}</div></div>}
                      </div>
                      {barrasProms.length>0&&<div className="card"><div className="card-title">📊 Promedio por pregunta vs referencia (6.5)</div><BarrasHP datos={barrasProms} colorA="#a855f7" colorB="#34d399" maxVal={10}/></div>}
                    </>
                  }
                </>}

                {/* ── CPRD ── */}
                {seccion==='cprd' && <>
                  {cprdEvals.length===0
                    ? <div className="empty"><div className="empty-icon">🧠</div><div>Este jugador no completó evaluaciones CPRD.</div></div>
                    : <>
                      {ultimaCPRD&&(
                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:12,marginBottom:16}}>
                          {Object.entries(DIMS_INFO).map(([dim,info])=>{const pct=ultimaCPRD[dim+'_percentil'],pd=ultimaCPRD[dim+'_pd'],interp=getInterp(pct);return(<div key={dim} style={{background:'linear-gradient(135deg,var(--bg2),var(--bg3))',border:'1px solid var(--brd2)',borderRadius:'var(--r)',padding:18,position:'relative',overflow:'hidden'}}><div style={{position:'absolute',top:0,left:0,right:0,height:3,background:info.color}}/><div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>{info.label}</div><div style={{fontFamily:"'Bebas Neue'",fontSize:40,color:info.color,lineHeight:1}}>{pd}</div><div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>PD · Percentil <strong style={{color:info.color}}>{pct}</strong></div><div style={{marginTop:8,background:'rgba(255,255,255,.05)',borderRadius:3,height:5,overflow:'hidden'}}><div style={{height:'100%',background:info.color,width:pct+'%',borderRadius:3}}/></div><div style={{marginTop:5,fontSize:11,fontWeight:700,color:interp.color}}>{interp.label}</div></div>);})}
                        </div>
                      )}
                      <div className="g2" style={{marginBottom:0}}>
                        <div className="card" style={{marginBottom:16,display:'flex',flexDirection:'column',alignItems:'center'}}>
                          <div className="card-title" style={{width:'100%'}}>🕸 Radar — última evaluación</div>
                          <DashboardCPRD cprdList={cprdEvals} titulo={null}/>
                        </div>
                      </div>
                      {cprdEvals.length>=2&&(
                        <div className="card">
                          <div className="card-title">📈 Evolución percentiles CPRD</div>
                          <LineasMultiP series={cprdSeries} alto={220}/>
                          <div style={{display:'flex',gap:14,flexWrap:'wrap',marginTop:10}}>{Object.entries(DIMS_INFO).map(([dim,info])=><div key={dim} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'var(--muted)'}}><div style={{width:16,height:3,background:info.color,borderRadius:2}}/>{info.label}</div>)}</div>
                        </div>
                      )}
                    </>
                  }
                </>}

                {/* ── ACTIVIDAD ── */}
                {seccion==='actividad' && <>
                  {actividadMes.length>0&&<div className="card"><div className="card-title">📅 Actividad por mes</div><BarrasAgrupadas datos={actividadMes} serie1="Resp. formularios" serie2="CPRD completados" color1="#a855f7" color2="#60a5fa" alto={200}/></div>}
                  <div className="g2" style={{marginBottom:0}}>
                    {donutFoda.length>0&&<div className="card" style={{marginBottom:16}}><div className="card-title">🔍 FODA por contexto</div><div style={{marginTop:8}}><DonutP segmentos={donutFoda} size={150}/></div></div>}
                    {diags.length>0&&<div className="card" style={{marginBottom:16}}><div className="card-title">🧠 Notas de sesión recientes</div>{diags.slice(-3).reverse().map((d,i)=><div key={d.id} style={{background:'var(--bg3)',borderRadius:8,padding:12,marginBottom:8,border:'1px solid var(--brd)',borderLeft:`3px solid hsl(${270+i*25},70%,60%)`}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span className="badge b-purple" style={{fontSize:10}}>#{diags.length-i}</span><span style={{fontSize:10,color:'var(--muted)'}}>{fmt2(d.created_at)}</span></div><div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>{d.texto?.slice(0,160)}{d.texto?.length>160?'…':''}</div></div>)}</div>}
                  </div>
                </>}
              </>
          }
        </>
      }
    </div>
  );
}


function MiDiagnostico() {
  const {perfil} = useApp();
  const [diags,setDiags] = useState([]);
  const [loading,setLoading] = useState(true);

  const loadDiags = () => sb.from('diagnosticos').select('*,psicologa:perfiles!psicologa_id(nombre)').eq('jugador_id',perfil.id).order('created_at',{ascending:false}).then(({data})=>{ setDiags(data||[]); setLoading(false); });
  useEffect(()=>{
    loadDiags();
    const ch = sb.channel('diags-live-'+perfil.id).on('postgres_changes',{event:'*',schema:'public',table:'diagnosticos'},loadDiags).subscribe();
    return ()=>sb.removeChannel(ch);
  },[]);

  return (
    <div className="animate-in">
      <div className="ph"><div className="page-title">Mi Diagnóstico</div><div className="page-sub">Evaluaciones de tu psicóloga</div></div>
      {loading ? <div style={{color:'var(--muted)'}}>Cargando…</div>
      : diags.length===0 ? <div className="empty"><div className="empty-icon">🧠</div><div>Tu psicóloga no cargó diagnósticos aún.</div></div>
      : diags.map(d=>(
        <div key={d.id} className="card">
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
            <div style={{fontWeight:700}}>Diagnóstico</div>
            <span style={{fontSize:12,color:'var(--muted)'}}>{fmt(d.created_at)}</span>
          </div>
          {d.psicologa && <div style={{fontSize:12,color:'var(--accent)',marginBottom:10}}>Por: {d.psicologa.nombre}</div>}
          <p style={{fontSize:14,lineHeight:1.7}}>{d.texto}</p>
        </div>
      ))}
    </div>
  );
}

function MisFormularios() {
  const {perfil} = useApp();
  const [forms,setForms] = useState([]);
  const [loading,setLoading] = useState(true);
  const [modal,setModal]     = useState(false);
  const [tab,setTab]         = useState('formularios');
  const [confirmId, setConfirmId] = useState(null);

  const load = async () => {
    const {data} = await sb.from('formularios').select('*,preguntas_formulario(*)').order('created_at',{ascending:false});
    setForms(data||[]); setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const toggle = async (id,v) => { await sb.from('formularios').update({activo:v}).eq('id',id); load(); };

  const eliminar = async () => {
    if(!confirmId) return;
    const idToDelete = confirmId;
    setConfirmId(null);
    setForms(prev => prev.filter(f => f.id !== idToDelete));
    await sb.from('respuestas').delete().eq('formulario_id', idToDelete);
    await sb.from('preguntas_formulario').delete().eq('formulario_id', idToDelete);
    await sb.from('formularios').delete().eq('id', idToDelete);
  };

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div><div className="page-title">Formularios</div><div className="page-sub">Gestioná tus formularios y programación de envíos</div></div>
        {tab==='formularios' && <button className="btn btn-g" onClick={()=>setModal(true)}>+ Crear formulario</button>}
      </div>
      <div className="tabs">
        <button className={`tab ${tab==='formularios'?'active':''}`} onClick={()=>setTab('formularios')}>📋 Mis Formularios</button>
        <button className={`tab ${tab==='programados'?'active':''}`} onClick={()=>setTab('programados')}>📬 Programados</button>
      </div>

      {tab==='formularios' && (
        <>
          {loading ? <div style={{color:'var(--muted)'}}>Cargando…</div>
          : forms.length===0 ? <div className="empty"><div className="empty-icon">📋</div><div>No creaste formularios aún.</div></div>
          : forms.map(f=>(
            <div key={f.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:5}}>
                    <div style={{fontWeight:700,fontSize:16}}>{f.titulo}</div>
                    <span className={`badge ${f.activo?'b-green':'b-gray'}`}>{f.activo?'Activo':'Inactivo'}</span>
                  </div>
                  <div style={{color:'var(--muted)',fontSize:13}}>{f.descripcion}</div>
                  <span className="badge b-purple" style={{marginTop:8,display:'inline-block'}}>{f.preguntas_formulario?.length||0} preguntas</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button className={`btn btn-sm ${f.activo?'btn-d':'btn-p'}`} onClick={()=>toggle(f.id,!f.activo)}>{f.activo?'Desactivar':'Activar'}</button>
                  <button className="btn btn-sm" style={{background:'rgba(220,38,38,.12)',color:'#fca5a5',border:'1px solid rgba(220,38,38,.25)'}} onClick={()=>setConfirmId(f.id)}>🗑 Borrar</button>
                </div>
              </div>
            </div>
          ))}
        </>
      )}

      {tab==='programados' && <FormulariosProgramados/>}

      {modal && <FormularioModal onClose={()=>{ setModal(false); load(); }} psicologaId={perfil.id}/>}

      {confirmId && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:20}} onClick={e=>e.target===e.currentTarget&&setConfirmId(null)}>
          <div style={{background:'var(--bg3)',border:'1px solid rgba(220,38,38,.4)',borderRadius:16,padding:32,maxWidth:420,width:'100%',boxShadow:'0 24px 80px rgba(0,0,0,.7)',animation:'scaleIn .22s ease'}}>
            <div style={{fontSize:36,textAlign:'center',marginBottom:16}}>🗑</div>
            <div style={{fontSize:18,fontWeight:700,color:'var(--text)',textAlign:'center',marginBottom:8}}>¿Borrar formulario?</div>
            <div style={{fontSize:13,color:'var(--muted)',textAlign:'center',lineHeight:1.6,marginBottom:24}}>Se eliminarán el formulario, todas sus preguntas y todas las respuestas de los jugadores. Esta acción no se puede deshacer.</div>
            <div style={{display:'flex',gap:12,justifyContent:'center'}}>
              <button className="btn btn-o" onClick={()=>setConfirmId(null)}>Cancelar</button>
              <button className="btn" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',color:'#fff',boxShadow:'0 4px 16px rgba(220,38,38,.4)'}} onClick={eliminar}>Sí, borrar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function FormularioModal({onClose,psicologaId}) {
  const {perfil} = useApp();
  const [titulo,setTitulo]   = useState('');
  const [desc,setDesc]       = useState('');
  const [pregs,setPregs]     = useState([]);
  const [busy,setBusy]       = useState(false);

  const add   = () => setPregs(p=>[...p,{texto:'',tipo:'escala',opciones:''}]);
  const upd   = (i,k,v) => setPregs(p=>p.map((x,idx)=>idx===i?{...x,[k]:v}:x));
  const del   = (i) => setPregs(p=>p.filter((_,idx)=>idx!==i));

  const save = async () => {
    if(!titulo) return; setBusy(true);
    const {data:form} = await sb.from('formularios').insert({titulo,descripcion:desc,activo:true}).select().single();
    if(form && pregs.length>0){
      const rows = pregs.map((pr,i)=>({formulario_id:form.id,texto:pr.texto,tipo:pr.tipo,orden:i+1,opciones:pr.tipo==='multiple'?pr.opciones.split(',').map(s=>s.trim()).filter(Boolean):null}));
      await sb.from('preguntas_formulario').insert(rows);
    }
    await log(perfil.id,'creo_formulario',titulo);
    setBusy(false); onClose();
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-hd"><div className="modal-title">Crear Formulario</div><button className="modal-x" onClick={onClose}>×</button></div>
        <div className="fg"><label className="fl">Título</label><input className="fc" value={titulo} onChange={e=>setTitulo(e.target.value)} placeholder="Ej: Evaluación pre-partido"/></div>
        <div className="fg"><label className="fl">Descripción</label><input className="fc" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Breve descripción…"/></div>
        <div className="div"/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div className="card-title" style={{margin:0}}>Preguntas ({pregs.length})</div>
          <button className="btn btn-p btn-sm" onClick={add}>+ Agregar pregunta</button>
        </div>
        {pregs.map((pr,i)=>(
          <div key={i} className="q-card" style={{marginBottom:10}}>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <input className="fc" value={pr.texto} onChange={e=>upd(i,'texto',e.target.value)} placeholder={`Pregunta ${i+1}…`} style={{flex:1}}/>
              <select className="fc" value={pr.tipo} onChange={e=>upd(i,'tipo',e.target.value)} style={{width:'auto',minWidth:160}}>
                <option value="escala">Escala 1-10</option>
                <option value="multiple">Múltiple opción</option>
                <option value="texto">Texto libre</option>
              </select>
              <button className="btn btn-d btn-sm" onClick={()=>del(i)}>✕</button>
            </div>
            {pr.tipo==='multiple' && <input className="fc" value={pr.opciones} onChange={e=>upd(i,'opciones',e.target.value)} placeholder="Opciones: Bien, Regular, Mal"/>}
          </div>
        ))}
        {pregs.length===0 && <div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'14px 0'}}>Hacé click en "+ Agregar pregunta"</div>}
        <div className="div"/>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
          <button className="btn btn-o" onClick={onClose}>Cancelar</button>
          <button className="btn btn-g" onClick={save} disabled={busy||!titulo}>{busy?<><div className="spin"/>Guardando…</>:'💾 Guardar formulario'}</button>
        </div>
      </div>
    </div>
  );
}

function CargarDiagnostico() {
  const {perfil} = useApp();
  const [jugadores,setJugadores] = useState([]);
  const [sel,setSel]         = useState('');
  const [sesiones,setSesiones] = useState([]);
  const [selSes,setSelSes]   = useState('');
  const [texto,setTexto]     = useState('');
  const [busy,setBusy]       = useState(false);
  const [ok,setOk]           = useState(false);
  const [tab,setTab]         = useState('nueva');
  const [historial,setHistorial] = useState([]);

  const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  const loadJugadores = () => sb.from('perfiles').select('*').eq('rol','jugador').eq('psicologa_id',perfil.id).order('nombre').then(({data})=>setJugadores(data||[]));

  useEffect(()=>{
    loadJugadores();
    sb.from('diagnosticos').select('*,perfiles!jugador_id(nombre)').eq('psicologa_id',perfil.id).order('created_at',{ascending:false}).limit(20).then(({data})=>setHistorial(data||[]));
    const ch = sb.channel('diag-jugs-live').on('postgres_changes',{event:'*',schema:'public',table:'perfiles'},loadJugadores).subscribe();
    return ()=>sb.removeChannel(ch);
  },[]);

  // Al seleccionar jugador, cargar sus sesiones para vincular
  useEffect(()=>{
    if(!sel) return;
    sb.from('sesiones').select('*').eq('jugador_id',sel).eq('psicologa_id',perfil.id).order('fecha',{ascending:false}).limit(20).then(({data})=>setSesiones(data||[]));
  },[sel]);

  const save = async () => {
    if(!sel||!texto) return; setBusy(true);
    const sesObj = sesiones.find(s=>s.id===selSes);
    await sb.from('diagnosticos').insert({
      jugador_id: sel,
      psicologa_id: perfil.id,
      texto,
      sesion_id: selSes||null,
      fecha_sesion: sesObj?.fecha||null,
    });
    await log(perfil.id,'cargo_diagnostico',`Para jugador ID: ${sel}`);
    // recargar historial
    sb.from('diagnosticos').select('*,perfiles!jugador_id(nombre)').eq('psicologa_id',perfil.id).order('created_at',{ascending:false}).limit(20).then(({data})=>setHistorial(data||[]));
    setOk(true); setBusy(false); setTexto(''); setSel(''); setSelSes(''); setSesiones([]);
    setTimeout(()=>setOk(false),4000);
  };

  return (
    <div className="animate-in">
      <div className="ph"><div className="page-title">Notas por Sesión</div><div className="page-sub">Registrá observaciones psicológicas vinculadas a cada sesión</div></div>
      <div className="tabs">
        <button className={`tab ${tab==='nueva'?'active':''}`} onClick={()=>setTab('nueva')}>✏️ Nueva nota</button>
        <button className={`tab ${tab==='historial'?'active':''}`} onClick={()=>setTab('historial')}>📋 Historial</button>
      </div>

      {tab==='nueva' && <>
        {ok && <div className="alert alert-s">✓ Nota guardada correctamente</div>}
        <div className="card">
          <div className="fg">
            <label className="fl">Jugador</label>
            {jugadores.length===0
              ? <div style={{color:'var(--muted)',fontSize:13}}>No hay jugadores registrados aún.</div>
              : <select className="fc" value={sel} onChange={e=>{setSel(e.target.value);setSelSes('');}} style={{maxWidth:360}}>
                  <option value="">Seleccioná un jugador…</option>
                  {jugadores.map(j=><option key={j.id} value={j.id}>{j.nombre||j.email}</option>)}
                </select>
            }
          </div>

          {sel && (
            <div className="fg">
              <label className="fl">Vincular a sesión del calendario (opcional)</label>
              {sesiones.length===0
                ? <div style={{color:'var(--muted)',fontSize:12,padding:'8px 0'}}>No hay sesiones registradas para este jugador. La nota se guardará sin sesión vinculada.</div>
                : <select className="fc" value={selSes} onChange={e=>setSelSes(e.target.value)} style={{maxWidth:400}}>
                    <option value="">Sin sesión específica</option>
                    {sesiones.map(s=>{
                      const d = new Date(s.fecha);
                      return <option key={s.id} value={s.id}>{d.getDate()} {MESES[d.getMonth()]} {d.getFullYear()} — {s.hora_texto||'hora s/d'}{s.notas?' · '+s.notas:''}</option>;
                    })}
                  </select>
              }
            </div>
          )}

          <div className="fg">
            <label className="fl">Observaciones / Diagnóstico</label>
            <textarea className="fc" value={texto} onChange={e=>setTexto(e.target.value)} rows={7} placeholder="Observaciones de la sesión, análisis psicológico, recomendaciones, avances del jugador…"/>
          </div>
          <button className="btn btn-g" onClick={save} disabled={busy||!sel||!texto}>
            {busy?<><div className="spin"/>Guardando…</>:'🧠 Guardar nota'}
          </button>
        </div>
      </>}

      {tab==='historial' && (
        historial.length===0
          ? <div className="empty"><div className="empty-icon">📋</div><div>No hay notas guardadas aún.</div></div>
          : historial.map((d,i)=>(
            <div key={d.id} className="card" style={{position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',left:0,top:0,bottom:0,width:3,background:`hsl(${270+i*15},70%,60%)`}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8,flexWrap:'wrap',gap:8}}>
                <div>
                  <div style={{fontWeight:700,color:'var(--text)'}}>{d.perfiles?.nombre||'—'}</div>
                  {d.fecha_sesion && <div style={{fontSize:11,color:'var(--purple3)',marginTop:2}}>📅 Sesión: {new Date(d.fecha_sesion).toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})}</div>}
                </div>
                <span style={{fontSize:11,color:'var(--muted)',flexShrink:0}}>{fmt(d.created_at)}</span>
              </div>
              <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>{d.texto}</div>
            </div>
          ))
      )}
    </div>
  );
}

function VerRespuestas() {
  const {perfil} = useApp();
  const [jugadores,setJugadores] = useState([]);
  const [selJ,setSelJ]   = useState('');
  const [selJObj,setSelJObj] = useState(null);
  const [respuestas,setRespuestas] = useState([]);
  const [loading,setLoading] = useState(false);
  const [vista,setVista] = useState('tabla'); // 'tabla' | 'graficos' | 'diario'
  const [diarioEntradas,setDiarioEntradas] = useState([]);
  const [exporting,setExporting] = useState(false);

  const loadJugadores = () => sb.from('perfiles').select('*').eq('rol','jugador').eq('psicologa_id',perfil.id).order('nombre').then(({data})=>setJugadores(data||[]));
  useEffect(()=>{
    loadJugadores();
    const ch = sb.channel('resp-jugs-live').on('postgres_changes',{event:'*',schema:'public',table:'perfiles'},loadJugadores).subscribe();
    return ()=>sb.removeChannel(ch);
  },[]);

  useEffect(()=>{
    if(!selJ) return;
    setLoading(true);
    const loadResp = async () => {
      const [{data:respData},{data:pregData},{data:formsData}] = await Promise.all([
        sb.from('respuestas').select('*').eq('jugador_id',selJ).order('created_at',{ascending:false}),
        sb.from('preguntas_formulario').select('*'),
        sb.from('formularios').select('id,titulo'),
      ]);
      const pregMap  = (pregData||[]).reduce((acc,p)=>({...acc,[p.id]:p}),{});
      const formsMap = (formsData||[]).reduce((acc,f)=>({...acc,[f.id]:f}),{});
      const merged = (respData||[]).map(r=>({
        ...r,
        pregunta: pregMap[r.pregunta_id]||null,
        formularios: formsMap[r.formulario_id]||null,
        preguntas_formulario: pregMap[r.pregunta_id]||null,
      }));
      setRespuestas(merged); setLoading(false);
    };
    loadResp();
    const ch = sb.channel('resp-live-'+selJ).on('postgres_changes',{event:'*',schema:'public',table:'respuestas'},loadResp).subscribe();
    return ()=>sb.removeChannel(ch);
  },[selJ]);

  useEffect(()=>{
    if(!selJ) return;
    sb.from('diario_mental').select('*').eq('jugador_id',selJ).eq('compartido',true).order('created_at',{ascending:false}).then(({data})=>setDiarioEntradas(data||[]));
  },[selJ]);

  const grouped = respuestas.reduce((acc,r)=>{
    const k=`${r.formulario_id}_${r.partido_nombre||''}`;
    if(!acc[k]) acc[k]={form:r.formularios,partido_nombre:r.partido_nombre||'—',items:[]};
    acc[k].items.push(r); return acc;
  },{});

  // Export to Excel
  const exportarExcel = async () => {
    if(!selJObj) return;
    setExporting(true);
    const wb = XLSX.utils.book_new();
    // Sheet: all responses flat
    const rows = [['Formulario','Partido','Pregunta','Respuesta','Fecha']];
    Object.values(grouped).forEach(g=>{
      g.items.forEach(r=>rows.push([g.form?.titulo||'',g.partido_nombre,r.pregunta?.texto||'',r.respuesta||'',new Date(r.created_at).toLocaleDateString('es-AR')]));
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Respuestas');
    // Sheet: escala por pregunta grouped by partido
    const escalaItems = respuestas.filter(r=>r.pregunta?.tipo==='escala');
    if(escalaItems.length>0){
      const escalRows = [['Pregunta','Partido','Valor']];
      escalaItems.forEach(r=>escalRows.push([r.pregunta?.texto||'',r.partido_nombre||'',r.respuesta||'']));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(escalRows), 'Escalas');
    }
    XLSX.writeFile(wb, `respuestas_${(selJObj.nombre||selJObj.email).replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
    setExporting(false);
  };

  // Build chart data for scale questions grouped by pregunta
  const chartData = React.useMemo(()=>{
    const escalas = respuestas.filter(r=>r.pregunta?.tipo==='escala');
    // Group by pregunta
    const byPregunta = {};
    escalas.forEach(r=>{
      const k = r.pregunta_id;
      if(!byPregunta[k]) byPregunta[k]={texto:r.pregunta?.texto||'',puntos:[]};
      byPregunta[k].puntos.push({lbl:r.partido_nombre||fmt(r.created_at),val:Number(r.respuesta)||0});
    });
    return Object.values(byPregunta);
  },[respuestas]);

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div><div className="page-title">Ver Respuestas</div><div className="page-sub">Respuestas de tus jugadores a los formularios</div></div>
        {selJ && (
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-o btn-sm" onClick={exportarExcel} disabled={exporting}>
              {exporting?<><div className="spin"/>…</>:<><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar Excel</>}
            </button>
          </div>
        )}
      </div>
      <div className="card">
        <div className="fg" style={{marginBottom:0}}>
          <label className="fl">Seleccioná un jugador</label>
          {jugadores.length===0 ? <div style={{color:'var(--muted)',fontSize:13}}>No tenés jugadores asignados aún.</div>
          : <select className="fc" value={selJ} onChange={e=>{setSelJ(e.target.value);setSelJObj(jugadores.find(j=>j.id===e.target.value)||null);}} style={{maxWidth:360}}>
              <option value="">Seleccioná…</option>
              {jugadores.map(j=><option key={j.id} value={j.id}>{j.nombre||j.email}</option>)}
            </select>}
        </div>
      </div>

      {/* Vista toggle */}
      {selJ && Object.keys(grouped).length>0 && (
        <div className="tabs" style={{marginBottom:20}}>
          <button className={`tab ${vista==='tabla'?'active':''}`} onClick={()=>setVista('tabla')}>📋 Tabla</button>
          <button className={`tab ${vista==='graficos'?'active':''}`} onClick={()=>setVista('graficos')}>📊 Gráficos</button>
          <button className={`tab ${vista==='diario'?'active':''}`} onClick={()=>setVista('diario')}>📔 Diario Mental</button>
        </div>
      )}

      {loading ? <div style={{color:'var(--muted)'}}>Cargando…</div>
      : selJ && Object.entries(grouped).length===0 ? <div className="empty"><div className="empty-icon">📋</div><div>Este jugador no respondió formularios aún.</div></div>
      : vista==='tabla'
        ? Object.entries(grouped).map(([k,g])=>(
          <div key={k} className="card">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
              <div>
                <div style={{fontWeight:700}}>{g.form?.titulo}</div>
                <div style={{fontSize:13,color:'var(--muted)'}}>Partido: {g.partido_nombre}</div>
              </div>
              <span className="badge b-purple">{g.items.length} resp.</span>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr><th style={{textAlign:'left',fontSize:11,color:'var(--muted)',padding:'6px 10px',borderBottom:'1px solid var(--brd2)'}}>Pregunta</th><th style={{textAlign:'left',fontSize:11,color:'var(--muted)',padding:'6px 10px',borderBottom:'1px solid var(--brd2)'}}>Respuesta</th></tr></thead>
              <tbody>{g.items.map(r=>(
                <tr key={r.id}>
                  <td style={{padding:'8px 10px',fontSize:13,borderBottom:'1px solid var(--brd)',color:'var(--muted)'}}>{r.pregunta?.texto||'—'}</td>
                  <td style={{padding:'8px 10px',fontSize:14,fontWeight:600,borderBottom:'1px solid var(--brd)',color:'var(--accent)'}}>{r.respuesta}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        ))
        : vista==='diario'
        ? (
          <div>
            <div style={{background:'rgba(168,85,247,.06)',border:'1px solid var(--brd2)',borderRadius:10,padding:'12px 16px',marginBottom:16,fontSize:12,color:'var(--muted)',display:'flex',alignItems:'center',gap:8}}>
              <span>🔒</span> Solo ves las entradas que el jugador eligió compartir con vos.
            </div>
            {diarioEntradas.length===0
              ? <div className="empty"><span className="empty-icon">📔</span><div>Este jugador no compartió entradas de su diario todavía.</div></div>
              : diarioEntradas.map(e=>{
                const HUMORES=['😞','😕','😐','🙂','😄'];
                return (
                  <div key={e.id} className="card" style={{marginBottom:12}}>
                    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                      <span style={{fontSize:26}}>{HUMORES[e.humor-1]||'😐'}</span>
                      <div>
                        <div style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>{new Date(e.created_at).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div>
                        <div style={{fontSize:11,color:'var(--muted)'}}>{new Date(e.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</div>
                      </div>
                      {(e.tags||[]).length>0 && <div style={{display:'flex',gap:4,flexWrap:'wrap',marginLeft:'auto'}}>{e.tags.map(t=><span key={t} className="nota-priv-tag">{t}</span>)}</div>}
                    </div>
                    <p style={{fontSize:14,color:'var(--text2)',lineHeight:1.75,whiteSpace:'pre-wrap',margin:0}}>{e.texto}</p>
                  </div>
                );
              })
            }
          </div>
        )
        : (
          <div>
            {chartData.length===0
              ? <div className="empty"><span className="empty-icon">📊</span><div>No hay preguntas de escala para graficar.</div></div>
              : chartData.map((cd,i)=>(
                <div key={i} className="card" style={{marginBottom:16}}>
                  <div className="card-title">{cd.texto}</div>
                  <div style={{marginBottom:10}}>
                    <LineChart datos={cd.puntos.slice(-10)} color='#a855f7' alto={140}/>
                  </div>
                  <div style={{display:'flex',gap:10,flexWrap:'wrap',marginTop:4}}>
                    <span style={{fontSize:12,color:'var(--muted)'}}>Promedio: <strong style={{color:'var(--accent)'}}>{cd.puntos.length>0?(cd.puntos.reduce((a,b)=>a+b.val,0)/cd.puntos.length).toFixed(1):'—'}</strong></span>
                    <span style={{fontSize:12,color:'var(--muted)'}}>Máx: <strong style={{color:'#4ade80'}}>{cd.puntos.length>0?Math.max(...cd.puntos.map(p=>p.val)):'—'}</strong></span>
                    <span style={{fontSize:12,color:'var(--muted)'}}>Mín: <strong style={{color:'#f87171'}}>{cd.puntos.length>0?Math.min(...cd.puntos.map(p=>p.val)):'—'}</strong></span>
                  </div>
                  <div style={{marginTop:14}}>
                    <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:1}}>Por partido</div>
                    <BarChart datos={cd.puntos.slice(-8)} colorBarra='#7c3aed' alto={120} maxVal={10}/>
                  </div>
                </div>
              ))
            }
            {/* Donut resumen si hay multiples escalas */}
            {chartData.length>1 && (
              <div className="card">
                <div className="card-title">Comparativa promedios por pregunta</div>
                <BarrasHorizontales
                  datos={chartData.map(cd=>({
                    lbl:cd.texto.length>30?cd.texto.slice(0,30)+'…':cd.texto,
                    a:cd.puntos.length>0?parseFloat((cd.puntos.reduce((a,b)=>a+b.val,0)/cd.puntos.length).toFixed(1)):0,
                    b:10
                  }))}
                  colorA='#a855f7' colorB='rgba(168,85,247,.12)' maxVal={10}
                />
              </div>
            )}
          </div>
        )
      }
    </div>
  );
}
