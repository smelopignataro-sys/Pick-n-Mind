                Enviar
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// ── DIARIO MENTAL (Jugador) ───────────────────────────────────────────────────
function DiarioMental() {
  const {perfil} = useApp();
  const [entradas,setEntradas] = useState([]);
  const [modal,setModal] = useState(false);
  const [texto,setTexto] = useState('');
  const [humor,setHumor] = useState(3);
  const [tags,setTags] = useState([]);
  const [compartido,setCompartido] = useState(false);
  const [busy,setBusy] = useState(false);
  const HUMORES = ['😞','😕','😐','🙂','😄'];
  const TAGS_OPT = ['Pre-partido','Post-partido','Entrenamiento','Personal','Lesión','Motivación','Ansiedad','Concentración'];

  useEffect(()=>{ cargar(); },[]);
  const cargar = async () => {
    const {data} = await sb.from('diario_mental').select('*').eq('jugador_id',perfil.id).order('created_at',{ascending:false});
    setEntradas(data||[]);
  };
  const guardar = async () => {
    if(!texto.trim()) return;
    setBusy(true);
    await sb.from('diario_mental').insert({jugador_id:perfil.id,texto:texto.trim(),humor,tags,compartido});
    await log(perfil.id,'diario_entrada','Nueva entrada en diario mental');
    setTexto(''); setHumor(3); setTags([]); setCompartido(false); setModal(false); setBusy(false);
    cargar();
  };
  const eliminar = async (id) => {
    if(!confirm('¿Eliminar esta entrada?')) return;
    await sb.from('diario_mental').delete().eq('id',id);
    cargar();
  };
  const toggleCompartido = async (id, val) => {
    await sb.from('diario_mental').update({compartido:!val}).eq('id',id);
    setEntradas(prev=>prev.map(e=>e.id===id?{...e,compartido:!val}:e));
  };
  const toggleTag = t => setTags(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev,t]);

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div>
          <div className="page-title">Diario Mental</div>
          <div className="page-sub">Tus reflexiones privadas · Podés compartir entradas con tu psicóloga</div>
        </div>
        <button className="btn btn-g" onClick={()=>setModal(true)}>+ Nueva entrada</button>
      </div>
      <div className="page-divider"/>

      {entradas.length===0 && <div className="empty"><span className="empty-icon">📔</span><div>Empezá tu diario mental. Es solo tuyo.</div></div>}

      {entradas.map(e=>(
        <div key={e.id} className="card" style={{marginBottom:14,borderColor:e.compartido?'rgba(168,85,247,.35)':'var(--brd2)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:28}}>{HUMORES[e.humor-1]||'😐'}</span>
              <div>
                <div style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>{new Date(e.created_at).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>{new Date(e.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</div>
              </div>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {e.compartido && <span className="badge b-purple" style={{fontSize:10}}>👁 Visible para psicóloga</span>}
              <button className="action-btn del" onClick={()=>eliminar(e.id)} style={{fontSize:11}}>✕</button>
            </div>
          </div>
          <p style={{fontSize:14,color:'var(--text2)',lineHeight:1.75,whiteSpace:'pre-wrap',marginBottom:10}}>{e.texto}</p>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
            {(e.tags||[]).length>0 && <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{e.tags.map(t=><span key={t} className="nota-priv-tag">{t}</span>)}</div>}
            <button onClick={()=>toggleCompartido(e.id,e.compartido)}
              style={{background:e.compartido?'rgba(168,85,247,.15)':'var(--bg3)',border:`1px solid ${e.compartido?'var(--purple3)':'var(--brd2)'}`,borderRadius:20,padding:'4px 12px',fontSize:11,color:e.compartido?'var(--accent)':'var(--muted)',cursor:'pointer',fontFamily:'DM Sans',transition:'all .2s',marginLeft:'auto'}}>
              {e.compartido?'🔓 Compartido con psicóloga':'🔒 Solo yo · Compartir'}
            </button>
          </div>
        </div>
      ))}

      {modal && (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setModal(false)}}>
          <div className="modal">
            <div className="modal-hd"><div className="modal-title">Nueva entrada</div><button className="modal-x" onClick={()=>setModal(false)}>✕</button></div>
            <div className="fg">
              <label className="fl">¿Cómo te sentís hoy?</label>
              <div style={{display:'flex',gap:12,marginTop:8}}>
                {HUMORES.map((h,i)=>(
                  <button key={i} onClick={()=>setHumor(i+1)} style={{fontSize:28,background:humor===i+1?'rgba(168,85,247,.2)':'var(--bg3)',border:`2px solid ${humor===i+1?'var(--purple3)':'var(--brd)'}`,borderRadius:10,padding:'6px 10px',cursor:'pointer',transition:'all .2s',transform:humor===i+1?'scale(1.15)':'scale(1)'}}>{h}</button>
                ))}
              </div>
            </div>
            <div className="fg">
              <label className="fl">Tags</label>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}}>
                {TAGS_OPT.map(t=>(
                  <button key={t} onClick={()=>toggleTag(t)} className={`badge ${tags.includes(t)?'b-purple':'b-gray'}`} style={{cursor:'pointer',border:'none',fontFamily:'DM Sans',fontSize:12,padding:'5px 12px'}}>{t}</button>
                ))}
              </div>
            </div>
            <div className="fg">
              <label className="fl">¿Qué querés escribir?</label>
              <textarea className="fc" rows={5} value={texto} onChange={e=>setTexto(e.target.value)} placeholder="Escribí lo que sentís, pensás, o querés recordar..."/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:10,background:compartido?'rgba(168,85,247,.1)':'var(--bg3)',border:`1px solid ${compartido?'var(--purple3)':'var(--brd2)'}`,cursor:'pointer',transition:'all .2s',marginBottom:16}} onClick={()=>setCompartido(v=>!v)}>
              <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${compartido?'var(--purple3)':'var(--brd3)'}`,background:compartido?'var(--purple3)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s',flexShrink:0}}>
                {compartido && <svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="#fff" strokeWidth="2.5"><polyline points="2,8 6,12 14,4"/></svg>}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:compartido?'var(--accent)':'var(--text2)'}}>Compartir con mi psicóloga</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>Solo ella podrá leer esta entrada</div>
              </div>
            </div>
            <button className="btn btn-g" style={{width:'100%',justifyContent:'center'}} onClick={guardar} disabled={busy||!texto.trim()}>
              {busy?<><div className="spin"/>Guardando…</>:'💾 Guardar entrada'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── LOGROS Y BADGES (Jugador) ─────────────────────────────────────────────────
function LogrosBadges() {
  const {perfil} = useApp();
  const [stats,setStats] = useState({formularios:0,sesiones:0,entradas:0,diagnosticos:0,racha:0});
  const [desbloqueados,setDesbloqueados] = useState([]);

  const LOGROS = [
    {id:'primer_form',icon:'📋',titulo:'Primer paso',desc:'Completaste tu primer formulario',cond:s=>s.formularios>=1,color:'#a855f7'},
    {id:'form5',icon:'🔥',titulo:'En racha',desc:'5 formularios completados',cond:s=>s.formularios>=5,color:'#f59e0b'},
    {id:'form10',icon:'⚡',titulo:'Constante',desc:'10 formularios completados',cond:s=>s.formularios>=10,color:'#3b82f6'},
    {id:'form20',icon:'🏆',titulo:'Campeón mental',desc:'20 formularios completados',cond:s=>s.formularios>=20,color:'#f59e0b'},
    {id:'diario3',icon:'📔',titulo:'Reflexivo',desc:'3 entradas en el diario',cond:s=>s.entradas>=3,color:'#10b981'},
    {id:'diario10',icon:'✍️',titulo:'Escritor',desc:'10 entradas en el diario',cond:s=>s.entradas>=10,color:'#6366f1'},
    {id:'sesion1',icon:'🧠',titulo:'Primera sesión',desc:'Tu primera sesión agendada',cond:s=>s.sesiones>=1,color:'#ec4899'},
    {id:'sesion5',icon:'🌟',titulo:'Comprometido',desc:'5 sesiones completadas',cond:s=>s.sesiones>=5,color:'#f59e0b'},
    {id:'diag1',icon:'🔬',titulo:'Primer diagnóstico',desc:'Recibiste tu primer diagnóstico',cond:s=>s.diagnosticos>=1,color:'#0891b2'},
    {id:'racha7',icon:'📅',titulo:'7 días',desc:'Una semana de racha',cond:s=>s.racha>=7,color:'#16a34a'},
  ];

  useEffect(()=>{ cargar(); },[]);
  const cargar = async () => {
    const [f,s,d,diar] = await Promise.all([
      sb.from('respuestas').select('id',{count:'exact'}).eq('jugador_id',perfil.id),
      sb.from('sesiones').select('id',{count:'exact'}).eq('jugador_id',perfil.id),
      sb.from('diagnosticos').select('id',{count:'exact'}).eq('jugador_id',perfil.id),
      sb.from('diario_mental').select('id,created_at').eq('jugador_id',perfil.id).order('created_at',{ascending:false}),
    ]);
    const dias = (diar.data||[]);
    let racha = 0;
    if(dias.length>0){
      let prev = new Date(dias[0].created_at); racha=1;
      for(let i=1;i<dias.length;i++){
        const d = new Date(dias[i].created_at);
        const diff = (prev-d)/(1000*60*60*24);
        if(diff<=1.5){ racha++; prev=d; } else break;
      }
    }
    const st = {formularios:f.count||0,sesiones:s.count||0,diagnosticos:d.count||0,entradas:dias.length,racha};
    setStats(st);
    setDesbloqueados(LOGROS.filter(l=>l.cond(st)).map(l=>l.id));
  };

  return (
    <div className="animate-in">
      <div className="ph">
        <div className="page-title">Mis Logros</div>
        <div className="page-sub">Tus achievements en Pick'n Mind</div>
      </div>
      <div className="page-divider"/>
      <div className="stats-row" style={{marginBottom:28}}>
        <div className="stat-card c1"><div className="stat-val">{stats.formularios}</div><div className="stat-lbl">Formularios</div></div>
        <div className="stat-card c2"><div className="stat-val">{stats.entradas}</div><div className="stat-lbl">Entradas diario</div></div>
        <div className="stat-card c3"><div className="stat-val">{stats.sesiones}</div><div className="stat-lbl">Sesiones</div></div>
        <div className="stat-card c4"><div className="stat-val">{desbloqueados.length}/{LOGROS.length}</div><div className="stat-lbl">Logros</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:14}}>
        {LOGROS.map(l=>{
          const ok = desbloqueados.includes(l.id);
          return (
            <div key={l.id} className="card" style={{marginBottom:0,opacity:ok?1:0.38,transition:'all .3s',border:ok?`1px solid ${l.color}40`:'1px solid var(--brd)',position:'relative',overflow:'hidden'}}>
              {ok && <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${l.color},transparent)`}}/>}
              <div style={{fontSize:36,marginBottom:10}}>{l.icon}</div>
              <div style={{fontWeight:700,fontSize:14,color:ok?l.color:'var(--muted)',marginBottom:4}}>{l.titulo}</div>
              <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.5}}>{l.desc}</div>
              {ok && <div style={{marginTop:10,fontSize:10,color:l.color,fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>✓ Desbloqueado</div>}
              {!ok && <div style={{marginTop:10,fontSize:10,color:'var(--muted)',letterSpacing:1,textTransform:'uppercase'}}>Bloqueado</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── OBJETIVOS SEMANALES ───────────────────────────────────────────────────────
function ObjetivosJugador() {
  const {perfil} = useApp();
  const [objetivos,setObjetivos] = useState([]);

  useEffect(()=>{
    const hoy = new Date();
    const lunes = new Date(hoy); lunes.setDate(hoy.getDate()-hoy.getDay()+1); lunes.setHours(0,0,0,0);
    const domingo = new Date(lunes); domingo.setDate(lunes.getDate()+6); domingo.setHours(23,59,59,999);
    sb.from('objetivos_semanales').select('*').eq('jugador_id',perfil.id)
      .gte('semana_inicio',lunes.toISOString()).lte('semana_inicio',domingo.toISOString())
      .order('created_at').then(({data})=>setObjetivos(data||[]));
  },[]);

  const marcar = async (id, actual) => {
    await sb.from('objetivos_semanales').update({completado:!actual}).eq('id',id);
    setObjetivos(prev=>prev.map(o=>o.id===id?{...o,completado:!actual}:o));
  };

  const completados = objetivos.filter(o=>o.completado).length;

  return (
    <div className="animate-in">
      <div className="ph">
        <div className="page-title">Mis Objetivos</div>
        <div className="page-sub">Objetivos de esta semana definidos por tu psicóloga</div>
      </div>
      <div className="page-divider"/>

      {objetivos.length>0 && (
        <div className="card" style={{marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Progreso semanal</div>
            <div style={{fontSize:13,color:'var(--accent)',fontWeight:700}}>{completados}/{objetivos.length}</div>
          </div>
          <div className="prog-wrap"><div className="prog-fill" style={{width:`${objetivos.length>0?(completados/objetivos.length)*100:0}%`}}/></div>
        </div>
      )}

      {objetivos.length===0
        ? <div className="empty"><span className="empty-icon">🎯</span><div>Tu psicóloga todavía no cargó objetivos esta semana.</div></div>
        : objetivos.map(o=>(
          <div key={o.id} className="card" style={{marginBottom:12,cursor:'pointer',borderColor:o.completado?'var(--success)':'var(--brd2)'}} onClick={()=>marcar(o.id,o.completado)}>
            <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
              <div style={{width:24,height:24,borderRadius:6,border:`2px solid ${o.completado?'var(--success)':'var(--brd3)'}`,background:o.completado?'rgba(22,163,74,.15)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2,transition:'all .2s'}}>
                {o.completado && <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="#4ade80" strokeWidth="2.5"><polyline points="2,8 6,12 14,4"/></svg>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14,color:o.completado?'var(--muted)':'var(--text)',textDecoration:o.completado?'line-through':'none',transition:'all .2s'}}>{o.titulo}</div>
                {o.descripcion && <div style={{fontSize:12,color:'var(--muted)',marginTop:4,lineHeight:1.6}}>{o.descripcion}</div>}
                {o.prioridad==='alta' && <span className="badge b-red" style={{marginTop:6}}>Alta prioridad</span>}
                {o.prioridad==='media' && <span className="badge b-blue" style={{marginTop:6}}>Media</span>}
              </div>
            </div>
          </div>
        ))
      }
    </div>
  );
}

// ── OBJETIVOS - PANEL PSICÓLOGA ───────────────────────────────────────────────
function ObjetivosPsicologa() {
  const {perfil} = useApp();
  const [jugadores,setJugadores] = useState([]);
  const [selJ,setSelJ] = useState(null);
  const [objetivos,setObjetivos] = useState([]);
  const [modal,setModal] = useState(false);
  const [titulo,setTitulo] = useState('');
  const [desc,setDesc] = useState('');
  const [prior,setPrior] = useState('media');
  const [busy,setBusy] = useState(false);

  useEffect(()=>{
    sb.from('perfiles').select('*').eq('psicologa_id',perfil.id).eq('rol','jugador').then(({data})=>setJugadores(data||[]));
  },[]);

  const cargarObjetivos = async (jid) => {
    const hoy = new Date();
    const lunes = new Date(hoy); lunes.setDate(hoy.getDate()-hoy.getDay()+1); lunes.setHours(0,0,0,0);
    const {data} = await sb.from('objetivos_semanales').select('*').eq('jugador_id',jid)
      .gte('semana_inicio',lunes.toISOString()).order('created_at');
    setObjetivos(data||[]);
  };

  const selJugador = j => { setSelJ(j); cargarObjetivos(j.id); };

  const guardar = async () => {
    if(!titulo.trim()||!selJ) return;
    setBusy(true);
    const hoy = new Date();
    const lunes = new Date(hoy); lunes.setDate(hoy.getDate()-hoy.getDay()+1); lunes.setHours(0,0,0,0);
    await sb.from('objetivos_semanales').insert({jugador_id:selJ.id,psicologa_id:perfil.id,titulo:titulo.trim(),descripcion:desc.trim(),prioridad:prior,semana_inicio:lunes.toISOString(),completado:false});
    setTitulo(''); setDesc(''); setPrior('media'); setModal(false); setBusy(false);
    cargarObjetivos(selJ.id);
  };

  const eliminar = async id => {
    await sb.from('objetivos_semanales').delete().eq('id',id);
    cargarObjetivos(selJ.id);
  };

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div><div className="page-title">Objetivos Semanales</div><div className="page-sub">Asigná objetivos semanales a tus jugadores</div></div>
        {selJ && <button className="btn btn-g" onClick={()=>setModal(true)}>+ Agregar objetivo</button>}
      </div>
      <div className="page-divider"/>
      <div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:20}}>
        <div>
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Jugadores</div>
          {jugadores.map(j=>(
            <div key={j.id} onClick={()=>selJugador(j)} style={{padding:'10px 14px',borderRadius:10,marginBottom:8,cursor:'pointer',background:selJ?.id===j.id?'rgba(168,85,247,.12)':'var(--bg2)',border:`1px solid ${selJ?.id===j.id?'var(--purple3)':'var(--brd)'}`,transition:'all .2s'}}>
              <div style={{fontWeight:600,fontSize:13}}>{j.nombre||j.email}</div>
            </div>
          ))}
        </div>
        <div>
          {!selJ ? <div className="empty" style={{paddingTop:40}}><span className="empty-icon">🎯</span><div>Seleccioná un jugador</div></div>
          : objetivos.length===0
            ? <div className="empty" style={{paddingTop:40}}><span className="empty-icon">📭</span><div>Sin objetivos esta semana para {selJ.nombre}.</div></div>
            : objetivos.map(o=>(
              <div key={o.id} className="card" style={{marginBottom:12,borderColor:o.completado?'rgba(22,163,74,.3)':'var(--brd2)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      {o.completado && <span style={{color:'#4ade80',fontSize:14}}>✓</span>}
                      <div style={{fontWeight:600,fontSize:14,color:o.completado?'var(--muted)':'var(--text)',textDecoration:o.completado?'line-through':'none'}}>{o.titulo}</div>
                    </div>
                    {o.descripcion && <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>{o.descripcion}</div>}
                    <div style={{marginTop:6,display:'flex',gap:6}}>
                      {o.prioridad==='alta'&&<span className="badge b-red">Alta</span>}
                      {o.prioridad==='media'&&<span className="badge b-blue">Media</span>}
                      {o.prioridad==='baja'&&<span className="badge b-gray">Baja</span>}
                      {o.completado&&<span className="badge b-green">Completado</span>}
                    </div>
                  </div>
                  <button className="action-btn del" onClick={()=>eliminar(o.id)}>✕</button>
                </div>
              </div>
            ))
          }
        </div>
      </div>

      {modal && (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setModal(false)}}>
          <div className="modal">
            <div className="modal-hd"><div className="modal-title">Nuevo objetivo para {selJ?.nombre}</div><button className="modal-x" onClick={()=>setModal(false)}>✕</button></div>
            <div className="fg"><label className="fl">Objetivo</label><input className="fc" value={titulo} onChange={e=>setTitulo(e.target.value)} placeholder="Ej: Practicar técnica de respiración antes del partido"/></div>
            <div className="fg"><label className="fl">Descripción (opcional)</label><textarea className="fc" rows={3} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Más detalles..."/></div>
            <div className="fg"><label className="fl">Prioridad</label>
              <select className="fc" value={prior} onChange={e=>setPrior(e.target.value)}>
                <option value="alta">Alta</option>
                <option value="media">Media</option>
                <option value="baja">Baja</option>
              </select>
            </div>
            <button className="btn btn-g" style={{width:'100%',justifyContent:'center'}} onClick={guardar} disabled={busy||!titulo.trim()}>
              {busy?<><div className="spin"/>Guardando…</>:'✓ Asignar objetivo'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── HISTORIAL COMPARATIVO (Psicóloga) ────────────────────────────────────────
function HistorialComparativo() {
  const {perfil} = useApp();
  const [jugadores,setJugadores] = useState([]);
  const [selJ,setSelJ] = useState(null);
  const [data,setData] = useState({forms:[],diags:[],cprd:[],diario:[]});
  const [loading,setLoading] = useState(false);

  useEffect(()=>{
    sb.from('perfiles').select('*').eq('psicologa_id',perfil.id).eq('rol','jugador').then(({data})=>setJugadores(data||[]));
  },[]);

  const cargar = async j => {
    setSelJ(j); setLoading(true);
    const [f,d,cp,diario] = await Promise.all([
      sb.from('respuestas').select('*,formularios!formulario_id(titulo)').eq('jugador_id',j.id).order('created_at',{ascending:false}).limit(20),
      sb.from('diagnosticos').select('*').eq('jugador_id',j.id).order('created_at',{ascending:false}).limit(10),
      sb.from('evaluaciones_cprd').select('*').eq('jugador_id',j.id).order('created_at',{ascending:false}).limit(10),
      sb.from('diario_mental').select('*').eq('jugador_id',j.id).eq('compartido',true).order('created_at',{ascending:false}).limit(20),
    ]);
    setData({forms:f.data||[],diags:d.data||[],cprd:cp.data||[],diario:diario.data||[]});
    setLoading(false);
  };

  return (
    <div className="animate-in">
      <div className="ph"><div className="page-title">Historial Comparativo</div><div className="page-sub">Evolución completa de cada jugador</div></div>
      <div className="page-divider"/>
      <div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:20}}>
        <div>
          {jugadores.map(j=>(
            <div key={j.id} onClick={()=>cargar(j)} style={{padding:'10px 14px',borderRadius:10,marginBottom:8,cursor:'pointer',background:selJ?.id===j.id?'rgba(168,85,247,.12)':'var(--bg2)',border:`1px solid ${selJ?.id===j.id?'var(--purple3)':'var(--brd)'}`,transition:'all .2s'}}>
              <div style={{fontWeight:600,fontSize:13}}>{j.nombre||j.email}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{j.posicion||'Jugador'}</div>
            </div>
          ))}
        </div>
        <div>
          {!selJ ? <div className="empty" style={{paddingTop:40}}><span className="empty-icon">📊</span><div>Seleccioná un jugador para ver su historial</div></div>
          : loading ? <div style={{color:'var(--muted)',padding:40,textAlign:'center'}}><div className="spin"/></div>
          : (
            <>
              <div className="tabs" style={{marginBottom:0}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:'var(--accent)',marginBottom:16}}>{selJ.nombre}</div>
              </div>

              {/* Formularios */}
              <div className="card" style={{marginBottom:14}}>
                <div className="card-title">📋 Últimas respuestas a formularios ({data.forms.length})</div>
                {data.forms.length===0 ? <div style={{color:'var(--muted)',fontSize:13}}>Sin respuestas.</div>
                : data.forms.slice(0,5).map(r=>(
                  <div key={r.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--brd)',fontSize:13}}>
                    <div style={{color:'var(--text2)'}}>{r.formularios?.titulo||'Formulario'}</div>
                    <div style={{color:'var(--muted)'}}>{new Date(r.created_at).toLocaleDateString('es-AR')}</div>
                  </div>
                ))}
              </div>

              {/* Diagnósticos */}
              <div className="card" style={{marginBottom:14}}>
                <div className="card-title">🧠 Diagnósticos emitidos ({data.diags.length})</div>
                {data.diags.length===0 ? <div style={{color:'var(--muted)',fontSize:13}}>Sin diagnósticos.</div>
                : data.diags.map(d=>(
                  <div key={d.id} style={{padding:'10px 0',borderBottom:'1px solid var(--brd)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span className="badge b-purple">{d.tipo||'General'}</span>
                      <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(d.created_at).toLocaleDateString('es-AR')}</span>
                    </div>
                    <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>{d.texto?.substring(0,150)}{d.texto?.length>150?'...':''}</div>
                  </div>
                ))}
              </div>

              {/* CPRD */}
              {data.cprd.length>0 && (
                <div className="card" style={{marginBottom:14}}>
                  <div className="card-title">🔬 Evaluaciones CPRD ({data.cprd.length})</div>
                  {data.cprd.map(c=>{
                    const res = c.resultado||{};
                    return (
                      <div key={c.id} style={{padding:'10px 0',borderBottom:'1px solid var(--brd)'}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                          <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>CPRD {new Date(c.created_at).toLocaleDateString('es-AR')}</span>
                          <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(c.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</span>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                          {Object.entries(res).map(([k,v])=>(
                            <div key={k} style={{background:'var(--bg3)',borderRadius:6,padding:'6px 10px'}}>
                              <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1}}>{k}</div>
                              <div style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>{typeof v==='object'?v.percentil||v.pd||'—':v}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Evolución del humor — gráfico temporal */}
              {data.diario.length>=2 && (()=>{
                const HUMORES_LIST=['😞','😕','😐','🙂','😄'];
                const HUMOR_COLORS=['#f87171','#fb923c','#94a3b8','#60a5fa','#4ade80'];
                const sorted = [...data.diario].filter(e=>e.humor).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).slice(-14);
                if(sorted.length<2) return null;
                const W=520, H=90, PL=10, PR=10, PT=14, PB=20;
                const vals=sorted.map(e=>e.humor||3), mn=1, mx=5, rng=mx-mn;
                const xs=sorted.map((_,i)=>PL+i*(W-PL-PR)/(sorted.length-1));
                const ys=sorted.map(v=>PT+(H-PT-PB)*(1-(v-mn)/rng));
                const path=xs.map((x,i)=>(i===0?`M${x},${ys[i]}`:`L${x},${ys[i]}`)).join(' ');
                const area=`M${xs[0]},${H-PB} ${xs.map((x,i)=>`L${x},${ys[i]}`).join(' ')} L${xs[xs.length-1]},${H-PB} Z`;
                const avgHumor=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
                const tendencia=vals[vals.length-1]-vals[0];
                return (
                  <div className="card" style={{marginBottom:14}}>
                    <div className="card-title" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span>📈 Evolución del humor — últimas {sorted.length} entradas</span>
                      <div style={{display:'flex',gap:10,alignItems:'center'}}>
                        <span style={{fontSize:11,color:'var(--muted)',fontWeight:400,textTransform:'none',letterSpacing:0}}>Promedio: <strong style={{color:'var(--accent)'}}>{avgHumor}/5</strong></span>
                        <span style={{fontSize:11,fontWeight:400,textTransform:'none',letterSpacing:0,color:tendencia>0?'#4ade80':tendencia<0?'#f87171':'var(--muted)'}}>
                          {tendencia>0?'↑ Mejorando':tendencia<0?'↓ Bajando':'→ Estable'}
                        </span>
                      </div>
                    </div>
                    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible',marginBottom:8}}>
                      <defs>
                        <linearGradient id="hc-grad" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor="#a855f7" stopOpacity=".18"/>
                          <stop offset="100%" stopColor="#a855f7" stopOpacity="0"/>
                        </linearGradient>
                      </defs>
                      {[1,2,3,4,5].map(v=>{
                        const y=PT+(H-PT-PB)*(1-(v-mn)/rng);
                        return <line key={v} x1={PL} y1={y} x2={W-PR} y2={y} stroke="rgba(168,85,247,.08)" strokeWidth="1"/>;
                      })}
                      <path d={area} fill="url(#hc-grad)"/>
                      <path d={path} fill="none" stroke="#a855f7" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                      {xs.map((x,i)=>(
                        <g key={i}>
                          <circle cx={x} cy={ys[i]} r="5" fill="var(--bg2)" stroke={HUMOR_COLORS[vals[i]-1]||'#a855f7'} strokeWidth="2"/>
                          <text x={x} y={H-5} textAnchor="middle" style={{fontSize:'8px',fill:'var(--muted)',fontFamily:'DM Sans'}}>
                            {new Date(sorted[i].created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})}
                          </text>
                          <text x={x} y={ys[i]-9} textAnchor="middle" style={{fontSize:'12px'}}>{HUMORES_LIST[vals[i]-1]}</text>
                        </g>
                      ))}
                    </svg>
                    <div style={{display:'flex',gap:16,marginTop:4}}>
                      {[1,2,3,4,5].map((v,i)=>(
                        <div key={v} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--muted)'}}>
                          <span>{HUMORES_LIST[i]}</span><span style={{color:HUMOR_COLORS[i]}}>·{v}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}

              {/* Diario Mental compartido */}
              <div className="card">
                <div className="card-title" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span>📔 Diario Mental compartido ({data.diario.length})</span>
                  {data.diario.length===0 && <span style={{fontSize:11,color:'var(--muted)',fontWeight:400,textTransform:'none',letterSpacing:0}}>El jugador no compartió entradas aún</span>}
                </div>
                {data.diario.length===0
                  ? <div style={{color:'var(--muted)',fontSize:13,padding:'8px 0'}}>Sin entradas compartidas. El jugador puede compartir entradas desde su diario.</div>
                  : data.diario.map(e=>{
                    const HUMORES=['😞','😕','😐','🙂','😄'];
                    return (
                      <div key={e.id} style={{padding:'12px 0',borderBottom:'1px solid var(--brd)'}}>
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                          <span style={{fontSize:22}}>{HUMORES[e.humor-1]||'😐'}</span>
                          <div>
                            <div style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>{new Date(e.created_at).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div>
                            <div style={{fontSize:11,color:'var(--muted)'}}>{new Date(e.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</div>
                          </div>
                          {(e.tags||[]).length>0 && <div style={{display:'flex',gap:4,flexWrap:'wrap',marginLeft:'auto'}}>{e.tags.map(t=><span key={t} className="nota-priv-tag">{t}</span>)}</div>}
                        </div>
                        <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.75,whiteSpace:'pre-wrap',margin:0}}>{e.texto}</p>
                      </div>
                    );
                  })
                }
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── ALERTAS DE RIESGO (Psicóloga) ────────────────────────────────────────────
function AlertasRiesgo() {
  const {perfil} = useApp();
  const [alertas,setAlertas] = useState([]);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{ cargar(); },[]);

  const cargar = async () => {
    setLoading(true);
    const {data:jugs} = await sb.from('perfiles').select('id,nombre,email').eq('psicologa_id',perfil.id).eq('rol','jugador');
    const jugIds = (jugs||[]).map(j=>j.id);
    if(jugIds.length===0){ setAlertas([]); setLoading(false); return; }

    // Buscar CPRDs con percentil bajo en cualquier dimensión
    const {data:cprds} = await sb.from('evaluaciones_cprd').select('*').in('jugador_id',jugIds).order('created_at',{ascending:false});
    const {data:emer} = await sb.from('mensajes_emergencia').select('*,perfiles!sender_id(nombre)').in('sender_id',jugIds).eq('leido',false).order('created_at',{ascending:false});

    const als = [];

    // Alertas por CPRD bajo
    const ultimosCprd = {};
    (cprds||[]).forEach(c=>{ if(!ultimosCprd[c.jugador_id]) ultimosCprd[c.jugador_id]=c; });
    Object.values(ultimosCprd).forEach(c=>{
      const jug = (jugs||[]).find(j=>j.id===c.jugador_id);
      const res = c.resultado||{};
      Object.entries(res).forEach(([dim,val])=>{
        const p = typeof val==='object'?val.percentil:null;
        if(p!==null && p<25){
          als.push({tipo:'cprd',nivel:'alto',jugador:jug?.nombre||'Jugador',jugador_id:c.jugador_id,mensaje:`Percentil bajo en ${dim}: ${p}`,fecha:c.created_at});
        }
      });
    });

    // Alertas por mensajes de emergencia no leídos
    (emer||[]).forEach(m=>{
      als.push({tipo:'emergencia',nivel:'critico',jugador:m.perfiles?.nombre||'Jugador',jugador_id:m.sender_id,mensaje:m.texto?.substring(0,80),fecha:m.created_at});
    });

    als.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
    setAlertas(als);
    setLoading(false);
  };

  const colorNivel = n => n==='critico'?'#dc2626':n==='alto'?'#f59e0b':'#a855f7';
  const iconNivel = n => n==='critico'?'🚨':n==='alto'?'⚠️':'ℹ️';

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div>
          <div className="page-title" style={{background:'linear-gradient(90deg,#f87171,#fca5a5)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Alertas de Riesgo</div>
          <div className="page-sub">Jugadores que necesitan atención</div>
        </div>
        <button className="btn btn-o" onClick={cargar}>↻ Actualizar</button>
      </div>
      <div className="page-divider"/>
      {loading ? <div style={{textAlign:'center',padding:40}}><div className="spin"/></div>
      : alertas.length===0
        ? <div className="empty"><span className="empty-icon">✅</span><div style={{color:'#4ade80'}}>Todos tus jugadores están bien. Sin alertas activas.</div></div>
        : alertas.map((a,i)=>(
          <div key={i} className="card" style={{marginBottom:12,borderColor:`${colorNivel(a.nivel)}40`,background:`linear-gradient(135deg,var(--bg2),${colorNivel(a.nivel)}08)`}}>
            <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
              <div style={{width:42,height:42,borderRadius:10,background:`${colorNivel(a.nivel)}20`,border:`1px solid ${colorNivel(a.nivel)}40`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:20}}>
                {iconNivel(a.nivel)}
              </div>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                  <div style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>{a.jugador}</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{new Date(a.fecha).toLocaleDateString('es-AR')}</div>
                </div>
                <div style={{fontSize:13,color:'var(--text2)',marginBottom:6}}>{a.mensaje}</div>
                <span style={{background:`${colorNivel(a.nivel)}20`,color:colorNivel(a.nivel),border:`1px solid ${colorNivel(a.nivel)}40`,borderRadius:20,padding:'2px 10px',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>
                  {a.tipo==='emergencia'?'Emergencia':a.tipo==='cprd'?'Evaluación':'Alerta'} · {a.nivel}
                </span>
              </div>
            </div>
          </div>
        ))
      }
    </div>
  );
}

// ── FORMULARIOS PROGRAMADOS (Psicóloga) ──────────────────────────────────────
function FormulariosProgramados() {
  const {perfil} = useApp();
  const [programados,setProgramados] = useState([]);
  const [jugadores,setJugadores] = useState([]);
  const [formularios,setFormularios] = useState([]);
  const [modal,setModal] = useState(false);
  const [selJ,setSelJ] = useState('');
  const [selF,setSelF] = useState('');
  const [fecha,setFecha] = useState('');
  const [nota,setNota] = useState('');
  const [busy,setBusy] = useState(false);

  useEffect(()=>{
    cargar();
    sb.from('perfiles').select('*').eq('psicologa_id',perfil.id).eq('rol','jugador').then(({data})=>setJugadores(data||[]));
    sb.from('formularios').select('*').then(({data})=>setFormularios(data||[]));
  },[]);

  const cargar = async () => {
    const {data} = await sb.from('formularios_programados').select('*,perfiles!jugador_id(nombre),formularios!formulario_id(titulo)').eq('psicologa_id',perfil.id).order('fecha_programada');
    setProgramados(data||[]);
  };

  const guardar = async () => {
    if(!selJ||!selF||!fecha) return;
    setBusy(true);
    await sb.from('formularios_programados').insert({jugador_id:selJ,formulario_id:selF,psicologa_id:perfil.id,fecha_programada:fecha,nota:nota.trim(),enviado:false});
    setModal(false); setSelJ(''); setSelF(''); setFecha(''); setNota(''); setBusy(false);
    cargar();
  };

  const eliminar = async id => {
    await sb.from('formularios_programados').delete().eq('id',id);
    cargar();
  };

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div><div className="page-title">Agenda de Formularios</div><div className="page-sub">Registrá qué formulario querés que complete cada jugador y en qué fecha · El jugador debe completarlo manualmente</div></div>
        <button className="btn btn-g" onClick={()=>setModal(true)}>+ Programar</button>
      </div>
      <div className="page-divider"/>

      {/* Banner aclaratorio */}
      <div style={{background:'rgba(168,85,247,.06)',border:'1px solid rgba(168,85,247,.18)',borderRadius:10,padding:'12px 16px',marginBottom:20,display:'flex',gap:12,alignItems:'flex-start'}}>
        <span style={{fontSize:18,flexShrink:0}}>📋</span>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:3}}>Esta es una agenda de referencia, no un sistema de envío automático</div>
          <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.7}}>Registrá aquí qué formulario querés que complete cada jugador y para cuándo. Luego recordale personalmente o por el canal de emergencias que lo complete. El estado "Pendiente" o "Vencido" es informativo.</div>
        </div>
      </div>

      {programados.length===0
        ? <div className="empty"><span className="empty-icon">📅</span><div>Sin formularios programados todavía.</div></div>
        : programados.map(p=>{
          const pasado = new Date(p.fecha_programada)<new Date();
          return (
            <div key={p.id} className="card" style={{marginBottom:12,opacity:pasado?0.55:1}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:'var(--text)',marginBottom:4}}>{p.formularios?.titulo||'Formulario'}</div>
                  <div style={{fontSize:13,color:'var(--muted)',marginBottom:6}}>Para: <span style={{color:'var(--accent)'}}>{p.perfiles?.nombre||'Jugador'}</span></div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span className="badge b-blue">📅 {new Date(p.fecha_programada).toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'})}</span>
                    {p.enviado && <span className="badge b-green">✓ Enviado</span>}
                    {!p.enviado && pasado && <span className="badge b-red">Vencido</span>}
                    {!p.enviado && !pasado && <span className="badge b-purple">Pendiente</span>}
                  </div>
                  {p.nota && <div style={{fontSize:12,color:'var(--muted)',marginTop:6}}>{p.nota}</div>}
                </div>
                <button className="action-btn del" onClick={()=>eliminar(p.id)}>✕</button>
              </div>
            </div>
          );
        })
      }

      {modal && (
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setModal(false)}}>
          <div className="modal">
            <div className="modal-hd"><div className="modal-title">Registrar en agenda</div><button className="modal-x" onClick={()=>setModal(false)}>✕</button></div>
            <div className="fg"><label className="fl">Jugador</label>
              <select className="fc" value={selJ} onChange={e=>setSelJ(e.target.value)}>
                <option value="">Seleccioná un jugador...</option>
                {jugadores.map(j=><option key={j.id} value={j.id}>{j.nombre||j.email}</option>)}
              </select>
            </div>
            <div className="fg"><label className="fl">Formulario</label>
              <select className="fc" value={selF} onChange={e=>setSelF(e.target.value)}>
                <option value="">Seleccioná un formulario...</option>
                {formularios.map(f=><option key={f.id} value={f.id}>{f.titulo}</option>)}
              </select>
            </div>
            <div className="fg"><label className="fl">Fecha / hora de envío</label>
              <input className="fc" type="datetime-local" value={fecha} onChange={e=>setFecha(e.target.value)}/>
            </div>
            <div className="fg"><label className="fl">Nota para el jugador (opcional)</label>
              <input className="fc" value={nota} onChange={e=>setNota(e.target.value)} placeholder="Ej: Completalo antes del partido de hoy"/>
            </div>
            <button className="btn btn-g" style={{width:'100%',justifyContent:'center'}} onClick={guardar} disabled={busy||!selJ||!selF||!fecha}>
              {busy?<><div className="spin"/>Guardando…</>:'📅 Registrar en agenda'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MODO OSCURO / TEMA (Global toggle) ───────────────────────────────────────
// El modo oscuro ya es el default (dark theme). Agregamos toggle light mode.
function aplicarTema(modo) {
  const r = document.documentElement;
  if(modo==='light'){
    r.style.setProperty('--bg','#f8f5ff');
    r.style.setProperty('--bg2','#f0ebff');
    r.style.setProperty('--bg3','#e8deff');
    r.style.setProperty('--bg4','#ddd0ff');
    r.style.setProperty('--bg5','#c9b8f8');
    r.style.setProperty('--brd','rgba(109,40,217,.12)');
    r.style.setProperty('--brd2','rgba(109,40,217,.2)');
    r.style.setProperty('--brd3','rgba(109,40,217,.35)');
    r.style.setProperty('--text','#1a0040');
    r.style.setProperty('--text2','#3d1a70');
    r.style.setProperty('--muted','#7c5cbf');
    document.body.style.background='#f8f5ff';
    document.body.style.color='#1a0040';
  } else {
    r.style.setProperty('--bg','#040008');
    r.style.setProperty('--bg2','#07000e');
    r.style.setProperty('--bg3','#0e0018');
    r.style.setProperty('--bg4','#160022');
    r.style.setProperty('--bg5','#1e002e');
    r.style.setProperty('--brd','rgba(168,85,247,.1)');
    r.style.setProperty('--brd2','rgba(168,85,247,.2)');
    r.style.setProperty('--brd3','rgba(168,85,247,.38)');
    r.style.setProperty('--text','#f5f0ff');
    r.style.setProperty('--text2','#c4b5d4');
    r.style.setProperty('--muted','#6b5f80');
    document.body.style.background='#040008';
    document.body.style.color='#f5f0ff';
  }
  localStorage.setItem('pnm_tema',modo);
}
// Aplicar tema guardado al cargar
try { const t=localStorage.getItem('pnm_tema'); if(t) aplicarTema(t); } catch(e){}

// ── EXPORTAR REPORTES (Admin + Psicóloga) ────────────────────────────────────
function ExportarReportes() {
  const {perfil} = useApp();
  const [jugadores,setJugadores] = useState([]);
  const [selJ,setSelJ] = useState(null);
  const [loading,setLoading] = useState(false);
  const [exporting,setExporting] = useState(false);

  useEffect(()=>{
    if(perfil.rol==='psicologa'){
      sb.from('perfiles').select('*').eq('psicologa_id',perfil.id).eq('rol','jugador').then(({data})=>setJugadores(data||[]));
    } else {
      sb.from('perfiles').select('*').eq('rol','jugador').order('nombre').then(({data})=>setJugadores(data||[]));
    }
  },[]);

  const exportarExcel = async () => {
    if(!selJ) return;
    setExporting(true);
    const [resps,diags,stats,cprd,sesiones] = await Promise.all([
      sb.from('respuestas').select('*,formularios!formulario_id(titulo)').eq('jugador_id',selJ.id).order('created_at',{ascending:false}),
      sb.from('diagnosticos').select('*').eq('jugador_id',selJ.id).order('created_at',{ascending:false}),
      sb.from('estadisticas_partidos').select('*').eq('jugador_id',selJ.id).order('fecha',{ascending:false}),
      sb.from('evaluaciones_cprd').select('*').eq('jugador_id',selJ.id).order('created_at',{ascending:false}),
      sb.from('sesiones').select('*').eq('jugador_id',selJ.id).order('fecha',{ascending:false}),
    ]);

    const wb = XLSX.utils.book_new();

    // Hoja 1: Datos del jugador
    const infoData = [['Campo','Valor'],['Nombre',selJ.nombre||''],['Email',selJ.email||''],['Posición',selJ.posicion||''],['Número',selJ.numero||''],['Equipo',selJ.equipo||'']];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(infoData), 'Perfil');

    // Hoja 2: Estadísticas
    if((stats.data||[]).length>0){
      const statsRows = [['Partido','Fecha','Puntos','Rebotes','Asistencias','Robos','Tapones','Minutos','+/-']];
      (stats.data||[]).forEach(s=>statsRows.push([s.partido||'',s.fecha||'',s.puntos||0,s.rebotes||0,s.asistencias||0,s.robos||0,s.tapones||0,s.minutos||0,s.plus_minus||0]));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(statsRows), 'Estadísticas');
    }

    // Hoja 3: Diagnósticos
    if((diags.data||[]).length>0){
      const diagRows = [['Fecha','Tipo','Texto']];
      (diags.data||[]).forEach(d=>diagRows.push([new Date(d.created_at).toLocaleDateString('es-AR'),d.tipo||'General',d.texto||'']));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(diagRows), 'Diagnósticos');
    }

    // Hoja 4: Sesiones
    if((sesiones.data||[]).length>0){
      const sesRows = [['Fecha','Hora','Tipo','Notas']];
      (sesiones.data||[]).forEach(s=>sesRows.push([new Date(s.fecha).toLocaleDateString('es-AR'),s.hora_texto||'',s.tipo||'',s.notas||'']));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sesRows), 'Sesiones');
    }

    // Hoja 5: CPRD
    if((cprd.data||[]).length>0){
      const cprdRows = [['Fecha','Control Estrés','Influencia del Evaluador','Motivación','Habilidad Mental']];
      (cprd.data||[]).forEach(c=>{
        const r = c.resultado||{};
        cprdRows.push([new Date(c.created_at).toLocaleDateString('es-AR'),
          r['Control del Estrés']?.percentil||r['Control del Estrés']?.pd||'',
          r['Influencia del Evaluador']?.percentil||r['Influencia del Evaluador']?.pd||'',
          r['Motivación']?.percentil||r['Motivación']?.pd||'',
          r['Habilidad Mental']?.percentil||r['Habilidad Mental']?.pd||'',
        ]);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(cprdRows), 'CPRD');
    }

    XLSX.writeFile(wb, `reporte_${(selJ.nombre||selJ.email).replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
    setExporting(false);
  };

  return (
    <div className="animate-in">
      <div className="ph"><div className="page-title">Exportar Reportes</div><div className="page-sub">Descargá el historial completo de un jugador en Excel</div></div>
      <div className="page-divider"/>
      <div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:20}}>
        <div>
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>Jugadores</div>
          {jugadores.map(j=>(
            <div key={j.id} onClick={()=>setSelJ(j)} style={{padding:'10px 14px',borderRadius:10,marginBottom:8,cursor:'pointer',background:selJ?.id===j.id?'rgba(168,85,247,.12)':'var(--bg2)',border:`1px solid ${selJ?.id===j.id?'var(--purple3)':'var(--brd)'}`,transition:'all .2s'}}>
              <div style={{fontWeight:600,fontSize:13}}>{j.nombre||j.email}</div>
            </div>
          ))}
        </div>
        <div>
          {!selJ
            ? <div className="empty" style={{paddingTop:40}}><span className="empty-icon">📁</span><div>Seleccioná un jugador para exportar su reporte</div></div>
            : (
              <div className="card">
                <div style={{fontSize:22,fontFamily:"'Bebas Neue'",color:'var(--accent)',marginBottom:4}}>{selJ.nombre}</div>
                <div style={{fontSize:13,color:'var(--muted)',marginBottom:24}}>{selJ.email}</div>
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:13,color:'var(--text2)',lineHeight:2}}>
                    El archivo Excel incluirá:<br/>
                    ✓ Perfil del jugador<br/>
                    ✓ Estadísticas de partidos<br/>
                    ✓ Diagnósticos emitidos<br/>
                    ✓ Sesiones realizadas<br/>
                    ✓ Evaluaciones CPRD
                  </div>
                </div>
                <button className="btn btn-g" onClick={exportarExcel} disabled={exporting} style={{gap:10}}>
                  {exporting?<><div className="spin"/>Generando…</>:<><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Descargar Excel</>}
                </button>
              </div>
            )
          }
        </div>
      </div>
    </div>
  );
}
