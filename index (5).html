function CargarStats() {
  const {perfil} = useApp();
  const [jugadores,setJugadores] = useState([]);
  const [selJ,setSelJ]   = useState('');
  const [selP,setSelP]   = useState('');
  const [file,setFile]   = useState(null);
  const [busy,setBusy]   = useState(false);
  const [ok,setOk]       = useState('');
  const [err,setErr]     = useState('');
  const [stats,setStats] = useState([]);
  const [tab,setTab]     = useState('cargar');
  const [excelRows,setExcelRows] = useState([]);
  const [excelHeaders,setExcelHeaders] = useState([]);
  const [filaEncontrada,setFilaEncontrada] = useState(null);

  useEffect(()=>{
    const loadJugs = () => sb.from('perfiles').select('*').eq('rol','jugador').order('nombre').then(({data})=>setJugadores(data||[]));
    const loadAllStats = () => sb.from('estadisticas_partidos').select('*,perfiles!jugador_id(nombre)').order('created_at',{ascending:false}).then(({data})=>setStats(data||[]));
    loadJugs(); loadAllStats();
    const ch = sb.channel('stats-admin-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'estadisticas_partidos'},loadAllStats)
      .on('postgres_changes',{event:'*',schema:'public',table:'perfiles'},loadJugs)
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[]);

  // Mapeo flexible: columnas del Excel → columnas de Supabase
  const MAPA = {
    'pts':'puntos','ptos':'puntos','puntos':'puntos','points':'puntos',
    'ast':'asistencias','asistencias':'asistencias','assists':'asistencias',
    'min':'minutos','minutos':'minutos','minutes':'minutos',
    '+/-':'plus_minus','plus_minus':'plus_minus',
    'val':'valoracion','val.':'valoracion','valoracion':'valoracion',
    'rec':'robos','rob':'robos','robos':'robos','steals':'robos',
    'tap':'tapones','blk':'tapones','tapones':'tapones','blocks':'tapones',
    'per':'perdidas','perdidas':'perdidas','to':'perdidas',
    'reb':'rebotes','tot.':'rebotes','total reb':'rebotes',
    'def':'rebotes_def','reb def':'rebotes_def','of':'rebotes_of','reb of':'rebotes_of',
    'fc':'faltas_com','fr':'faltas_rec',
  };

  const handleFile = (f) => {
    if(!f) return; setFile(f); setErr(''); setFilaEncontrada(null);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        // Leer todas las filas en bruto
        const raw = XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

        // Encontrar la fila de encabezados: buscar la fila que tenga "Nombre" o "nombre"
        let headerRowIdx = -1;
        for(let i=0; i<raw.length; i++){
          const row = raw[i];
          if(!row) continue;
          const hasNombre = row.some(v => v && String(v).toLowerCase().trim() === 'nombre');
          if(hasNombre){ headerRowIdx = i; break; }
        }
        if(headerRowIdx < 0){ setErr('No se encontró la fila de encabezados en el Excel.'); return; }

        const headers = raw[headerRowIdx].map(h => h ? String(h).trim() : '');

        // Filas de datos: desde headerRowIdx+1, ignorar vacías y TOTALES
        const dataRows = raw.slice(headerRowIdx+1).filter(row => {
          if(!row || !row.some(v => v !== null && v !== '')) return false;
          const nombreVal = row[1]; // columna Nombre generalmente en índice 1
          if(!nombreVal) return false;
          if(String(nombreVal).toUpperCase().includes('TOTAL')) return false;
          return true;
        });

        const parsed = dataRows.map(row => {
          const obj = {};
          headers.forEach((h,i) => { if(h) obj[h] = row[i] ?? null; });
          return obj;
        });

        setExcelHeaders(headers.filter(Boolean));
        setExcelRows(parsed);
      } catch(ex){ setErr('Error al leer el archivo: ' + ex.message); }
    };
    reader.readAsArrayBuffer(f);
  };

  // Buscar la fila del jugador cada vez que cambia el jugador o el Excel
  useEffect(()=>{
    if(!selJ || excelRows.length===0){ setFilaEncontrada(null); return; }
    const jugador = jugadores.find(j=>j.id===selJ);
    if(!jugador){ setFilaEncontrada(null); return; }
    const nombreBuscar = (jugador.nombre||'').toLowerCase().replace(/[,\.]/g,' ').trim();
    const partesBuscar = nombreBuscar.split(/\s+/).filter(p=>p.length>2);

    const fila = excelRows.find(row => {
      const nombreExcel = String(Object.values(row).find(v =>
        v && typeof v === 'string' && v.length > 3 &&
        !/^\d+$/.test(v) && !['totales','total'].includes(v.toLowerCase().trim())
      ) || '').toLowerCase().replace(/[,\.]/g,' ').trim();
      if(!nombreExcel) return false;
      // Match exacto
      if(nombreExcel === nombreBuscar) return true;
      // Match por apellido (primera palabra larga del excel vs primera palabra de la búsqueda)
      const partesExcel = nombreExcel.split(/\s+/).filter(p=>p.length>2);
      const matches = partesBuscar.filter(p => partesExcel.some(pe => pe.includes(p) || p.includes(pe)));
      return matches.length >= Math.min(2, partesBuscar.length);
    });

    setFilaEncontrada(fila||null);
    if(!fila) setErr(`No se encontró a "${jugador.nombre}" en el Excel. Verificá que el nombre coincida.`);
    else setErr('');
  },[selJ, excelRows]);

  const cargarManual = async () => {
    if(!selJ||!selP.trim()||!filaEncontrada) return;
    setBusy(true); setErr(''); setOk('');

    // Convierte "mm:ss" o "hh:mm:ss" a número entero de segundos totales
    const parsearTiempo = (v) => {
      if(v === null || v === '') return null;
      const s = String(v).trim();
      if(/^\d+$/.test(s)) return parseInt(s);
      const partes = s.split(':').map(Number);
      if(partes.length === 2) return partes[0]*60 + partes[1];
      if(partes.length === 3) return partes[0]*3600 + partes[1]*60 + partes[2];
      return null;
    };

    // Construir objeto mapeando columnas del Excel a columnas de Supabase
    const obj = {jugador_id:selJ, partido_nombre:selP.trim(), datos_completos:{}};
    Object.entries(filaEncontrada).forEach(([h,v]) => {
      if(v === null || v === '') return;
      const hNorm = h.toLowerCase().trim();
      const colDB = MAPA[hNorm];
      if(colDB) {
        // minutos viene como "21:41" → convertir a segundos enteros
        obj[colDB] = (colDB === 'minutos') ? parsearTiempo(v) : v;
      }
      obj.datos_completos[h] = v;
    });
    // datos_completos como JSON string
    obj.datos_completos = JSON.stringify(obj.datos_completos);

    const {error} = await sb.from('estadisticas_partidos').insert(obj);
    if(error){ setErr('Error al guardar: '+error.message); setBusy(false); return; }
    await log(perfil.id,'cargo_estadisticas',`${jugadores.find(j=>j.id===selJ)?.nombre} — ${selP.trim()}`);
    setOk(`✓ Stats de ${jugadores.find(j=>j.id===selJ)?.nombre} cargadas correctamente`);
    setBusy(false); setFile(null); setExcelRows([]); setFilaEncontrada(null); setSelP('');
    const {data:s} = await sb.from('estadisticas_partidos').select('*,perfiles!jugador_id(nombre)').order('created_at',{ascending:false});
    setStats(s||[]);
  };

  return (
    <div className="animate-in">
      <div className="ph"><div className="page-title">Cargar Estadísticas</div><div className="page-sub">Subí el Excel oficial del partido</div></div>
      <div className="tabs">
        <button className={`tab ${tab==='cargar'?'active':''}`} onClick={()=>setTab('cargar')}>📤 Cargar</button>
        <button className={`tab ${tab==='ver'?'active':''}`} onClick={()=>setTab('ver')}>📊 Ver todas</button>
      </div>

      {tab==='cargar' && <>
        {ok  && <div className="alert alert-s"><span>✓</span><span>{ok}</span></div>}
        {err && <div className="alert alert-e"><span>⚠</span><span>{err}</span></div>}
        <div className="card">
          <div className="card-title">1. Seleccioná el jugador y el partido</div>
          <div className="g2">
            <div className="fg">
              <label className="fl">Jugador</label>
              <select className="fc" value={selJ} onChange={e=>{setSelJ(e.target.value);setFilaEncontrada(null);}}>
                <option value="">Seleccioná…</option>
                {jugadores.map(j=><option key={j.id} value={j.id}>{j.nombre||j.email}</option>)}
              </select>
            </div>
            <div className="fg">
              <label className="fl">Partido</label>
              <input className="fc" type="text" value={selP} onChange={e=>setSelP(e.target.value)} placeholder="Ej: vs Quilmes 22/03"/>
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-title">2. Subí el Excel del partido</div>
          <div style={{background:'var(--bg3)',border:'1px solid var(--brd)',borderRadius:8,padding:12,marginBottom:16,fontSize:13,color:'var(--muted)',lineHeight:1.7}}>
            El sistema detecta automáticamente la tabla de estadísticas, busca al jugador seleccionado y carga <strong style={{color:'var(--text2)'}}>todas las columnas disponibles</strong>.
          </div>
          <div className={`upload-zone ${file?'over':''}`}
            onClick={()=>document.getElementById('file-input').click()}
            onDragOver={e=>e.preventDefault()}
            onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}}>
            <input id="file-input" type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
            {file ? <>
              <div style={{fontSize:28,marginBottom:6}}>✅</div>
              <div style={{fontWeight:600,color:'var(--text)'}}>{file.name}</div>
              <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>{excelRows.length} jugadores encontrados</div>
            </> : <>
              <div style={{fontSize:32,marginBottom:8}}>📂</div>
              <div style={{fontWeight:600,color:'var(--text)'}}>Arrastrá el archivo acá</div>
              <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>o hacé click para buscar · .xlsx y .xls</div>
            </>}
          </div>

          {filaEncontrada && (
            <div style={{marginTop:14,background:'var(--bg3)',border:'1px solid rgba(22,163,74,.3)',borderRadius:10,padding:16}}>
              <div style={{fontSize:12,color:'var(--success)',fontWeight:700,marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
                <span>✓</span><span>Jugador encontrado — estadísticas a cargar:</span>
              </div>
              <div className="tw">
                <table>
                  <thead>
                    <tr>{Object.entries(filaEncontrada).filter(([k,v])=>v!==null&&v!=='').map(([k])=><th key={k}>{k}</th>)}</tr>
                  </thead>
                  <tbody>
                    <tr>{Object.entries(filaEncontrada).filter(([k,v])=>v!==null&&v!=='').map(([k,v])=><td key={k} style={{color:'var(--accent)',fontWeight:600}}>{String(v)}</td>)}</tr>
                  </tbody>
                </table>
              </div>
            </div>
          )}

          <button className="btn btn-g" style={{marginTop:16}} onClick={cargarManual} disabled={busy||!selJ||!selP.trim()||!filaEncontrada}>
            {busy?<><div className="spin"/>Cargando…</>:'📤 Cargar estadísticas'}
          </button>
        </div>
      </>}

      {tab==='ver' && <>
        {stats.length===0
          ? <div className="empty"><div className="empty-icon">📊</div><div>No hay estadísticas cargadas aún.</div></div>
          : <div className="card"><div className="tw"><table>
              <thead><tr><th>Jugador</th><th>Partido</th><th>Pts</th><th>Reb</th><th>Ast</th><th>Rob</th><th>Tap</th><th>Min</th><th>+/-</th></tr></thead>
              <tbody>{stats.map(s=>(
                <tr key={s.id}>
                  <td className="td-primary">{s.perfiles?.nombre||'—'}</td>
                  <td style={{fontSize:13,color:'var(--muted)'}}>{s.partido_nombre||'—'}</td>
                  <td style={{fontWeight:800,color:'var(--accent)',fontSize:15}}>{s.puntos??s.datos_completos ? (()=>{try{return JSON.parse(s.datos_completos||'{}')['PTS']??'—'}catch{return '—'}})() : '—'}</td>
                  <td>{s.rebotes??'—'}</td>
                  <td>{s.asistencias??'—'}</td>
                  <td>{s.robos??'—'}</td>
                  <td>{s.tapones??'—'}</td>
                  <td>{s.minutos??'—'}</td>
                  <td style={{color:s.plus_minus>0?'var(--success)':s.plus_minus<0?'var(--danger)':'var(--muted)'}}>
                    {s.plus_minus!=null?(s.plus_minus>0?`+${s.plus_minus}`:s.plus_minus):'—'}
                  </td>
                </tr>
              ))}</tbody>
            </table></div></div>
        }
      </>}
    </div>
  );
}

function GestionUsuarios() {
  const {perfil:adminPerfil} = useApp();
  const [usuarios,setUsuarios] = useState([]);
  const [loading,setLoading]   = useState(true);
  const [editModal,setEditModal] = useState(null);
  const [deleteModal,setDeleteModal] = useState(null);
  const [tab,setTab] = useState('todos');
  const [stats,setStats] = useState({jugadores:0,psicologas:0,admins:0,total:0,activos_hoy:0});
  const [busy,setBusy] = useState(false);
  const [ok,setOk]     = useState('');
  const [err,setErr]   = useState('');

  const load = async () => {
    setLoading(true);
    const {data} = await sb.from('perfiles').select('*').order('created_at',{ascending:false});
    const u = data||[];
    setUsuarios(u);
    setStats({
      total: u.length,
      jugadores: u.filter(x=>x.rol==='jugador').length,
      psicologas: u.filter(x=>x.rol==='psicologa').length,
      admins: u.filter(x=>x.rol==='admin').length,
    });
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const filtrados = tab==='todos' ? usuarios : usuarios.filter(u=>u.rol===tab);

  const saveEdit = async () => {
    if(!editModal) return; setBusy(true); setErr('');
    const {error} = await sb.from('perfiles').update({nombre:editModal.nombre,rol:editModal.rol}).eq('id',editModal.id);
    if(error){ setErr(error.message); setBusy(false); return; }
    await log(adminPerfil.id,'edito_usuario',`ID: ${editModal.id}`);
    setOk('Usuario actualizado'); setEditModal(null); setBusy(false);
    load(); setTimeout(()=>setOk(''),3000);
  };

  const deleteUser = async () => {
    if(!deleteModal) return; setBusy(true);
    await sb.from('perfiles').delete().eq('id',deleteModal.id);
    await log(adminPerfil.id,'elimino_usuario',`${deleteModal.nombre||deleteModal.email}`);
    setDeleteModal(null); setBusy(false);
    setOk('Usuario eliminado'); load(); setTimeout(()=>setOk(''),3000);
  };

  const rolColor = {jugador:'b-gold',psicologa:'b-purple',admin:'b-red'};

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div><div className="page-title">Gestionar Usuarios</div><div className="page-sub">Administrá todos los perfiles de la plataforma</div></div>
      </div>

      {ok  && <div className="alert alert-s"><span>✓</span><span>{ok}</span></div>}
      {err && <div className="alert alert-e"><span>⚠</span><span>{err}</span></div>}

      <div className="stats-row">
        {[
          {lbl:'Total usuarios',val:stats.total,c:'c2',icon:'👥'},
          {lbl:'Jugadores',val:stats.jugadores,c:'c1',icon:'🏀'},
          {lbl:'Psicólogas',val:stats.psicologas,c:'c3',icon:'🧠'},
          {lbl:'Admins',val:stats.admins,c:'c4',icon:'⚙️'},
        ].map((s,i)=>(
          <div key={s.lbl} className={`stat-card ${s.c} animate-in`} style={{animationDelay:`${i*0.07}s`}}>
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-val">{s.val}</div>
            <div className="stat-lbl">{s.lbl}</div>
          </div>
        ))}
      </div>

      <div className="tabs">
        {[['todos','Todos'],['jugador','Jugadores'],['psicologa','Psicólogas'],['admin','Admins']].map(([id,lbl])=>(
          <button key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>

      {loading ? <div style={{color:'var(--muted)',padding:20}}>Cargando…</div>
      : filtrados.length===0 ? <div className="empty"><div className="empty-icon">👥</div><div>No hay usuarios en esta categoría.</div></div>
      : <div className="card">
          <div className="tw"><table>
            <thead><tr>
              <th>Usuario</th><th>Email</th><th>Rol</th><th>Fecha de alta</th><th>Acciones</th>
            </tr></thead>
            <tbody>{filtrados.map(u=>(
              <tr key={u.id}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div className="avatar" style={{width:30,height:30,fontSize:11}}>{(u.nombre||u.email||'?')[0].toUpperCase()}</div>
                    <div style={{fontWeight:600}}>{u.nombre||'—'}</div>
                  </div>
                </td>
                <td style={{color:'var(--muted)',fontSize:13}}>{u.email}</td>
                <td><span className={`badge ${rolColor[u.rol]||'b-gray'}`}>{ROLES[u.rol]||u.rol}</span></td>
                <td style={{fontSize:12,color:'var(--muted)'}}>{fmt(u.created_at)}</td>
                <td>
                  <div style={{display:'flex',gap:6}}>
                    <button className="action-btn" onClick={()=>setEditModal({...u})}>✏️ Editar</button>
                    {u.id!==adminPerfil.id && <button className="action-btn del" onClick={()=>setDeleteModal(u)}>🗑 Eliminar</button>}
                  </div>
                </td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>
      }

      {editModal && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setEditModal(null)}>
          <div className="modal">
            <div className="modal-hd"><div className="modal-title">Editar Usuario</div><button className="modal-x" onClick={()=>setEditModal(null)}>×</button></div>
            <div className="fg"><label className="fl">Nombre</label><input className="fc" value={editModal.nombre||''} onChange={e=>setEditModal(m=>({...m,nombre:e.target.value}))}/></div>
            <div className="fg"><label className="fl">Rol</label>
              <select className="fc" value={editModal.rol} onChange={e=>setEditModal(m=>({...m,rol:e.target.value}))}>
                <option value="jugador">Jugador</option><option value="psicologa">Psicóloga</option><option value="admin">Admin</option>
              </select>
            </div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Email: {editModal.email}</div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-o" onClick={()=>setEditModal(null)}>Cancelar</button>
              <button className="btn btn-g" onClick={saveEdit} disabled={busy}>{busy?<><div className="spin"/>Guardando…</>:'💾 Guardar'}</button>
            </div>
          </div>
        </div>
      )}

      {deleteModal && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setDeleteModal(null)}>
          <div className="modal" style={{maxWidth:400}}>
            <div className="modal-hd"><div className="modal-title">Confirmar eliminación</div><button className="modal-x" onClick={()=>setDeleteModal(null)}>×</button></div>
            <p style={{fontSize:14,color:'var(--muted)',marginBottom:20}}>¿Eliminás el perfil de <strong style={{color:'var(--text)'}}>{deleteModal.nombre||deleteModal.email}</strong>? Esta acción no se puede deshacer.</p>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-o" onClick={()=>setDeleteModal(null)}>Cancelar</button>
              <button className="btn btn-d" onClick={deleteUser} disabled={busy}>{busy?<><div className="spin"/>Eliminando…</>:'🗑 Eliminar'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ActivityLog() {
  const [logs,setLogs]       = useState([]);
  const [loading,setLoading] = useState(true);

  const loadLogs = () => sb.from('activity_log').select('*,perfiles!usuario_id(nombre,email,rol)').order('created_at',{ascending:false}).limit(100).then(({data})=>{ setLogs(data||[]); setLoading(false); });
  useEffect(()=>{
    loadLogs();
    const ch = sb.channel('logs-live').on('postgres_changes',{event:'INSERT',schema:'public',table:'activity_log'},loadLogs).subscribe();
    return ()=>sb.removeChannel(ch);
  },[]);

  const colores = {
    registro:'#7c3aed', respondio_formulario:'#fbbf24', creo_formulario:'#c084fc',
    cargo_diagnostico:'#22c55e', cargo_estadisticas:'#60a5fa', asigno_psicologa:'#f59e0b',
  };

  return (
    <div className="animate-in">
      <div className="ph"><div className="page-title">Ver Movimientos</div><div className="page-sub">Actividad en tiempo real de la plataforma</div></div>
      {loading ? <div style={{color:'var(--muted)',padding:20}}>Cargando…</div>
      : logs.length===0 ? <div className="empty"><div className="empty-icon">📜</div><div>No hay actividad registrada aún.</div></div>
      : <div className="card">
          {logs.map(l=>(
            <div key={l.id} className="log-item">
              <div className="log-dot" style={{background:colores[l.accion]||'var(--muted)',color:colores[l.accion]||'var(--muted)'}}/>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <strong style={{color:'var(--text)'}}>{l.perfiles?.nombre||l.perfiles?.email||'Usuario'}</strong>
                    <span className={`badge ${l.perfiles?.rol==='admin'?'b-red':l.perfiles?.rol==='psicologa'?'b-purple':'b-gold'}`} style={{marginLeft:8}}>{ROLES[l.perfiles?.rol]}</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{fmt(l.created_at)}</div>
                </div>
                <div style={{fontSize:13,color:'var(--muted)',marginTop:3}}>
                  <span style={{color:colores[l.accion]||'var(--muted)',fontWeight:600}}>{l.accion?.replace(/_/g,' ')}</span>
                  {l.detalle && <span> · {l.detalle}</span>}
                </div>
              </div>
            </div>
          ))}
        </div>
      }
    </div>
  );
}

// CALENDARIO DE SESIONES
// ══════════════════════════════════════════════════════════════════════════════
function Calendario() {
  const {perfil} = useApp();
  const [sesiones,setSesiones] = useState([]);
  const [loading,setLoading]   = useState(true);
  const [modal,setModal]       = useState(false);
  const [jugadores,setJugadores] = useState([]);
  const [form,setForm]         = useState({jugador_id:'',fecha:'',hora:'10:00',notas:'',meet_link:''});
  const [busy,setBusy]         = useState(false);
  const [mes,setMes]           = useState(new Date());

  const load = async () => {
    setLoading(true);
    const desde = new Date(mes.getFullYear(), mes.getMonth(), 1).toISOString();
    const hasta = new Date(mes.getFullYear(), mes.getMonth()+1, 0, 23,59,59).toISOString();
    const q = perfil.rol === 'psicologa'
      ? sb.from('sesiones').select('*,perfiles!jugador_id(nombre,email)').eq('psicologa_id',perfil.id).gte('fecha',desde).lte('fecha',hasta).order('fecha')
      : sb.from('sesiones').select('*,perfiles!psicologa_id(nombre,email)').eq('jugador_id',perfil.id).gte('fecha',desde).lte('fecha',hasta).order('fecha');
    const {data} = await q;
    setSesiones(data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[mes]);

  // Realtime: cambios se reflejan en tiempo real
  useEffect(()=>{
    const ch = sb.channel('cal-psi-live-'+perfil.id)
      .on('postgres_changes',{event:'*',schema:'public',table:'sesiones'},()=>load())
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[mes]);

  useEffect(()=>{
    if(perfil.rol==='psicologa'){
      sb.from('perfiles').select('id,nombre,email').eq('rol','jugador').eq('psicologa_id',perfil.id).order('nombre').then(({data})=>setJugadores(data||[]));
    }
  },[]);

  const diasDelMes = () => {
    const y=mes.getFullYear(), m=mes.getMonth();
    const primer=new Date(y,m,1).getDay(); // 0=dom
    const total=new Date(y,m+1,0).getDate();
    return {primer:(primer+6)%7, total}; // convertir a lun=0
  };

  const sesionesPorDia = sesiones.reduce((acc,s)=>{
    const raw = s.fecha.includes('T') ? s.fecha : s.fecha+'T12:00:00';
    const d = new Date(raw).getDate();
    if(!acc[d]) acc[d]=[];
    acc[d].push(s);
    return acc;
  },{});

  const {primer,total} = diasDelMes();
  const hoy = new Date();
  const DIAS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  const agregarSesion = async () => {
    if(!form.fecha) return;
    setBusy(true);
    const payload = perfil.rol==='psicologa'
      ? {psicologa_id:perfil.id, jugador_id:form.jugador_id||null, fecha:form.fecha+'T12:00:00', hora_texto:form.hora, notas:form.notas, meet_link:form.meet_link||null}
      : {jugador_id:perfil.id, psicologa_id:null, fecha:form.fecha+'T12:00:00', hora_texto:form.hora, notas:form.notas, meet_link:form.meet_link||null};
    await sb.from('sesiones').insert(payload);
    setBusy(false); setModal(false); setForm({jugador_id:'',fecha:'',hora:'10:00',notas:'',meet_link:''});
    load();
  };

  const [selDia,setSelDia] = useState(null);

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div><div className="page-title">Calendario</div><div className="page-sub">Sesiones y turnos del mes</div></div>
        <button className="btn btn-g" onClick={()=>setModal(true)}>+ Agregar sesión</button>
      </div>
      <div className="page-divider"/>

      {/* Navegación mes */}
      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <button className="btn btn-o btn-sm" onClick={()=>setMes(m=>new Date(m.getFullYear(),m.getMonth()-1,1))}>← Anterior</button>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:3,color:'var(--accent)'}}>
            {MESES[mes.getMonth()]} {mes.getFullYear()}
          </div>
          <button className="btn btn-o btn-sm" onClick={()=>setMes(m=>new Date(m.getFullYear(),m.getMonth()+1,1))}>Siguiente →</button>
        </div>

        {/* Headers días */}
        <div className="cal-header">
          {DIAS.map(d=><div key={d} className="cal-hd">{d}</div>)}
        </div>

        {/* Grid días */}
        <div className="cal-grid">
          {Array.from({length:primer}).map((_,i)=><div key={'e'+i}/>)}
          {Array.from({length:total}).map((_,i)=>{
            const dia = i+1;
            const esHoy = hoy.getDate()===dia && hoy.getMonth()===mes.getMonth() && hoy.getFullYear()===mes.getFullYear();
            const tieneS = !!sesionesPorDia[dia];
            return (
              <div key={dia} className={`cal-day ${esHoy?'hoy':''} ${tieneS?'tiene-sesion':''}`}
                onClick={()=>tieneS && setSelDia(selDia===dia?null:dia)}>
                <span className="cal-day-num">{dia}</span>
                {tieneS && <div className="cal-dot"/>}
                {tieneS && <div style={{fontSize:9,color:'var(--purple3)',fontWeight:600,marginTop:2}}>{sesionesPorDia[dia].length} ses.</div>}
              </div>
            );
          })}
        </div>

        {/* Detalle día seleccionado */}
        {selDia && sesionesPorDia[selDia] && (
          <div style={{marginTop:16,borderTop:'1px solid var(--brd)',paddingTop:16}}>
            <div style={{fontWeight:700,marginBottom:10,color:'var(--accent)'}}>Sesiones del día {selDia}</div>
            {sesionesPorDia[selDia].map(s=>(
              <div key={s.id} style={{background:'var(--bg4)',borderRadius:8,padding:12,marginBottom:8,border:'1px solid var(--brd2)'}}>
                <div style={{display:'flex',gap:12,alignItems:'center',justifyContent:'space-between',flexWrap:'wrap'}}>
                  <div style={{display:'flex',gap:12,alignItems:'center'}}>
                    <span style={{fontSize:20}}>📅</span>
                    <div>
                      <div style={{fontWeight:600,color:'var(--text)'}}>{s.hora_texto||new Date(s.fecha).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}hs{s.perfiles?.nombre ? ' · '+s.perfiles.nombre : ''}</div>
                      {s.notas && <div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>{s.notas}</div>}
                      {s.meet_link && <div style={{display:'flex',alignItems:'center',gap:5,marginTop:4}}><span style={{fontSize:10,color:'var(--muted)'}}>📹</span><span style={{fontSize:10,color:'var(--muted)',fontFamily:'monospace'}}>{s.meet_link.replace('https://','')}</span></div>}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {s.meet_link && (
                      <a href={s.meet_link} target="_blank" rel="noopener noreferrer" className="btn btn-g btn-sm" style={{background:'linear-gradient(135deg,#0f9d58,#34a853)',boxShadow:'0 4px 14px rgba(15,157,88,.4)',textDecoration:'none'}}>
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                        Entrar a la sesión
                      </a>
                    )}
                    {s.jugador_id && jugadores.find(j=>j.id===s.jugador_id)?.email && (
                      <button className="btn btn-o btn-sm" onClick={()=>{
                        const jug=jugadores.find(j=>j.id===s.jugador_id);
                        const fechaStr=new Date(s.fecha).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
                        const subj=`Recordatorio de sesión — ${fechaStr}`;
                        const meetTxt = s.meet_link ? `\n\nLink para la videollamada:\n${s.meet_link}` : '';
                        const body=`Hola ${jug.nombre||''}!\n\nTe recordamos que tenés sesión el ${fechaStr} a las ${s.hora_texto||'la hora acordada'}.${meetTxt}\n\n¡Hasta pronto!\nPick'n Mind`;
                        window.open('mailto:'+jug.email+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body),'_blank');
                      }}>📧 Recordatorio</button>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Lista próximas sesiones */}
      {sesiones.length>0 && (
        <div className="card">
          <div className="card-title">📋 Todas las sesiones del mes</div>
          {sesiones.map(s=>(
            <div key={s.id} style={{display:'flex',gap:14,alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--brd)'}}>
              <div style={{background:'rgba(168,85,247,.14)',borderRadius:8,padding:'6px 12px',textAlign:'center',minWidth:52}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:'var(--accent)',lineHeight:1}}>{new Date(s.fecha.includes('T')?s.fecha:s.fecha+'T12:00:00').getDate()}</div>
                <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase'}}>{MESES[new Date(s.fecha.includes('T')?s.fecha:s.fecha+'T12:00:00').getMonth()].slice(0,3)}</div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,color:'var(--text)'}}>{s.perfiles?.nombre||s.perfiles?.email||'Sesión'}</div>
                <div style={{fontSize:12,color:'var(--muted)'}}>{new Date(s.fecha).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}h {s.notas?'· '+s.notas:''}</div>
              </div>
              {s.meet_link && (
                <a href={s.meet_link} target="_blank" rel="noopener noreferrer" className="btn btn-g btn-sm" style={{background:'linear-gradient(135deg,#0f9d58,#34a853)',boxShadow:'0 4px 14px rgba(15,157,88,.3)',flexShrink:0,textDecoration:'none'}}>
                  <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                  Meet
                </a>
              )}
            </div>
          ))}
        </div>
      )}

      {loading && <div style={{color:'var(--muted)',padding:20}}>Cargando sesiones…</div>}
      {!loading && sesiones.length===0 && (
        <div className="empty"><div className="empty-icon">📅</div><div>No hay sesiones este mes. ¡Agendá una!</div></div>
      )}

      {modal && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal" style={{maxWidth:480}}>
            <div className="modal-hd"><div className="modal-title">Nueva Sesión</div><button className="modal-x" onClick={()=>setModal(false)}>×</button></div>
            {perfil.rol==='psicologa' && jugadores.length>0 && (
              <div className="fg"><label className="fl">Jugador</label>
                <select className="fc" value={form.jugador_id} onChange={e=>setForm(f=>({...f,jugador_id:e.target.value}))}>
                  <option value="">Sesión general / individual</option>
                  {jugadores.map(j=><option key={j.id} value={j.id}>{j.nombre||j.email}</option>)}
                </select>
              </div>
            )}
            <div className="g2">
              <div className="fg"><label className="fl">Fecha</label><input className="fc" type="date" value={form.fecha} onChange={e=>setForm(f=>({...f,fecha:e.target.value}))}/></div>
              <div className="fg"><label className="fl">Hora</label><input className="fc" type="text" value={form.hora} onChange={e=>setForm(f=>({...f,hora:e.target.value}))} placeholder="Ej: 10:00, 14:30, A las 15hs…"/></div>
            </div>
            <div className="fg"><label className="fl">Notas (opcional)</label><input className="fc" value={form.notas} onChange={e=>setForm(f=>({...f,notas:e.target.value}))} placeholder="Tema de la sesión…"/></div>
            <div className="fg">
              <label className="fl">Link de videollamada (opcional)</label>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <input className="fc" value={form.meet_link} onChange={e=>setForm(f=>({...f,meet_link:e.target.value}))} placeholder="https://meet.google.com/xxx-xxxx-xxx"/>
                {form.meet_link && <a href={form.meet_link} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:'var(--accent)',whiteSpace:'nowrap',textDecoration:'none'}}>Probar →</a>}
              </div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:5}}>Creá la reunión en Google Meet o Zoom y pegá el link acá</div>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-o" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-g" onClick={agregarSesion} disabled={busy||!form.fecha}>{busy?<><div className="spin"/>Guardando…</>:'📅 Guardar sesión'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// COBROS Y PAGOS — PSICÓLOGA
// ══════════════════════════════════════════════════════════════════════════════
function Cobros() {
  const {perfil} = useApp();
  const [jugadores,setJugadores] = useState([]);
  const [sesiones,setSesiones]   = useState([]);
  const [cobros,setCobros]       = useState([]);
  const [loading,setLoading]     = useState(true);
  const [modalSes,setModalSes]   = useState(false);
  const [modalCob,setModalCob]   = useState(null); // jugador para generar factura
  const [formSes,setFormSes]     = useState({jugador_id:'',monto:'',concepto:'Sesión'});
  const [formCob,setFormCob]     = useState({periodo:'',detalle:''});
  const [busy,setBusy]           = useState(false);
  const [tab,setTab]             = useState('semaforo');

  const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const mesActual = () => { const h=new Date(); return `${MESES_ES[h.getMonth()]} ${h.getFullYear()}`; };

  const load = async () => {
    setLoading(true);
    const [jugs,sess,cobs] = await Promise.all([
      sb.from('perfiles').select('id,nombre,email').eq('rol','jugador').eq('psicologa_id',perfil.id).order('nombre'),
      sb.from('sesiones_cobro').select('*,perfiles!jugador_id(nombre,email)').eq('psicologa_id',perfil.id).order('created_at',{ascending:false}),
      sb.from('cobros').select('*,perfiles!jugador_id(nombre,email)').eq('psicologa_id',perfil.id).order('created_at',{ascending:false}),
    ]);
    setJugadores(jugs.data||[]);
    setSesiones(sess.data||[]);
    setCobros(cobs.data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  // Registrar sesión individual con monto
  const registrarSesion = async () => {
    if(!formSes.jugador_id||!formSes.monto) return;
    setBusy(true);
    await sb.from('sesiones_cobro').insert({
      psicologa_id: perfil.id,
      jugador_id: formSes.jugador_id,
      monto: Number(formSes.monto),
      concepto: formSes.concepto||'Sesión',
      fecha: new Date().toISOString(),
    });
    setBusy(false); setModalSes(false);
    setFormSes({jugador_id:'',monto:'',concepto:'Sesión'});
    load();
  };

  // Generar factura mensual para un jugador (suma todas sus sesiones del mes)
  const generarFactura = async () => {
    if(!modalCob) return;
    setBusy(true);
    const periodo = formCob.periodo || mesActual();
    // Sumar sesiones del mes para este jugador
    const sesMes = sesiones.filter(s=>s.jugador_id===modalCob.id && (s.periodo||'').includes(periodo.split(' ')[0]));
    const total = sesMes.reduce((a,s)=>a+(s.monto||0),0);
    const monto = total || sesiones.filter(s=>s.jugador_id===modalCob.id).slice(0,1).reduce((a,s)=>a+(s.monto||0),0);
    await sb.from('cobros').insert({
      psicologa_id: perfil.id,
      jugador_id: modalCob.id,
      monto,
      concepto: formCob.detalle||`Sesiones de ${periodo}`,
      periodo,
      estado: 'adeudado',
    });
    setBusy(false); setModalCob(null); setFormCob({periodo:'',detalle:''});
    load();
  };

  const togglePago = async (cobro) => {
    if(cobro.estado==='en_revision'){
      // Psicóloga confirma el pago
      await sb.from('cobros').update({estado:'pagado',fecha_pago:new Date().toISOString()}).eq('id',cobro.id);
    } else if(cobro.estado==='pagado'){
      await sb.from('cobros').update({estado:'adeudado',fecha_pago:null}).eq('id',cobro.id);
    } else {
      await sb.from('cobros').update({estado:'pagado',fecha_pago:new Date().toISOString()}).eq('id',cobro.id);
    }
    load();
  };

  const [editMonto,setEditMonto] = useState(null);
  const [nuevoMonto,setNuevoMonto] = useState('');
  const guardarMonto = async () => {
    if(!editMonto||!nuevoMonto) return;
    await sb.from('cobros').update({monto:Number(nuevoMonto)}).eq('id',editMonto.id);
    setEditMonto(null); setNuevoMonto(''); load();
  };
  const [verComp,setVerComp] = useState(null);

  const totalAdeudado = cobros.filter(c=>c.estado==='adeudado'||c.estado==='en_revision').reduce((a,c)=>a+(c.monto||0),0);
  const totalPagado   = cobros.filter(c=>c.estado==='pagado').reduce((a,c)=>a+(c.monto||0),0);

  // Sesiones por jugador este mes
  const mActual = mesActual().split(' ')[0];
  const sesionesMes = (jugId) => sesiones.filter(s=>s.jugador_id===jugId);
  const montoMes   = (jugId) => sesionesMes(jugId).reduce((a,s)=>a+(s.monto||0),0);
  const deudaTotal = (jugId) => cobros.filter(c=>c.jugador_id===jugId&&c.estado==='adeudado').reduce((a,c)=>a+(c.monto||0),0);

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div><div className="page-title">Cobros y Pagos</div><div className="page-sub">Facturación mensual por jugador</div></div>
        <button className="btn btn-g" onClick={()=>setModalSes(true)}>+ Registrar sesión</button>
      </div>
      <div className="page-divider"/>

      {/* Resumen */}
      <div className="stats-row" style={{marginBottom:24}}>
        <div className="stat-card c1 animate-in" style={{cursor:'default'}}>
          <div className="stat-icon">🔴</div>
          <div className="stat-val">${totalAdeudado.toLocaleString('es-AR')}</div>
          <div className="stat-lbl">Adeudado total</div>
        </div>
        <div className="stat-card c3 animate-in" style={{cursor:'default',animationDelay:'.07s'}}>
          <div className="stat-icon">🟢</div>
          <div className="stat-val">${totalPagado.toLocaleString('es-AR')}</div>
          <div className="stat-lbl">Cobrado total</div>
        </div>
        <div className="stat-card c2 animate-in" style={{cursor:'default',animationDelay:'.14s'}}>
          <div className="stat-icon">📋</div>
          <div className="stat-val">{sesiones.length}</div>
          <div className="stat-lbl">Sesiones registradas</div>
        </div>
      </div>

      <div className="tabs">
        <button className={`tab ${tab==='semaforo'?'active':''}`} onClick={()=>setTab('semaforo')}>🔴🟢 Estado jugadores</button>
        <button className={`tab ${tab==='sesiones'?'active':''}`} onClick={()=>setTab('sesiones')}>📋 Sesiones</button>
        <button className={`tab ${tab==='facturas'?'active':''}`} onClick={()=>setTab('facturas')}>🧾 Facturas</button>
      </div>

      {loading ? <div style={{color:'var(--muted)',padding:20}}>Cargando…</div> : <>

      {/* TAB: SEMÁFORO */}
      {tab==='semaforo' && (
        jugadores.length===0
          ? <div className="empty"><div className="empty-icon">👥</div><div>No tenés jugadores asignados.</div></div>
          : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:12}}>
              {jugadores.map(j=>{
                const deuda = deudaTotal(j.id);
                const nSes  = sesionesMes(j.id).length;
                const mont  = montoMes(j.id);
                const cobrosJ    = cobros.filter(c=>c.jugador_id===j.id);
                const enRevision = cobrosJ.filter(c=>c.estado==='en_revision').length > 0;
                const tieneDe = deuda > 0 || enRevision;
                return (
                  <div key={j.id} style={{
                    background: tieneDe ? 'rgba(220,38,38,.08)' : 'rgba(22,163,74,.08)',
                    border:`2px solid ${tieneDe?'rgba(220,38,38,.4)':'rgba(22,163,74,.4)'}`,
                    borderRadius:12,padding:'16px 18px',
                  }}>
                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                      <div style={{width:14,height:14,borderRadius:'50%',flexShrink:0,
                        background:tieneDe?'#dc2626':'#16a34a',
                        boxShadow:tieneDe?'0 0 10px rgba(220,38,38,.8)':'0 0 10px rgba(22,163,74,.8)'
                      }}/>
                      <div style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>{j.nombre||j.email}</div>
                    </div>
                    <div style={{fontSize:12,color:'var(--muted)',marginBottom:6}}>{nSes} sesión(es) · ${mont.toLocaleString('es-AR')} acumulado</div>
                    <div style={{fontSize:13,fontWeight:700,color:tieneDe?'#f87171':'#4ade80',marginBottom:12}}>
                      {deuda > 0 ? `Adeuda $${deuda.toLocaleString('es-AR')}` : enRevision ? '⏳ Pago en revisión' : 'Al día ✓'}
                    </div>
                    <button className="btn btn-p btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={()=>{setModalCob(j);setFormCob({periodo:mesActual(),detalle:`Sesiones de ${mesActual()}`});}}>
                      🧾 Generar factura del mes
                    </button>
                  </div>
                );
              })}
            </div>
      )}

      {/* TAB: SESIONES */}
      {tab==='sesiones' && (
        sesiones.length===0
          ? <div className="empty"><div className="empty-icon">📋</div><div>No hay sesiones registradas.</div></div>
          : <div className="card"><div className="tw"><table>
              <thead><tr><th>Jugador</th><th>Concepto</th><th>Monto</th><th>Fecha</th></tr></thead>
              <tbody>{sesiones.map(s=>(
                <tr key={s.id}>
                  <td className="td-primary">{s.perfiles?.nombre||s.perfiles?.email||'—'}</td>
                  <td style={{color:'var(--muted)',fontSize:13}}>{s.concepto}</td>
                  <td style={{fontWeight:700,color:'var(--accent)'}}>${(s.monto||0).toLocaleString('es-AR')}</td>
                  <td style={{fontSize:12,color:'var(--muted)'}}>{fmt(s.fecha||s.created_at)}</td>
                </tr>
              ))}</tbody>
            </table></div></div>
      )}

      {/* TAB: FACTURAS */}
      {tab==='facturas' && (
        cobros.length===0
          ? <div className="empty"><div className="empty-icon">🧾</div><div>No hay facturas generadas.</div></div>
          : cobros.map(cob=>(
            <div key={cob.id} className="cobro-card" style={{flexWrap:'wrap',gap:8}}>
              <div className={`cobro-status ${cob.estado}`}/>
              <div style={{flex:1,minWidth:160}}>
                <div className="cobro-nombre">{cob.perfiles?.nombre||cob.perfiles?.email||'—'}</div>
                <div className="cobro-meta">{cob.concepto} · {cob.periodo}</div>
                {cob.estado==='pagado'&&cob.fecha_pago&&<div style={{fontSize:11,color:'#4ade80',marginTop:2}}>✓ Pagado {new Date(cob.fecha_pago).toLocaleDateString('es-AR')}</div>}
                {cob.estado==='en_revision'&&<div style={{fontSize:11,color:'#67e8f9',marginTop:2}}>⏳ Jugador envió comprobante — pendiente de confirmación</div>}
                {cob.comprobante_nombre&&<div style={{fontSize:11,color:'var(--accent)',marginTop:2,cursor:'pointer'}} onClick={()=>setVerComp(cob)}>📎 Ver comprobante</div>}
              </div>
              <div className={`cobro-monto ${cob.estado}`}>${(cob.monto||0).toLocaleString('es-AR')}</div>
              <button className="btn btn-o btn-sm" title="Editar monto" onClick={()=>{setEditMonto(cob);setNuevoMonto(String(cob.monto||''));}}>✏️</button>
              {cob.estado==='en_revision' && (
                <button className="btn btn-g btn-sm" onClick={()=>togglePago(cob)} title="Confirmar pago del jugador" style={{animation:'pulseRing 2s infinite'}}>
                  ✅ Confirmar pago
                </button>
              )}
              {cob.estado==='adeudado' && (
                <button className="btn btn-p btn-sm" onClick={()=>togglePago(cob)}>
                  ✓ Marcar pagado
                </button>
              )}
              {cob.estado==='pagado' && (
                <button className="btn btn-d btn-sm" onClick={()=>togglePago(cob)}>
                  ↩ Revertir
                </button>
              )}
            </div>
          ))
      )}
      </>}

      {/* Modal editar monto */}
      {editMonto && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setEditMonto(null)}>
          <div className="modal" style={{maxWidth:360}}>
            <div className="modal-hd"><div className="modal-title">Editar monto</div><button className="modal-x" onClick={()=>setEditMonto(null)}>×</button></div>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Factura: {editMonto.concepto} · {editMonto.perfiles?.nombre||''}</div>
            <div className="fg"><label className="fl">Nuevo monto ($)</label>
              <input className="fc" type="number" value={nuevoMonto} onChange={e=>setNuevoMonto(e.target.value)} placeholder="15000" autoFocus/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-o" onClick={()=>setEditMonto(null)}>Cancelar</button>
              <button className="btn btn-g" onClick={guardarMonto} disabled={!nuevoMonto}>💾 Guardar</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal ver comprobante */}
      {verComp && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setVerComp(null)}>
          <div className="modal" style={{maxWidth:520}}>
            <div className="modal-hd"><div className="modal-title">Comprobante de pago</div><button className="modal-x" onClick={()=>setVerComp(null)}>×</button></div>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>{verComp.perfiles?.nombre} · {verComp.concepto} · ${verComp.monto?.toLocaleString('es-AR')}</div>
            {verComp.comprobante_data && verComp.comprobante_data.startsWith('data:image') ? (
              <img src={verComp.comprobante_data} alt="Comprobante" style={{width:'100%',borderRadius:8,border:'1px solid var(--brd2)'}}/>
            ) : verComp.comprobante_data ? (
              <div style={{textAlign:'center',padding:20}}>
                <div style={{fontSize:48,marginBottom:8}}>📄</div>
                <div style={{color:'var(--text2)',fontSize:13,marginBottom:12}}>{verComp.comprobante_nombre}</div>
                <a href={verComp.comprobante_data} download={verComp.comprobante_nombre} className="btn btn-p">⬇ Descargar PDF</a>
              </div>
            ) : <div style={{color:'var(--muted)',textAlign:'center',padding:20}}>Sin comprobante adjunto.</div>}
          </div>
        </div>
      )}

      {/* Modal registrar sesión */}
      {modalSes && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModalSes(false)}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-hd"><div className="modal-title">Registrar Sesión</div><button className="modal-x" onClick={()=>setModalSes(false)}>×</button></div>
            <div className="fg"><label className="fl">Jugador</label>
              <select className="fc" value={formSes.jugador_id} onChange={e=>setFormSes(f=>({...f,jugador_id:e.target.value}))}>
                <option value="">Seleccioná…</option>
                {jugadores.map(j=><option key={j.id} value={j.id}>{j.nombre||j.email}</option>)}
              </select>
            </div>
            <div className="g2">
              <div className="fg"><label className="fl">Monto ($)</label><input className="fc" type="number" value={formSes.monto} onChange={e=>setFormSes(f=>({...f,monto:e.target.value}))} placeholder="15000"/></div>
              <div className="fg"><label className="fl">Concepto</label><input className="fc" value={formSes.concepto} onChange={e=>setFormSes(f=>({...f,concepto:e.target.value}))} placeholder="Sesión"/></div>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-o" onClick={()=>setModalSes(false)}>Cancelar</button>
              <button className="btn btn-g" onClick={registrarSesion} disabled={busy||!formSes.jugador_id||!formSes.monto}>{busy?<><div className="spin"/>Guardando…</>:'💾 Registrar'}</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal generar factura */}
      {modalCob && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModalCob(null)}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-hd"><div className="modal-title">Factura para {modalCob.nombre}</div><button className="modal-x" onClick={()=>setModalCob(null)}>×</button></div>
            <div style={{background:'rgba(168,85,247,.08)',borderRadius:8,padding:14,marginBottom:16,fontSize:13,color:'var(--text2)'}}>
              Sesiones acumuladas: <strong style={{color:'var(--accent)'}}>{sesionesMes(modalCob.id).length}</strong> · Total: <strong style={{color:'var(--accent)'}}>${montoMes(modalCob.id).toLocaleString('es-AR')}</strong>
            </div>
            <div className="fg"><label className="fl">Período</label><input className="fc" value={formCob.periodo} onChange={e=>setFormCob(f=>({...f,periodo:e.target.value}))} placeholder={mesActual()}/></div>
            <div className="fg"><label className="fl">Detalle</label><input className="fc" value={formCob.detalle} onChange={e=>setFormCob(f=>({...f,detalle:e.target.value}))} placeholder="Sesiones del mes…"/></div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-o" onClick={()=>setModalCob(null)}>Cancelar</button>
              <button className="btn btn-g" onClick={generarFactura} disabled={busy}>{busy?<><div className="spin"/>Generando…</>:'🧾 Generar factura'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// CALENDARIO JUGADOR (solo lectura + sus sesiones en vivo)
// ══════════════════════════════════════════════════════════════════════════════
function CalendarioJugador() {
  const {perfil} = useApp();
  const [sesiones,setSesiones] = useState([]);
  const [loading,setLoading]   = useState(true);
  const [mes,setMes]           = useState(new Date());
  const [selDia,setSelDia]     = useState(null);

  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DIAS  = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  const load = async () => {
    setLoading(true);
    const desde = new Date(mes.getFullYear(),mes.getMonth(),1).toISOString();
    const hasta = new Date(mes.getFullYear(),mes.getMonth()+1,0,23,59,59).toISOString();
    const {data} = await sb.from('sesiones').select('*,perfiles!psicologa_id(nombre,email)')
      .eq('jugador_id',perfil.id).gte('fecha',desde).lte('fecha',hasta).order('fecha');
    setSesiones(data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[mes]);

  // Realtime: si la psicóloga agrega sesión, se ve al instante
  useEffect(()=>{
    const ch = sb.channel('cal-jugador-live-'+perfil.id)
      .on('postgres_changes',{event:'*',schema:'public',table:'sesiones',filter:`jugador_id=eq.${perfil.id}`},()=>load())
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[]);

  const diasDelMes = () => {
    const y=mes.getFullYear(), m=mes.getMonth();
    const primer = new Date(y,m,1).getDay();
    return {primer:(primer+6)%7, total:new Date(y,m+1,0).getDate()};
  };

  const porDia = sesiones.reduce((acc,s)=>{ const d=new Date(s.fecha+'T12:00:00').getDate(); if(!acc[d])acc[d]=[]; acc[d].push(s); return acc; },{});
  const {primer,total} = diasDelMes();
  const hoy = new Date();

  return (
    <div className="animate-in">
      <div className="ph"><div className="page-title">Mi Calendario</div><div className="page-sub">Tus sesiones programadas</div></div>
      <div className="page-divider"/>

      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <button className="btn btn-o btn-sm" onClick={()=>setMes(m=>new Date(m.getFullYear(),m.getMonth()-1,1))}>← Anterior</button>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:24,letterSpacing:3,color:'var(--accent)'}}>{MESES[mes.getMonth()]} {mes.getFullYear()}</div>
          <button className="btn btn-o btn-sm" onClick={()=>setMes(m=>new Date(m.getFullYear(),m.getMonth()+1,1))}>Siguiente →</button>
        </div>
        <div className="cal-header">{DIAS.map(d=><div key={d} className="cal-hd">{d}</div>)}</div>
        <div className="cal-grid">
          {Array.from({length:primer}).map((_,i)=><div key={'e'+i}/>)}
          {Array.from({length:total}).map((_,i)=>{
            const dia=i+1;
            const esHoy=hoy.getDate()===dia&&hoy.getMonth()===mes.getMonth()&&hoy.getFullYear()===mes.getFullYear();
            const tieneS=!!porDia[dia];
            return (
              <div key={dia} className={`cal-day ${esHoy?'hoy':''} ${tieneS?'tiene-sesion':''}`} onClick={()=>tieneS&&setSelDia(selDia===dia?null:dia)}>
                <span className="cal-day-num">{dia}</span>
                {tieneS&&<div className="cal-dot"/>}
                {tieneS&&<div style={{fontSize:9,color:'var(--purple3)',fontWeight:600,marginTop:2}}>{porDia[dia].length} ses.</div>}
              </div>
            );
          })}
        </div>
        {selDia && porDia[selDia] && (
          <div style={{marginTop:16,borderTop:'1px solid var(--brd)',paddingTop:16}}>
            <div style={{fontWeight:700,marginBottom:10,color:'var(--accent)'}}>Sesión del día {selDia}</div>
            {porDia[selDia].map(s=>(
              <div key={s.id} style={{background:'rgba(168,85,247,.1)',borderRadius:8,padding:14,marginBottom:8,border:'1px solid var(--brd2)'}}>
                <div style={{fontWeight:600,color:'var(--text)',fontSize:15}}>🧠 {s.perfiles?.nombre||'Tu psicóloga'}</div>
                <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>🕐 {s.hora_texto||new Date(s.fecha).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</div>
                {s.notas&&<div style={{fontSize:12,color:'var(--text2)',marginTop:4,fontStyle:'italic'}}>{s.notas}</div>}
                {s.meet_link && (
                  <a href={s.meet_link} target="_blank" rel="noopener noreferrer" className="btn btn-g btn-sm" style={{marginTop:10,background:'linear-gradient(135deg,#0f9d58,#34a853)',boxShadow:'0 4px 14px rgba(15,157,88,.4)',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:8}}>
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                    Entrar a la sesión
                  </a>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {!loading && sesiones.length>0 && (
        <div className="card">
          <div className="card-title">📋 Próximas sesiones del mes</div>
          {sesiones.filter(s=>new Date(s.fecha.includes('T')?s.fecha:s.fecha+'T12:00:00')>=new Date()).map(s=>(
            <div key={s.id} style={{display:'flex',gap:14,alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--brd)'}}>
              <div style={{background:'rgba(168,85,247,.14)',borderRadius:8,padding:'6px 12px',textAlign:'center',minWidth:52}}>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:'var(--accent)',lineHeight:1}}>{new Date(s.fecha.includes('T')?s.fecha:s.fecha+'T12:00:00').getDate()}</div>
                <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase'}}>{MESES[new Date(s.fecha.includes('T')?s.fecha:s.fecha+'T12:00:00').getMonth()].slice(0,3)}</div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,color:'var(--text)'}}>Sesión con {s.perfiles?.nombre||'tu psicóloga'}</div>
                <div style={{fontSize:12,color:'var(--muted)'}}>{s.hora_texto||new Date(s.fecha).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}hs {s.notas?'· '+s.notas:''}</div>
              </div>
              {s.meet_link && (
                <a href={s.meet_link} target="_blank" rel="noopener noreferrer" className="btn btn-g btn-sm" style={{background:'linear-gradient(135deg,#0f9d58,#34a853)',boxShadow:'0 4px 14px rgba(15,157,88,.3)',flexShrink:0,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:6}}>
                  <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                  Entrar
                </a>
              )}
            </div>
          ))}
        </div>
      )}
      {!loading&&sesiones.length===0&&<div className="empty"><div className="empty-icon">📅</div><div>No tenés sesiones este mes.</div></div>}
    </div>
  );
}

// MIS PAGOS — JUGADOR
// ══════════════════════════════════════════════════════════════════════════════
function MisPagos() {
  const {perfil} = useApp();
  const [cobros,setCobros]     = useState([]);
  const [loading,setLoading]   = useState(true);
  const [modalPago,setModalPago] = useState(null);
  const [comprobante,setComprobante] = useState(null);
  const [busy,setBusy]         = useState(false);

  const load = async () => {
    setLoading(true);
    const {data} = await sb.from('cobros').select('*,perfiles!psicologa_id(nombre,email)')
      .eq('jugador_id',perfil.id).order('created_at',{ascending:false});
    setCobros(data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);
  useEffect(()=>{
    const ch = sb.channel('pagos-jugador-live-'+perfil.id)
      .on('postgres_changes',{event:'*',schema:'public',table:'cobros',filter:`jugador_id=eq.${perfil.id}`},()=>load())
      .subscribe();
    return ()=>sb.removeChannel(ch);
  },[]);

  const totalDeuda  = cobros.filter(c=>c.estado==='adeudado').reduce((a,c)=>a+(c.monto||0),0);
  const totalPagado = cobros.filter(c=>c.estado==='pagado').reduce((a,c)=>a+(c.monto||0),0);

  const handleFile = (file) => {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => setComprobante({name:file.name, data:e.target.result, type:file.type});
    reader.readAsDataURL(file);
  };

  const confirmarPago = async () => {
    if(!modalPago) return;
    setBusy(true);
    // El jugador envía el comprobante → queda en 'en_revision', la psicóloga confirma
    await sb.from('cobros').update({
      estado: 'en_revision',
      comprobante_nombre: comprobante?.name || null,
      comprobante_data: comprobante?.data || null,
    }).eq('id',modalPago.id);
    setBusy(false); setModalPago(null); setComprobante(null);
    load();
  };

  return (
    <div className="animate-in">
      <div className="ph"><div className="page-title">Mis Pagos</div><div className="page-sub">Estado de tus facturas con la psicóloga</div></div>
      <div className="page-divider"/>

      <div className="stats-row" style={{marginBottom:24}}>
        <div className="stat-card c1 animate-in" style={{cursor:'default'}}>
          <div className="stat-icon">⚠️</div>
          <div className="stat-val">${totalDeuda.toLocaleString('es-AR')}</div>
          <div className="stat-lbl">Pendiente de pago</div>
        </div>
        <div className="stat-card c3 animate-in" style={{cursor:'default',animationDelay:'.07s'}}>
          <div className="stat-icon">✅</div>
          <div className="stat-val">${totalPagado.toLocaleString('es-AR')}</div>
          <div className="stat-lbl">Total pagado</div>
        </div>
      </div>

      {loading ? <div style={{color:'var(--muted)',padding:20}}>Cargando…</div>
      : cobros.length===0 ? <div className="empty"><div className="empty-icon">🧾</div><div>No tenés facturas aún.</div></div>
      : cobros.map(cob=>(
        <div key={cob.id} className="cobro-card" style={{flexWrap:'wrap',gap:10}}>
          <div className={`cobro-status ${cob.estado}`}/>
          <div style={{flex:1,minWidth:160}}>
            <div className="cobro-nombre">{cob.concepto}</div>
            <div className="cobro-meta">Período: {cob.periodo} · {cob.perfiles?.nombre||'Tu psicóloga'}</div>

// NOTAS PRIVADAS — solo visible para la psicóloga
// ══════════════════════════════════════════════════════════════════════════════
function NotasPrivadas() {
  const {perfil} = useApp();
  const [notas,setNotas]       = useState([]);
  const [jugadores,setJugadores] = useState([]);
  const [loading,setLoading]   = useState(true);
  const [modal,setModal]       = useState(false);
  const [form,setForm]         = useState({jugador_id:'',texto:'',etiquetas:''});
  const [busy,setBusy]         = useState(false);
  const [filtroJ,setFiltroJ]   = useState('todos');
  const [editando,setEditando] = useState(null);
  const [buscar,setBuscar]     = useState('');

  const load = async () => {
    setLoading(true);
    const [ns,jugs] = await Promise.all([
      sb.from('notas_privadas').select('*,perfiles!jugador_id(nombre,email)')
        .eq('psicologa_id',perfil.id).order('created_at',{ascending:false}),
      sb.from('perfiles').select('id,nombre,email').eq('rol','jugador').eq('psicologa_id',perfil.id).order('nombre'),
    ]);
    setNotas(ns.data||[]);
    setJugadores(jugs.data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const guardar = async () => {
    if(!form.texto.trim()) return;
    setBusy(true);
    if(editando) {
      await sb.from('notas_privadas').update({
        texto: form.texto,
        jugador_id: form.jugador_id||null,
        etiquetas: form.etiquetas ? form.etiquetas.split(',').map(e=>e.trim()).filter(Boolean) : [],
        updated_at: new Date().toISOString(),
      }).eq('id',editando);
    } else {
      await sb.from('notas_privadas').insert({
        psicologa_id: perfil.id,
        jugador_id: form.jugador_id||null,
        texto: form.texto,
        etiquetas: form.etiquetas ? form.etiquetas.split(',').map(e=>e.trim()).filter(Boolean) : [],
      });
    }
    setBusy(false); setModal(false); setEditando(null);
    setForm({jugador_id:'',texto:'',etiquetas:''});
    load();
  };

  const eliminar = async (id) => {
    if(!confirm('¿Eliminar esta nota?')) return;
    await sb.from('notas_privadas').delete().eq('id',id);
    load();
  };

  const abrirEditar = (nota) => {
    setEditando(nota.id);
    setForm({
      jugador_id: nota.jugador_id||'',
      texto: nota.texto||'',
      etiquetas: (nota.etiquetas||[]).join(', '),
    });
    setModal(true);
  };

  const notasFiltradas = notas
    .filter(n => filtroJ==='todos' || n.jugador_id===filtroJ)
    .filter(n => !buscar || n.texto.toLowerCase().includes(buscar.toLowerCase()) ||
      (n.perfiles?.nombre||'').toLowerCase().includes(buscar.toLowerCase()) ||
      (n.etiquetas||[]).some(e=>e.toLowerCase().includes(buscar.toLowerCase()))
    );

  const totalPorJugador = jugadores.map(j=>({
    ...j,
    count: notas.filter(n=>n.jugador_id===j.id).length
  }));

  const [tabNotas,setTabNotas] = useState('notas');

  return (
    <div className="animate-in">
      <div className="ph-row">
        <div>
          <div className="page-title">Notas & Alertas</div>
          <div className="page-sub">🔒 Notas privadas y alertas de tus jugadores</div>
        </div>
        {tabNotas==='notas' && <button className="btn btn-g" onClick={()=>{setEditando(null);setForm({jugador_id:'',texto:'',etiquetas:''});setModal(true);}}>+ Nueva nota</button>}
      </div>
      <div className="tabs">
        <button className={`tab ${tabNotas==='notas'?'active':''}`} onClick={()=>setTabNotas('notas')}>🔒 Notas Privadas</button>
        <button className={`tab ${tabNotas==='alertas'?'active':''}`} onClick={()=>setTabNotas('alertas')}>⚠️ Alertas de Riesgo</button>
      </div>

      {tabNotas==='alertas' && <AlertasRiesgo/>}

      {tabNotas==='notas' && <>
      {/* Buscador */}
      <div style={{marginBottom:16}}>
        <input className="fc" value={buscar} onChange={e=>setBuscar(e.target.value)}
          placeholder="🔍 Buscar en notas, jugadores, etiquetas…"
          style={{maxWidth:400}}/>
      </div>

      {/* Filtro por jugador */}
      {jugadores.length>0 && (
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20}}>
          <button onClick={()=>setFiltroJ('todos')}
            style={{padding:'5px 14px',borderRadius:20,border:`1px solid ${filtroJ==='todos'?'var(--purple3)':'var(--brd2)'}`,
              background:filtroJ==='todos'?'rgba(168,85,247,.14)':'transparent',
              color:filtroJ==='todos'?'var(--accent)':'var(--muted)',
              cursor:'pointer',fontSize:12,fontFamily:'DM Sans',transition:'all .2s'}}>
            Todas ({notas.length})
          </button>
          <button onClick={()=>setFiltroJ('general')}
            style={{padding:'5px 14px',borderRadius:20,border:`1px solid ${filtroJ==='general'?'var(--purple3)':'var(--brd2)'}`,
              background:filtroJ==='general'?'rgba(168,85,247,.14)':'transparent',
              color:filtroJ==='general'?'var(--accent)':'var(--muted)',
              cursor:'pointer',fontSize:12,fontFamily:'DM Sans',transition:'all .2s'}}>
            General ({notas.filter(n=>!n.jugador_id).length})
          </button>
          {totalPorJugador.map(j=>(
            <button key={j.id} onClick={()=>setFiltroJ(j.id)}
              style={{padding:'5px 14px',borderRadius:20,border:`1px solid ${filtroJ===j.id?'var(--purple3)':'var(--brd2)'}`,
                background:filtroJ===j.id?'rgba(168,85,247,.14)':'transparent',
                color:filtroJ===j.id?'var(--accent)':'var(--muted)',
                cursor:'pointer',fontSize:12,fontFamily:'DM Sans',transition:'all .2s'}}>
              {j.nombre||j.email} ({j.count})
            </button>
          ))}
        </div>
      )}

      {/* Lista de notas */}
      {loading ? <div style={{color:'var(--muted)',padding:20}}>Cargando…</div>
      : notasFiltradas.length===0
        ? <div className="empty"><div className="empty-icon">🔒</div><div>{buscar?'No se encontraron notas.':'No hay notas todavía. ¡Creá la primera!'}</div></div>
        : notasFiltradas.map(nota=>(
          <div key={nota.id} className="nota-priv animate-in">
            {/* Header */}
            <div className="nota-priv-header">
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:18}}>🔒</span>
                <div>
                  {nota.perfiles?.nombre
                    ? <div className="nota-priv-jugador">👤 {nota.perfiles.nombre}</div>
                    : <div className="nota-priv-jugador" style={{color:'var(--muted)'}}>Nota general</div>
                  }
                  <div className="nota-priv-fecha">{fmt(nota.updated_at||nota.created_at)}</div>
                </div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-o btn-sm" onClick={()=>abrirEditar(nota)}>✏️</button>
                <button className="btn btn-d btn-sm" onClick={()=>eliminar(nota.id)}>🗑</button>
              </div>
            </div>

            {/* Etiquetas */}
            {(nota.etiquetas||[]).length>0 && (
              <div style={{marginBottom:8}}>
                {nota.etiquetas.map((e,i)=><span key={i} className="nota-priv-tag">{e}</span>)}
              </div>
            )}

            {/* Texto */}
            <div className="nota-priv-texto">{nota.texto}</div>
          </div>
        ))
      }

      </> }

      {/* Modal nueva/editar nota */}
      {modal && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="modal" style={{maxWidth:540}}>
            <div className="modal-hd">
              <div className="modal-title">{editando?'Editar nota':'Nueva nota privada'} 🔒</div>
              <button className="modal-x" onClick={()=>setModal(false)}>×</button>
            </div>

            <div style={{background:'rgba(168,85,247,.06)',border:'1px solid rgba(168,85,247,.18)',borderRadius:8,padding:12,marginBottom:16,fontSize:12,color:'var(--muted)'}}>
              🔒 Esta nota es completamente privada. Solo vos la podés leer.
            </div>

            {jugadores.length>0 && (
              <div className="fg">
                <label className="fl">Relacionada a un jugador (opcional)</label>
                <select className="fc" value={form.jugador_id} onChange={e=>setForm(f=>({...f,jugador_id:e.target.value}))}>
                  <option value="">Nota general (sin jugador específico)</option>
                  {jugadores.map(j=><option key={j.id} value={j.id}>{j.nombre||j.email}</option>)}
                </select>
              </div>
            )}

            <div className="fg">
              <label className="fl">Nota</label>
              <textarea className="fc" value={form.texto} onChange={e=>setForm(f=>({...f,texto:e.target.value}))}
                rows={7} placeholder="Escribí tus observaciones privadas…" autoFocus/>
            </div>

            <div className="fg">
              <label className="fl">Etiquetas (separadas por coma, opcional)</label>
              <input className="fc" value={form.etiquetas} onChange={e=>setForm(f=>({...f,etiquetas:e.target.value}))}
                placeholder="Ej: urgente, seguimiento, ansiedad"/>
            </div>

            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-o" onClick={()=>{setModal(false);setEditando(null);}}>Cancelar</button>
              <button className="btn btn-g" onClick={guardar} disabled={busy||!form.texto.trim()}>
                {busy?<><div className="spin"/>Guardando…</>:'🔒 Guardar nota'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  cohesion:       [{p:5,v:19},{p:10,v:21},{p:15,v:22},{p:20,v:23},{p:25,v:24},{p:30,v:25},{p:35,v:26},{p:40,v:27},{p:45,v:27},{p:50,v:28},{p:55,v:28},{p:60,v:29},{p:65,v:29},{p:70,v:30},{p:75,v:30},{p:80,v:30},{p:85,v:31},{p:90,v:31},{p:95,v:32}],
  motivacion:     [{p:5,v:2},{p:10,v:4},{p:15,v:5},{p:20,v:5},{p:25,v:6},{p:30,v:6},{p:35,v:7},{p:40,v:8},{p:45,v:8},{p:50,v:9},{p:55,v:9},{p:60,v:10},{p:65,v:10},{p:70,v:11},{p:75,v:11},{p:80,v:12},{p:85,v:13},{p:90,v:13},{p:95,v:14}],
};

const DIMS_INFO = {
  control_estres: {label:'Control del Estrés', color:'#34d399'},
  autoconfianza:  {label:'Autoconfianza',       color:'#c084fc'},
  cohesion:       {label:'Cohesión de Equipo',  color:'#60a5fa'},
  motivacion:     {label:'Motivación',           color:'#fb923c'},
};

function getPercentil(dim, pd) {
  const tabla = BAREMO[dim];
  let percentil = 5;
  for (const fila of tabla) {
    if (pd >= fila.v) percentil = fila.p;
    else break;
  }
  return percentil;
}

function getInterp(percentil) {
  if (percentil <= 15) return {label:'Muy Bajo',      color:'#f87171'};
  if (percentil <= 29) return {label:'Promedio Bajo', color:'#fb923c'};
  if (percentil <= 70) return {label:'Promedio',      color:'#c084fc'};
  if (percentil <= 84) return {label:'Promedio Alto', color:'#4ade80'};
  return                      {label:'Muy Alto',      color:'#60a5fa'};
}

function calcularCPRD(resps) {
  const sums = {control_estres:0, autoconfianza:0, cohesion:0, motivacion:0};
  for (const p of CPRD_PREGUNTAS) {
    const v = resps[p.id];
    if (v === undefined || v === null || v === '') continue;
    sums[p.dim] += p.inv ? (4 - parseInt(v)) : parseInt(v);
  }
  const out = {};
  for (const dim of Object.keys(sums)) {
    const pd = sums[dim];
    const percentil = getPercentil(dim, pd);
    out[dim] = { pd, percentil, interp: getInterp(percentil) };
  }
  return out;
}
